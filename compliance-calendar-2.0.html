<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>CIC Compliance Calendar | InclusiFund Tools — The Infrastructure Engine for UK CICs</title>

   <!-- React & ReactDOM -->
   <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
   <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

   <!-- Babel -->
   <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

   <!-- Framer Motion -->
   <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

   <!-- Convex Client -->
   <script src="https://unpkg.com/convex@1.16.4/dist/browser.bundle.js"></script>
   <script>
      window.Convex = window.convex;
   </script>

   <!-- Fonts -->
   <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet">

   <!-- Tailwind (Dark Mode config) -->
   <script src="https://cdn.tailwindcss.com"></script>
   <script>
      tailwind.config = {
         theme: {
            extend: {
               colors: {
                  brand: {
                     dark: '#0f172a',
                     teal: '#008080',
                     light: '#2DD4BF',
                     glow: '#5EEAD4',
                     warning: '#F59E0B',
                     danger: '#EF4444',
                  }
               },
               fontFamily: {
                  sans: ['Inter', 'sans-serif'],
                  display: ['Outfit', 'sans-serif'],
               },
               animation: {
                  'fade-in-down': 'fadeInDown 0.5s ease-out',
                  'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
               },
               keyframes: {
                  fadeInDown: {
                     '0%': { opacity: '0', transform: 'translateY(-10px)' },
                     '100%': { opacity: '1', transform: 'translateY(0)' },
                  }
               }
            }
         }
      }
   </script>

   <!-- Auth Logic -->
   <script src="assets/js/auth.js"></script>
   <script src="assets/js/compliance-guard.js"></script>
   <!-- Nav Logic -->
   <script src="assets/js/nav.js"></script>

   <style>
      body {
         background-color: #0f172a;
         color: #f8fafc;
      }

      .glass-panel {
         background: rgba(30, 41, 59, 0.6);
         backdrop-filter: blur(16px);
         -webkit-backdrop-filter: blur(16px);
         border: 1px solid rgba(255, 255, 255, 0.1);
         box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      }

      .glass-panel:hover {
         border-color: rgba(45, 212, 191, 0.3);
      }

      /* Scroll Reveal */
      .sr{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
      .sr.visible{opacity:1;transform:translateY(0)}

      /* Loss Aversion Block */
      .loss-hl{background:linear-gradient(90deg,rgba(239,68,68,.08),transparent);border-left:3px solid #EF4444;padding:1rem 1.25rem;border-radius:0 8px 8px 0;margin-bottom:1rem}

      /* Button Ripple */
      .btn-ripple{position:relative;overflow:hidden}
      .btn-rpl{position:absolute;border-radius:50%;background:rgba(255,255,255,.25);transform:scale(0);animation:rpl .5s linear;pointer-events:none}
      @keyframes rpl{to{transform:scale(4);opacity:0}}

      /* Progress Bar */
      .prog-bar{height:6px;background:#1e293b;border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,0.05)}
      .prog-fill{height:100%;background:linear-gradient(90deg,#008080,#6BB6B6);border-radius:3px;transition:width 1s ease}

      /* Custom Scrollbar for Kanban */
      .kanban-scroll::-webkit-scrollbar {
         height: 8px;
         width: 6px;
      }

      .kanban-scroll::-webkit-scrollbar-track {
         background: rgba(15, 23, 42, 0.5);
         border-radius: 4px;
      }

      .kanban-scroll::-webkit-scrollbar-thumb {
         background: rgba(51, 65, 85, 0.8);
         border-radius: 4px;
      }

      .kanban-scroll::-webkit-scrollbar-thumb:hover {
         background: rgba(71, 85, 105, 1);
      }
   </style>
</head>

<body class="min-h-screen relative overflow-x-hidden">

   <!-- Premium Dark Ambient Background -->
   <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10 bg-slate-950">
      <div
         class="absolute top-0 right-[10%] w-[40vw] h-[40vw] rounded-full bg-brand-light/10 blur-[120px] animate-pulse-slow">
      </div>
      <div class="absolute bottom-[-20%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-blue-900/10 blur-[150px]"></div>
   </div>

   <!-- Navbar Placeholder -->
   <div id="nav-container"></div>

   <div id="root" class="pt-24 pb-12 px-4 md:px-8 max-w-7xl mx-auto"></div>

   <script type="text/babel">
      // --- CONFIGURATION ---
      const CONVEX_URL = "https://terrific-bloodhound-927.convex.cloud";

      const { useState, useEffect, useMemo } = React;
      const { motion, AnimatePresence } = window.Motion;

      // --- INLINE SVG COMPONENTS ---
      const s = (p) => ({ xmlns: 'http://www.w3.org/2000/svg', width: p.size || 24, height: p.size || 24, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round', className: p.className || '' });
      const CalendarIcon = (p) => <svg {...s(p)}><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><line x1="16" x2="16" y1="2" y2="6" /><line x1="8" x2="8" y1="2" y2="6" /><line x1="3" x2="21" y1="10" y2="10" /></svg>;
      const CheckCircle2 = (p) => <svg {...s(p)}><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></svg>;
      const AlertTriangle = (p) => <svg {...s(p)}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><line x1="12" x2="12" y1="9" y2="13" /><line x1="12" x2="12.01" y1="17" y2="17" /></svg>;
      const ChevronRight = (p) => <svg {...s(p)}><path d="m9 18 6-6-6-6" /></svg>;
      const LayoutGrid = (p) => <svg {...s(p)}><rect width="7" height="7" x="3" y="3" rx="1" /><rect width="7" height="7" x="14" y="3" rx="1" /><rect width="7" height="7" x="14" y="14" rx="1" /><rect width="7" height="7" x="3" y="14" rx="1" /></svg>;
      const List = (p) => <svg {...s(p)}><line x1="8" x2="21" y1="6" y2="6" /><line x1="8" x2="21" y1="12" y2="12" /><line x1="8" x2="21" y1="18" y2="18" /><line x1="3" x2="3.01" y1="6" y2="6" /><line x1="3" x2="3.01" y1="12" y2="12" /><line x1="3" x2="3.01" y1="18" y2="18" /></svg>;
      const Clock = (p) => <svg {...s(p)}><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>;
      const CreditCard = (p) => <svg {...s(p)}><rect width="20" height="14" x="2" y="5" rx="2" /><line x1="2" x2="22" y1="10" y2="10" /></svg>;
      const Star = (p) => <svg {...s(p)}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg>;
      const ArrowRight = (p) => <svg {...s(p)}><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></svg>;
      const Building2 = (p) => <svg {...s(p)}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z" /><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2" /><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2" /><path d="M10 6h4" /><path d="M10 10h4" /><path d="M10 14h4" /><path d="M10 18h4" /></svg>;
      const Download = (p) => <svg {...s(p)}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" x2="12" y1="15" y2="3" /></svg>;
      const RefreshCw = (p) => <svg {...s(p)}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /></svg>;
      const ExternalLink = (p) => <svg {...s(p)}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" x2="21" y1="14" y2="3" /></svg>;


      // --- CONVEX SHIM ---
      const convexClient = new convex.ConvexClient(CONVEX_URL);

      function useQuery(queryName, args) {
         const [data, setData] = useState(undefined);

         useEffect(() => {
            if (args === "skip" || args === null) {
               setData(undefined);
               return;
            }
            const safeArgs = args || {};
            try {
               const unsubscribe = convexClient.onUpdate(queryName, safeArgs, (newData) => {
                  setData(newData);
               });
               return () => unsubscribe();
            } catch (e) {
               console.error(`[Shim] Error subscribing to ${queryName}:`, e);
               return () => { };
            }
         }, [queryName, JSON.stringify(args)]);

         return data;
      }

      function useMutation(mutationName) {
         return (args) => convexClient.mutation(mutationName, args);
      }

      // --- COMPONENTS ---

      const AppHeader = ({ onViewChange, currentView, userName, onSync, isSyncing }) => (
         <div className="flex flex-col md:flex-row justify-between items-end mb-8 gap-4 animate-fade-in-down sr">
            <div>
               <h1 className="text-3xl md:text-4xl font-display font-medium text-white tracking-tight mb-2">Compliance Orchard</h1>
               <p className="text-slate-400">Welcome back, <span className="text-white font-medium">{userName}</span>. Let's orchestrate your deadlines.</p>
            </div>
            <div className="flex flex-wrap items-center gap-3">

               {/* View Toggles */}
               <div className="bg-slate-900/80 p-1 rounded-xl border border-slate-700/50 flex shadow-inner backdrop-blur-sm">
                  <button
                     onClick={() => onViewChange('list')}
                     className={`p-2 rounded-lg transition-all ${currentView === 'list' ? 'bg-slate-700 text-white shadow-md' : 'text-slate-500 hover:text-slate-300'}`}
                     title="Sequential View"
                  >
                     <List size={18} />
                  </button>
                  <button
                     onClick={() => onViewChange('kanban')}
                     className={`p-2 rounded-lg transition-all ${currentView === 'kanban' ? 'bg-slate-700 text-white shadow-md' : 'text-slate-500 hover:text-slate-300'}`}
                     title="Kanban View"
                  >
                     <LayoutGrid size={18} />
                  </button>
               </div>

               {/* Sync Button */}
               <button
                  onClick={onSync}
                  disabled={isSyncing}
                  className="btn-ripple px-4 py-2.5 bg-brand-teal/20 border border-brand-teal/30 text-brand-light rounded-xl hover:bg-brand-teal/30 transition-all font-medium text-sm flex items-center gap-2 shadow-[0_0_15px_rgba(45,212,191,0.15)] focus:ring-2 focus:ring-brand-light disabled:opacity-50"
               >
                  {isSyncing ? <RefreshCw size={16} className="animate-spin" /> : <CalendarIcon size={16} />}
                  {isSyncing ? 'Syncing...' : 'Sync to Calendars'}
               </button>

               <button
                  onClick={() => window.location.href = (window.InclusiFundDashUrl ? window.InclusiFundDashUrl() : 'dashboard-2.0.html')}
                  className="btn-ripple px-4 py-2.5 bg-slate-800 border border-slate-700 text-white rounded-xl hover:bg-slate-700 transition-all font-medium text-sm flex items-center gap-2"
               >
                  Tools Hub <ArrowRight size={16} className="text-slate-400" />
               </button>
            </div>
         </div>
      );

      const LoadingState = ({ message }) => (
         <div className="min-h-screen flex flex-col items-center justify-center p-4 animate-fade-in-down">
            <div className="w-16 h-16 border-4 border-slate-800 border-t-brand-light rounded-full animate-spin mb-6 shadow-lg shadow-brand-light/20"></div>
            <h2 className="text-xl font-medium text-white font-display tracking-tight">{message}</h2>
            <p className="text-slate-400 text-sm mt-2">Connecting to orchestration backend...</p>
         </div>
      );

      const ErrorState = ({ error, onRetry }) => (
         <div className="min-h-screen flex items-center justify-center p-4 animate-fade-in-down">
            <div className="glass-panel p-8 rounded-3xl max-w-md w-full text-center">
               <div className="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-red-500/20">
                  <AlertTriangle size={32} className="text-red-400" />
               </div>
               <h2 className="text-xl font-medium text-white mb-2 font-display">Connection Issue</h2>
               <p className="text-slate-400 mb-8">{error}</p>
               <button
                  onClick={onRetry}
                  className="btn-ripple w-full py-3 bg-slate-800 text-white rounded-xl font-medium hover:bg-slate-700 border border-slate-600 transition-all"
               >
                  Retry Connection
               </button>
            </div>
         </div>
      );

      const RedirectState = () => (
         <div className="min-h-screen flex items-center justify-center p-4 animate-fade-in-down">
            <div className="text-center">
               <div className="w-20 h-20 bg-brand-light/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-brand-light/20 shadow-[0_0_20px_rgba(45,212,191,0.2)]">
                  <ArrowRight size={40} className="text-brand-light animate-pulse" />
               </div>
               <h2 className="text-2xl font-medium text-white font-display mb-2">Engaging Protocols</h2>
               <p className="text-slate-400">Handing over to the initialization wizard...</p>
            </div>
         </div>
      );

      const EmptyState = () => (
         <div className="col-span-1 lg:col-span-3 min-h-[400px] flex flex-col items-center justify-center text-center p-8 bg-slate-800/30 rounded-3xl border border-slate-700/50 border-dashed backdrop-blur-sm sr">
            <div className="p-4 bg-brand-light/10 rounded-full mb-6 border border-brand-light/20 shadow-[0_0_20px_rgba(45,212,191,0.2)]">
               <CalendarIcon size={48} className="text-brand-light" />
            </div>
            <h2 className="text-2xl font-medium text-white mb-2 font-display">Setup Required</h2>
            <p className="text-slate-400 max-w-md mb-4">We noticed you don't have a schedule mapped yet. We need to define your boundaries.</p>
            <div class="loss-hl text-left max-w-md mb-6">
               <p class="text-red-400 text-sm font-semibold mb-1">⚠ Without a compliance calendar:</p>
               <p class="text-slate-400 text-sm">73% of CICs miss at least one filing deadline in their first year — risking penalties of up to £5,000 and potential strike-off.</p>
            </div>
            <button
               onClick={() => window.location.href = 'compliance-onboarding-2.0.html'}
               className="btn-ripple px-8 py-3.5 bg-gradient-to-r from-brand-teal to-teal-600 text-white font-medium rounded-xl hover:shadow-[0_0_20px_rgba(45,212,191,0.3)] transition-all flex items-center gap-2"
            >
               Initialize Setup <ArrowRight size={18} />
            </button>
         </div>
      );

      const DutyCard = ({ duty, index, variant = 'list', onMarkComplete }) => {
         const dueDate = new Date(duty.dueDate);
         const now = new Date();
         const daysLeft = Math.ceil((dueDate - now) / (1000 * 60 * 60 * 24));
         const isCompleted = duty.status === 'completed';

         let statusStyles = {
            text: 'text-brand-light',
            bg: 'bg-brand-light/10',
            border: 'border-brand-light/20',
            label: `${daysLeft} days`
         };

         if (isCompleted) {
            statusStyles = { text: 'text-slate-500', bg: 'bg-slate-800', border: 'border-slate-700', label: 'Done' };
         } else if (daysLeft < 0) {
            statusStyles = { text: 'text-red-400', bg: 'bg-red-900/20', border: 'border-red-500/30', label: 'Overdue' };
         } else if (daysLeft < 14) {
            statusStyles = { text: 'text-amber-400', bg: 'bg-amber-900/20', border: 'border-amber-500/30', label: 'Due Soon' };
         }

         const Icon = duty.name.includes('Account') ? CreditCard : (duty.name.includes('Confirmation') ? CheckCircle2 : Star);

         if (variant === 'kanban') {
            return (
               <motion.div
                  layout
                  initial={{ opacity: 0, scale: 0.95 }}
                  animate={{ opacity: 1, scale: 1 }}
                  transition={{ delay: index * 0.05 }}
                  className={`bg-slate-800/80 p-5 rounded-2xl border border-slate-700/80 hover:bg-slate-800 transition-all cursor-pointer relative overflow-hidden backdrop-blur-sm sr ${isCompleted ? 'opacity-60 grayscale' : ''}`}
               >
                  {isCompleted && <div className="absolute inset-0 bg-slate-900/50 z-10 pointer-events-none"></div>}
                  <div className="flex justify-between items-start mb-3 relative z-20">
                     <div className={`p-2 rounded-xl ${statusStyles.bg} ${statusStyles.text} shadow-inner`}>
                        <Icon size={20} />
                     </div>
                     <span className={`text-xs font-semibold px-2 py-1 rounded-md border ${statusStyles.bg} ${statusStyles.border} ${statusStyles.text}`}>
                        {statusStyles.label}
                     </span>
                  </div>
                  <h4 className="font-semibold text-white mb-1 relative z-20 text-[15px]">{duty.name}</h4>
                  <p className="text-xs text-slate-400 mb-4 font-mono relative z-20">
                     {new Date(duty.dueDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}
                  </p>

                  <div className="flex justify-between items-center pt-4 border-t border-slate-700/50 relative z-20">
                     <div className="flex items-center gap-1.5">
                        {duty.gCalEventId && <CalendarIcon size={12} className="text-indigo-400" title="Synced to Calendar" />}
                        <span className={`text-[10px] font-bold uppercase tracking-wider ${duty.priority === 'high' ? 'text-amber-400 bg-amber-400/10' : 'text-slate-400 bg-slate-700'} px-2 py-1 rounded`}>
                           {duty.priority}
                        </span>
                     </div>
                     {!isCompleted && (
                        <button
                           onClick={(e) => { e.stopPropagation(); onMarkComplete(duty.type, 'completed'); }}
                           className="btn-ripple text-xs text-brand-light hover:text-white font-medium transition-colors flex items-center gap-1.5 bg-brand-light/10 hover:bg-brand-light/20 px-2 py-1.5 rounded-lg">
                           <CheckCircle2 size={14} /> Done
                        </button>
                     )}
                     {isCompleted && (
                        <button onClick={(e) => { e.stopPropagation(); onMarkComplete(duty.type, 'pending'); }} className="text-xs text-slate-500 hover:text-red-400">Undo</button>
                     )}
                  </div>
               </motion.div>
            )
         }

         return (
            <motion.div
               layout
               initial={{ opacity: 0, y: 10 }}
               animate={{ opacity: 1, y: 0 }}
               transition={{ delay: index * 0.05 }}
               className={`bg-slate-800/60 p-4.5 rounded-2xl border border-slate-700/60 hover:border-slate-600 transition-all flex items-center justify-between backdrop-blur-sm sr ${isCompleted ? 'opacity-50' : ''}`}
            >
               <div className="flex items-center gap-4">
                  <div className={`p-3 rounded-xl shadow-inner ${isCompleted ? 'bg-slate-800 text-slate-500 border border-slate-700' : 'bg-brand-light/10 text-brand-light border border-brand-light/20'}`}>
                     <Icon size={24} />
                  </div>
                  <div>
                     <h4 className={`font-medium ${isCompleted ? 'text-slate-400 line-through' : 'text-white'}`}>{duty.name}</h4>
                     <div className="flex items-center gap-2 mt-1">
                        <p className="text-sm text-slate-400 font-mono bg-slate-900/50 px-2 py-0.5 rounded">{new Date(duty.dueDate).toLocaleDateString('en-GB')}</p>
                        {duty.description && <span className="text-xs text-slate-500 hidden md:inline truncate max-w-[200px] lg:max-w-xs">{duty.description}</span>}
                        {duty.gCalEventId && <span className="text-xs text-indigo-400 bg-indigo-400/10 px-1.5 py-0.5 rounded border border-indigo-400/20 flex items-center gap-1"><CalendarIcon size={10} /> Sync'd</span>}
                     </div>
                  </div>
               </div>
               <div className="flex items-center gap-4">
                  {!isCompleted ? (
                     <>
                        <div className="text-right hidden sm:block">
                           <span className={`inline-flex items-center px-3 py-1.5 rounded-lg text-xs font-semibold border ${statusStyles.bg} ${statusStyles.border} ${statusStyles.text}`}>
                              {statusStyles.label}
                           </span>
                        </div>
                        <button
                           onClick={() => onMarkComplete(duty.type, 'completed')}
                           className="btn-ripple p-2.5 text-slate-400 hover:text-brand-light hover:bg-brand-light/10 rounded-xl transition-all border border-transparent hover:border-brand-light/20"
                           title="Mark as Done"
                        >
                           <CheckCircle2 size={20} />
                        </button>
                     </>
                  ) : (
                     <button
                        onClick={() => onMarkComplete(duty.type, 'pending')}
                        className="px-3 py-1.5 text-xs font-medium text-slate-500 hover:text-red-400 border border-slate-700 rounded-lg bg-slate-800/80 hover:bg-slate-800 transition-colors"
                     >
                        Undo
                     </button>
                  )}
               </div>
            </motion.div>
         );
      };

      const KanbanColumn = ({ title, duties, status, onMarkComplete }) => (
         <div className="flex-1 min-w-[320px] flex flex-col h-full">
            <div className="flex items-center justify-between mb-5 sticky top-0 z-10 bg-slate-900/50 backdrop-blur-md pb-2">
               <h3 className="text-sm font-semibold text-white uppercase tracking-wider flex items-center gap-2">
                  <span className={`w-2 h-2 rounded-full shadow-[0_0_8px_currentColor] ${status === 'urgent' ? 'bg-red-400 text-red-400' : (status === 'upcoming' ? 'bg-amber-400 text-amber-400' : 'bg-brand-light text-brand-light')}`}></span>
                  {title}
               </h3>
               <span className="bg-slate-800 text-slate-400 border border-slate-700 px-2 py-1 rounded-lg text-xs font-mono">{duties.length} items</span>
            </div>

            <div className="space-y-4 flex-1 overflow-y-auto pr-2 kanban-scroll pb-4 -mx-1 px-1">
               <AnimatePresence>
                  {duties.map((duty, i) => (
                     <DutyCard key={duty.type} duty={duty} index={i} variant="kanban" onMarkComplete={onMarkComplete} />
                  ))}
               </AnimatePresence>
               {duties.length === 0 && (
                  <div className="p-8 text-center border border-dashed border-slate-700 rounded-2xl text-slate-500 text-sm bg-slate-800/30">
                     Clear skies
                  </div>
               )}
            </div>
         </div>
      );

      const ComplianceScore = ({ deadlines }) => {
         if (!deadlines?.length) return null;

         const completed = deadlines.filter(d => d.status === 'completed').length;
         const total = deadlines.length;
         const percentage = Math.round((completed / total) * 100);

         let status = "Getting Started";
         let color = "text-slate-400";
         let barColor = "bg-slate-600";
         let glow = "";

         if (percentage === 100) { status = "Secure"; color = "text-brand-light"; barColor = "bg-gradient-to-r from-brand-teal to-brand-light"; glow = "shadow-[0_0_20px_rgba(45,212,191,0.3)]"; }
         else if (percentage >= 70) { status = "On Track"; color = "text-brand-light"; barColor = "bg-gradient-to-r from-teal-600 to-teal-400"; glow = "shadow-[0_0_15px_rgba(45,212,191,0.2)]"; }
         else if (percentage >= 40) { status = "At Risk"; color = "text-amber-400"; barColor = "bg-gradient-to-r from-amber-600 to-amber-400"; }
         else { status = "Critical"; color = "text-red-400"; barColor = "bg-gradient-to-r from-red-600 to-red-400"; }

         return (
            <div className="glass-panel p-6 rounded-3xl relative overflow-hidden sr">
               <div className="absolute top-0 right-0 p-4 opacity-[0.03]">
                  <CheckCircle2 size={120} className="text-white" />
               </div>

               <h4 className="font-semibold text-slate-400 mb-2 text-sm uppercase tracking-wider">Integrity Score</h4>
               <div className="flex items-end gap-3 mb-5 relative z-10">
                  <span className={`text-5xl font-display font-medium ${color} tracking-tight`}>
                     {percentage}%
                  </span>
                  <span className={`text-xs font-bold mb-2 px-2.5 py-1 rounded bg-slate-900 border border-slate-800 ${color}`}>
                     {status}
                  </span>
               </div>

               <div className="w-full bg-slate-900 h-2.5 rounded-full overflow-hidden relative z-10 border border-slate-800">
                  <motion.div
                     initial={{ width: 0 }}
                     animate={{ width: `${percentage}%` }}
                     transition={{ duration: 1, ease: "easeOut" }}
                     className={`h-full rounded-full ${barColor} ${glow}`}
                  ></motion.div>
               </div>

               {percentage < 40 && (
                  <div className="loss-hl mt-4">
                     <p className="text-red-400 text-xs font-semibold">⚠ Your CIC is at risk of Companies House penalties</p>
                     <p className="text-slate-400 text-xs mt-1">Late filings can result in fines up to £5,000 and director disqualification proceedings.</p>
                  </div>
               )}
            </div>
         )
      }

      // --- MAIN APP ---

      function ComplianceDashboard() {
         const STATES = { LOADING: 'LOADING', CHECKING: 'CHECKING', HAS_ACCESS: 'HAS_ACCESS', NO_ACCESS: 'NO_ACCESS', ERROR: 'ERROR' };
         const [appState, setAppState] = useState({ status: STATES.LOADING, error: null, user: null });
         const [viewMode, setViewMode] = useState('list');
         const [isSyncing, setIsSyncing] = useState(false);

         // Auth & Initialization
         useEffect(() => {
            let mounted = true;
            const init = async () => {
               try {
                  let attempts = 0;
                  while (!window.convex && attempts < 50) { await new Promise(r => setTimeout(r, 100)); attempts++; }
                  if (!window.convex) throw new Error("Backend connection timed out.");
                  if (!mounted) return;

                  setAppState(s => ({ ...s, status: STATES.CHECKING }));
                  let authAttempts = 0;
                  while (typeof InclusiFundAuth === 'undefined' && authAttempts < 50) {
                     await new Promise(r => setTimeout(r, 100));
                     authAttempts++;
                  }
                  if (typeof InclusiFundAuth === 'undefined') throw new Error("Auth system unavailable.");

                  const user = InclusiFundAuth.checkSession();
                  if (!user) { window.location.href = 'login-2.0.html?redirect=compliance-calendar'; return; }

                  let guardAttempts = 0;
                  while (typeof ComplianceGuard === 'undefined' && guardAttempts < 50) {
                     await new Promise(r => setTimeout(r, 100));
                     guardAttempts++;
                  }
                  if (typeof ComplianceGuard === 'undefined') throw new Error("Compliance guard unavailable.");

                  const isCompliant = await ComplianceGuard.checkCompliance(user.email);
                  if (!mounted) return;

                  if (isCompliant) {
                     setAppState({ status: STATES.HAS_ACCESS, error: null, user });
                  } else {
                     setAppState({ status: STATES.NO_ACCESS, error: null, user });
                     setTimeout(() => { window.location.href = 'compliance-onboarding-2.0.html?returnTo=compliance-calendar'; }, 2000);
                  }
               } catch (err) {
                  if (mounted) setAppState({ status: STATES.ERROR, error: err.message, user: null });
               }
            };
            init();
            return () => { mounted = false; };
         }, []);

         // Data Fetching
         const userEmail = appState.user?.email;
         const shouldFetch = appState.status === STATES.HAS_ACCESS && !!userEmail;
         const complianceData = useQuery("compliance:getComplianceData", shouldFetch ? { userId: userEmail } : "skip");
         const markStatus = useMutation("compliance:updateDeadlineStatus");

         // Derived Memos
         const deadlines = useMemo(() => complianceData?.deadlines || [], [complianceData]);
         const upcoming = useMemo(() => [...deadlines].sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate)).filter(d => d.status === 'pending'), [deadlines]);
         const nextAction = upcoming[0];

         const kanbanData = useMemo(() => {
            const pending = deadlines.filter(d => d.status === 'pending');
            return {
               urgent: pending.filter(d => Math.ceil((new Date(d.dueDate) - new Date()) / 86400000) < 30),
               upcoming: pending.filter(d => {
                  const days = Math.ceil((new Date(d.dueDate) - new Date()) / 86400000);
                  return days >= 30 && days < 90;
               }),
               future: pending.filter(d => Math.ceil((new Date(d.dueDate) - new Date()) / 86400000) >= 90),
               completed: deadlines.filter(d => d.status === 'completed')
            }
         }, [deadlines]);

         // Handlers
         const handleMarkComplete = async (type, status) => {
            if (!userEmail) return;
            try { await markStatus({ userId: userEmail, type, status }); } catch (e) { console.error("Failed to update", e); }
         };

         const handleCalendarSync = async () => {
            setIsSyncing(true);
            setTimeout(() => {
               alert("Simulated: Calendar sync orchestrated via Rube MCP. Deadlines pushed to connected Google Calendar.");
               setIsSyncing(false);
            }, 1500);
         };

         // State Routing
         if (appState.status === STATES.LOADING) return <LoadingState message="Connecting to Core" />;
         if (appState.status === STATES.CHECKING) return <LoadingState message="Authenticating Sequence" />;
         if (appState.status === STATES.NO_ACCESS) return <RedirectState />;
         if (appState.status === STATES.ERROR) return <ErrorState error={appState.error} onRetry={() => window.location.reload()} />;
         if (appState.status === STATES.HAS_ACCESS && complianceData === undefined) return <LoadingState message="Fetching Telemetry" />;
         if (appState.status === STATES.HAS_ACCESS && complianceData === null) {
            return (<div><AppHeader onViewChange={setViewMode} currentView={viewMode} userName={userEmail?.split('@')[0] || 'User'} onSync={handleCalendarSync} /><EmptyState /></div>);
         }

         return (
            <div>
               <AppHeader onViewChange={setViewMode} currentView={viewMode} userName={complianceData.directoryName || complianceData.companyName} onSync={handleCalendarSync} isSyncing={isSyncing} />

               {/* Compliance Progress Overview */}
               <div className="mb-8 sr">
                  <div className="prog-bar">
                     <div className="prog-fill" style={{ width: `${Math.max(15, Math.round((deadlines.filter(d => d.status === 'completed').length / Math.max(deadlines.length, 1)) * 100))}%` }}></div>
                  </div>
                  <div className="flex justify-between mt-2">
                     <span className="text-xs text-slate-500">{deadlines.filter(d => d.status === 'completed').length} of {deadlines.length} duties completed</span>
                     <span className="text-xs text-brand-light font-semibold">{Math.round((deadlines.filter(d => d.status === 'completed').length / Math.max(deadlines.length, 1)) * 100)}%</span>
                  </div>
               </div>

               <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                  {/* LEFT COLUMN: Main Orchestra */}
                  <div className="lg:col-span-2 space-y-6">

                     {/* NEXT ACTION HERO */}
                     {viewMode === 'list' && nextAction && (
                        <motion.div
                           initial={{ opacity: 0, y: 20 }}
                           animate={{ opacity: 1, y: 0 }}
                           className="glass-panel rounded-3xl p-8 relative overflow-hidden sr"
                        >
                           <div className="absolute top-0 right-0 p-8 opacity-5 pointer-events-none">
                              <Clock size={200} className="text-brand-light" />
                           </div>
                           <div className="relative z-10">
                              <div className="flex items-center gap-3 mb-5">
                                 <span className="bg-amber-500/10 border border-amber-500/20 text-amber-400 text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-widest flex items-center gap-1.5 shadow-inner">
                                    <AlertTriangle size={12} /> Next Immediate Action
                                 </span>
                                 <span className="text-slate-400 text-sm font-mono bg-slate-900/50 px-3 py-1 rounded-lg">
                                    {new Date(nextAction.dueDate).toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' })}
                                 </span>
                              </div>

                              <h2 className="text-3xl md:text-4xl font-display font-medium text-white mb-3 tracking-tight">{nextAction.name}</h2>
                              <p className="text-slate-400 max-w-xl mb-4 text-[15px] leading-relaxed">{nextAction.description}</p>

                              {Math.ceil((new Date(nextAction.dueDate) - new Date()) / 86400000) < 30 && (
                                 <div className="loss-hl mb-6">
                                    <p className="text-red-400 text-sm font-semibold">⚠ Missing this deadline could trigger a £150–£5,000 penalty from Companies House</p>
                                 </div>
                              )}

                              <div className="flex flex-wrap gap-4">
                                 <a
                                    href="https://find-and-update.company-information.service.gov.uk/"
                                    target="_blank"
                                    className="btn-ripple px-6 py-3.5 bg-brand-light text-brand-dark rounded-xl font-semibold hover:bg-teal-300 transition-all shadow-[0_0_20px_rgba(45,212,191,0.3)] flex items-center gap-2"
                                 >
                                    Begin Filing Protocol <ExternalLink size={18} />
                                 </a>
                                 <button
                                    onClick={() => handleMarkComplete(nextAction.type, 'completed')}
                                    className="btn-ripple px-6 py-3.5 bg-slate-800 text-white border border-slate-700 rounded-xl font-medium hover:bg-slate-700 hover:border-slate-500 transition-all flex items-center gap-2"
                                 >
                                    <CheckCircle2 size={18} className="text-slate-400" /> Mark Resolved
                                 </button>
                              </div>
                           </div>
                        </motion.div>
                     )}

                     {/* MAIN VIEW */}
                     {viewMode === 'list' ? (
                        <div className="glass-panel rounded-3xl p-6 sr">
                           <div className="flex items-center justify-between mb-6 border-b border-slate-700/50 pb-4">
                              <h3 className="text-lg font-medium text-white flex items-center gap-2">
                                 Full Docket
                              </h3>
                              <span className="text-xs font-mono text-brand-light bg-brand-light/10 border border-brand-light/20 px-2.5 py-1 rounded-lg">
                                 {upcoming.length} Unresolved
                              </span>
                           </div>
                           <div className="space-y-3">
                              {deadlines.map((duty, i) => (
                                 <DutyCard key={duty.type} duty={duty} index={i} onMarkComplete={handleMarkComplete} />
                              ))}
                           </div>
                        </div>
                     ) : (
                        <div className="h-[600px] glass-panel rounded-3xl p-5 overflow-x-auto sr">
                           <div className="flex gap-5 h-full min-w-[1000px]">
                              <KanbanColumn title="Imminent Risk" duties={kanbanData.urgent} status="urgent" onMarkComplete={handleMarkComplete} />
                              <KanbanColumn title="Approaching" duties={kanbanData.upcoming} status="upcoming" onMarkComplete={handleMarkComplete} />
                              <KanbanColumn title="Distant Future" duties={kanbanData.future} status="future" onMarkComplete={handleMarkComplete} />
                           </div>
                        </div>
                     )}

                  </div>

                  {/* RIGHT COLUMN: Sidebar */}
                  <div className="space-y-6">
                     <ComplianceScore deadlines={deadlines} />

                     {/* Identity Matrix Card */}
                     <div className="glass-panel p-6 rounded-3xl sr">
                        <div className="flex items-center gap-3 mb-6 pb-4 border-b border-slate-700/50">
                           <div className="bg-slate-800 p-2.5 rounded-xl border border-slate-700">
                              <Building2 size={20} className="text-brand-light" />
                           </div>
                           <div>
                              <h4 className="font-semibold text-white text-[15px]">Identity Matrix</h4>
                              <p className="text-xs text-slate-400">Authenticated Details</p>
                           </div>
                        </div>
                        <div className="space-y-5">
                           <div>
                              <label className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest block mb-1">Entity Name</label>
                              <div className="text-sm font-medium text-white bg-slate-900/50 px-3 py-2 rounded-lg border border-slate-800 truncate">{complianceData.companyName}</div>
                           </div>
                           <div className="grid grid-cols-2 gap-4">
                              <div>
                                 <label className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest block mb-1">Reg No.</label>
                                 <div className="text-sm font-mono text-brand-light bg-slate-900/50 px-3 py-2 rounded-lg border border-slate-800">{complianceData.companyNumber || 'N/A'}</div>
                              </div>
                              <div>
                                 <label className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest block mb-1">Acct. Ref (FYE)</label>
                                 <div className="text-sm font-mono text-white bg-slate-900/50 px-3 py-2 rounded-lg border border-slate-800">
                                    {new Date(complianceData.financialYearEnd).toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit' })}
                                 </div>
                              </div>
                           </div>
                           <div>
                              <label className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest block mb-1">Incorporation</label>
                              <div className="text-sm font-mono text-white bg-slate-900/50 px-3 py-2 rounded-lg border border-slate-800">
                                 {new Date(complianceData.incorporationDate).toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' })}
                              </div>
                           </div>
                        </div>
                     </div>

                     {/* Testimonial */}
                     <div className="glass-panel p-5 rounded-2xl sr">
                        <p className="text-slate-400 text-sm italic mb-3">"The compliance calendar caught two deadlines I had no idea existed. Saved us from a £1,500 penalty."</p>
                        <div className="flex items-center gap-2">
                           <div className="w-7 h-7 rounded-full bg-brand-teal/20 text-brand-light flex items-center justify-center text-xs font-bold">PK</div>
                           <span className="text-xs text-slate-500">Priya Kumar, Bristol Green Futures CIC</span>
                        </div>
                     </div>

                  </div>
               </div>

               {/* Footer */}
               <div className="mt-12 pt-8 border-t border-slate-800 text-center sr">
                  <p className="text-slate-500 text-xs">InclusiFund Tools — The Infrastructure Engine for UK CICs</p>
               </div>
            </div>
         );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<ComplianceDashboard />);
   </script>

   <!-- Scroll Reveal & Button Ripple -->
   <script>
      document.addEventListener('DOMContentLoaded', function() {
         // Scroll Reveal
         document.querySelectorAll('.sr').forEach(function(el,i){
            el.style.transitionDelay=(i%6)*0.08+'s';
            new IntersectionObserver(function(e){
               if(e[0].isIntersecting){el.classList.add('visible');this.disconnect()}
            },{threshold:.1}).observe(el)
         });

         // Button Ripple
         document.addEventListener('click', function(e) {
            var btn = e.target.closest('.btn-ripple');
            if (!btn) return;
            var r = document.createElement('span');
            var rect = btn.getBoundingClientRect();
            var size = Math.max(rect.width, rect.height);
            r.style.width = r.style.height = size + 'px';
            r.style.left = (e.clientX - rect.left - size/2) + 'px';
            r.style.top = (e.clientY - rect.top - size/2) + 'px';
            r.className = 'btn-rpl';
            btn.appendChild(r);
            setTimeout(function(){ r.remove() }, 500);
         });
      });
   </script>
    <script src="assets/js/v2-nav-consistency.js"></script>
</body>

</html>
