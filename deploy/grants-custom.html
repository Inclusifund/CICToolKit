        /* GHL wraps custom code in: #__nuxt > .preview-container > .fullSection >
           .c-section > .c-wrapper > .inner > .c-row > .c-column > [your code]
           The .inner div is the main culprit — it caps at ~1170px with margin:auto */

        /* Layer 1: Reset all GHL structural containers */
        #__nuxt,
        #__nuxt > div,
        .preview-container,
        .hl_page-preview--content,
        .fullSection,
        .c-section,
        .c-wrapper,
        .bgCover,
        .bg-fixed,

            width: 100% !important;
            margin-left: 0 !important;
            margin-right: 0 !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
            box-sizing: border-box !important;

        /* Layer 2: THE KEY FIX — .inner is what caps width at ~1170px */
        .inner,
        .c-row,
        .c-column,
        .c-wrapper > div,

            max-width: 100% !important;
            width: 100% !important;

            margin-right: 0 !important;

            padding-right: 0 !important;

        #root {

            max-width: 100vw !important;
            margin-left: calc(-50vw + 50%) !important;
            position: relative;
