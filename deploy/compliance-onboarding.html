    <style>

    <!-- Scroll Reveal Observer -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            function observeSR() {
                document.querySelectorAll('.sr').forEach(function(el) {
                    observer.observe(el);
                });
            }
            observeSR();
            // Re-observe after React renders
            const ro = new MutationObserver(observeSR);
            ro.observe(document.getElementById('root'), { childList: true, subtree: true });
        });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFETTI LAUNCHER ---
        function launchConfetti() {
            const colors = ['#008080','#6BB6B6','#d4a853','#EF4444','#F59E0B','#10B981'];
            for (let i = 0; i < 60; i++) {
                const el = document.createElement('div');
                el.className = 'confetti-piece';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = '-10px';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.animationDelay = Math.random() * 0.5 + 's';
                el.style.width = (6 + Math.random() * 8) + 'px';
                el.style.height = (6 + Math.random() * 8) + 'px';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2500);
            }
        }

        // --- RIPPLE HANDLER ---
        function addRipple(e) {
            const btn = e.currentTarget;
            const circle = document.createElement('span');
            const diameter = Math.max(btn.clientWidth, btn.clientHeight);
            const radius = diameter / 2;
            circle.style.width = circle.style.height = diameter + 'px';
            circle.style.left = (e.clientX - btn.getBoundingClientRect().left - radius) + 'px';
            circle.style.top = (e.clientY - btn.getBoundingClientRect().top - radius) + 'px';
            circle.className = 'ripple-circle';
            const existing = btn.querySelector('.ripple-circle');
            if (existing) existing.remove();
            btn.appendChild(circle);
        }

        // --- INLINE SVG ICON COMPONENTS ---
        const Icon = ({ d, size = 24, className = '', ...props }) =>
            React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round', className, ...props },
                ...(Array.isArray(d) ? d : [d]).map((path, i) => React.createElement('path', { key: i, d: path }))
            );

        const ChevronRight = (p) => <Icon {...p} d="M9 18l6-6-6-6" />;
        const ChevronLeft = (p) => <Icon {...p} d="M15 18l-6-6 6-6" />;
        const Calendar = (p) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={p.size || 24} height={p.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className || ''}>
                <rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><line x1="16" x2="16" y1="2" y2="6" /><line x1="8" x2="8" y1="2" y2="6" /><line x1="3" x2="21" y1="10" y2="10" />
            </svg>
        );
        const FileText = (p) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={p.size || 24} height={p.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className || ''}>
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" x2="8" y1="13" y2="13" /><line x1="16" x2="8" y1="17" y2="17" /><line x1="10" x2="8" y1="9" y2="9" />
            </svg>
        );
        const Upload = (p) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={p.size || 24} height={p.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className || ''}>
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" x2="12" y1="3" y2="15" />
            </svg>
        );
        const CheckCircle2 = (p) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={p.size || 24} height={p.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className || ''}>
                <circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" />
            </svg>
        );
        const AlertCircle = (p) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={p.size || 24} height={p.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className || ''}>
                <circle cx="12" cy="12" r="10" /><line x1="12" x2="12" y1="8" y2="12" /><line x1="12" x2="12.01" y1="16" y2="16" />
            </svg>
        );
        const ShieldAlert = (p) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={p.size || 24} height={p.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className || ''}>
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
            </svg>
        );

        // --- LOADING / ERROR STATES ---
        function LoadingState({ message }) {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 animate-fade-in text-white/90">
                    <div className="w-16 h-16 border-4 border-slate-700 border-t-brand-teal rounded-full animate-spin mb-6 shadow-lg shadow-brand-teal/20"></div>
                    <h2 className="text-xl font-bold font-display tracking-tight">{message}</h2>
                    <p className="text-slate-400 text-sm mt-2">Securing your environment...</p>
                </div>
            );
        }

        // --- COMPONENTS ---
        function Button({ children, onClick, disabled, variant = 'primary', className = '', ...props }) {
            const baseClass = "btn-ripple w-full py-3 px-6 rounded-xl font-medium transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none font-display tracking-wide focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900";
            const variants = {
                primary: "bg-brand-teal text-white font-bold hover:bg-[#006666] shadow-lg shadow-brand-teal/20 hover:shadow-brand-teal/40 border border-brand-teal/50 focus:ring-brand-teal",
                secondary: "bg-slate-800 text-slate-200 hover:bg-slate-700 border border-slate-700 hover:border-slate-500 focus:ring-slate-500",
                ghost: "bg-transparent text-slate-400 hover:text-white hover:bg-slate-800/50"
            };

            return (
                <button
                    onClick={(e) => { addRipple(e); if (onClick) onClick(e); }}
                    disabled={disabled}
                    className={`${baseClass} ${variants[variant]} ${className}`}
                    {...props}
                >
                    {children}
                </button>
            );
        }

        function StepIndicator({ current, total }) {
            // Endowed progress: start at ~15%
            const endowedProgress = 15;
            const realProgress = ((current - 1) / (total - 1)) * (100 - endowedProgress) + endowedProgress;

            return (
                <div className="mb-10 w-full max-w-sm mx-auto sr">
                    <div className="flex justify-between text-xs text-slate-500 font-medium mb-2">
                        <span>Step {current} of {total}</span>
                        <span>{Math.round(realProgress)}% complete</span>
                    </div>
                    <div className="prog-bar">
                        <div className="prog-fill" style={{ width: realProgress + '%' }}></div>
                    </div>
                </div>
            );
        }

        // --- MAIN APP ---
        function ComplianceOnboarding() {
            const [authState, setAuthState] = useState('loading');
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState({
                companyName: '',
                companyNumber: '',
                incorporationDate: '',
                financialYearEnd: '',
                statutory: null
            });

            // Authentication Guard
            useEffect(() => {
                const init = async () => {
                    try {
                        let attempts = 0;
                        while (typeof InclusiFundAuth === 'undefined' && attempts < 50) {
                            await new Promise(r => setTimeout(r, 100));
                            attempts++;
                        }

                        if (typeof InclusiFundAuth === 'undefined') {
                            throw new Error('Auth module not loaded');
                        }
                        const user = InclusiFundAuth.checkSession();
                        if (!user) {
                            setAuthState('redirecting');
                            window.location.href = 'https://tools.inclusifund.co.uk/log-in/user-account?redirect=compliance-onboarding';
                            return;
                        }
                        setAuthState('ready');
                    } catch (err) {
                        console.error('Auth init error:', err);
                        setAuthState('redirecting');
                        window.location.href = 'https://tools.inclusifund.co.uk/log-in/user-account?redirect=compliance-onboarding';
                    }
                };
                init();
            }, []);

            // Deadline Calculation Engine
            const calculateDeadlines = (incDateStr, fyeDateStr) => {
                if (!incDateStr || !fyeDateStr) return null;
                const incDate = new Date(incDateStr);
                const fyeDate = new Date(fyeDateStr);
                const now = new Date();

                // 1. STATUTORY: CS01 (Anniversary Logic)
                let csPeriodEnd = new Date(incDate);
                csPeriodEnd.setFullYear(csPeriodEnd.getFullYear() + 1);
                while (csPeriodEnd < now) {
                    csPeriodEnd.setFullYear(csPeriodEnd.getFullYear() + 1);
                }
                const csDue = new Date(csPeriodEnd);
                csDue.setDate(csDue.getDate() + 14);

                // 2. STATUTORY: Accounts & CIC34
                let accountsDue = new Date(fyeDate);
                accountsDue.setMonth(accountsDue.getMonth() + 9);

                const firstYearLimit = new Date(incDate);
                firstYearLimit.setMonth(firstYearLimit.getMonth() + 21);
                const diffMonths = (now - incDate) / (1000 * 60 * 60 * 24 * 30);

                if (diffMonths < 21 && accountsDue > firstYearLimit) {
                    accountsDue = firstYearLimit;
                }

                // 3. PREPARATION SCHEDULE
                const schedule = [];
                const accountsMilestones = [
                    { type: 'Bookkeeping Review', days: 90, desc: 'Draft management accounts locked.' },
                    { type: 'Director Review', days: 30, desc: 'Review draft accounts and CIC34.' },
                    { type: 'Final Approval', days: 14, desc: 'Board approval and signatures obtained.' },
                    { type: 'Window Opens', days: 7, desc: 'Submission window alert (final check).' }
                ];

                accountsMilestones.forEach(m => {
                    const d = new Date(accountsDue);
                    d.setDate(d.getDate() - m.days);
                    schedule.push({
                        milestone_type: m.type,
                        offset_days: m.days,
                        scheduled_date: d.toISOString().split('T')[0],
                        description: m.desc,
                        linked_task: 'accounts'
                    });
                });

                return {
                    statutory: {
                        cs01: csDue.toISOString().split('T')[0],
                        accounts: accountsDue.toISOString().split('T')[0],
                        cic34: accountsDue.toISOString().split('T')[0]
                    },
                    preparation_schedule: schedule
                };
            };

            // Trigger calc on date change
            useEffect(() => {
                if (data.incorporationDate && data.financialYearEnd) {
                    const deadlines = calculateDeadlines(data.incorporationDate, data.financialYearEnd);
                    setData(prev => ({ ...prev, statutory: deadlines }));
                }
            }, [data.incorporationDate, data.financialYearEnd]);

            // Submission Logic
            const handleFinish = async () => {
                setLoading(true);
                try {
                    if (window.convex && window.InclusiFundAuth) {
                        const convex = new window.convex.ConvexClient("https://terrific-bloodhound-927.convex.cloud");
                        const user = InclusiFundAuth.checkSession();

                        if (user) {
                            await convex.mutation("compliance:saveOnboarding", {
                                userId: user.email,
                                companyName: data.companyName,
                                companyNumber: data.companyNumber,
                                incorporationDate: data.incorporationDate,
                                financialYearEnd: data.financialYearEnd,
                                statutory: {
                                    cs01: { due_date: data.statutory.statutory.cs01 },
                                    accounts: { due_date: data.statutory.statutory.accounts },
                                    cic34: { due_date: data.statutory.statutory.cic34 }
                                },
                                preparationSchedule: data.statutory.preparation_schedule,
                                completedAt: new Date().toISOString()
                            });

                            const updatedUser = { ...user, compliance_completed: true };
                            InclusiFundAuth.setSession(updatedUser);
                        } else {
                            throw new Error("Session expired.");
                        }
                    } else {
                        throw new Error("Convex client not initialized.");
                    }

                    // Fire confetti on success
                    launchConfetti();

                    // Short delay so user sees confetti before redirect
                    await new Promise(r => setTimeout(r, 1500));

                    const params = new URLSearchParams(window.location.search);
                    const returnTo = params.get('returnTo');
                    window.location.href = returnTo || 'https://tools.inclusifund.co.uk/compliance-calendar';
                } catch (e) {
                    console.error("Submission error:", e);
                    setLoading(false);
                    alert("Error saving setup: " + e.message);
                }
            };

            // Gate Renders
            if (authState === 'loading') return <LoadingState message="Checking Authentication" />;
            if (authState === 'redirecting') return <LoadingState message="Redirecting to Login" />;

            return (
                <div className="w-full max-w-2xl mx-auto p-6 md:p-8 flex flex-col justify-center min-h-[85vh]">

                    {/* Header Block */}
                    <div className="text-center mb-10 sr">
                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-teal/10 border border-brand-teal/30 text-brand-light text-xs font-bold uppercase tracking-widest mb-4 shadow-[0_0_15px_rgba(0,128,128,0.2)]">
                            <Calendar size={14} /> Master Calendar Setup
                        </div>
                        <h1 className="text-4xl md:text-5xl font-display font-medium text-white mb-3 tracking-tight">System Initialization</h1>
                        <p className="text-slate-400 text-base max-w-md mx-auto">The Infrastructure Engine for UK CICs</p>
                    </div>

                    <StepIndicator current={step} total={3} />

                    <div className="glass-panel rounded-3xl p-8 md:p-10 sr relative overflow-visible">

                        {/* Decorative Background Element inside panel */}
                        <div className="absolute top-0 right-0 w-64 h-64 bg-brand-teal/5 rounded-bl-full pointer-events-none -z-10"></div>

                        {/* STEP 1: IDENTITY */}
                        {step === 1 && (
                            <div className="space-y-8 relative z-10 sr">
                                <h2 className="text-2xl font-display font-semibold text-white tracking-tight">Company Identity</h2>

                                <div className="space-y-5">
                                    <div className="group">
                                        <label className="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-2 group-focus-within:text-brand-teal transition-colors">Registered CIC Name</label>
                                        <input
                                            className="w-full px-5 py-4 rounded-xl flex-1 input-dark"
                                            placeholder="e.g. Community Impact CIC"
                                            value={data.companyName}
                                            onChange={e => setData({ ...data, companyName: e.target.value })}
                                            autoFocus
                                        />
                                    </div>
                                    <div className="group">
                                        <label className="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-2 group-focus-within:text-brand-teal transition-colors">Company Registration Number</label>
                                        <input
                                            className="w-full px-5 py-4 rounded-xl flex-1 input-dark font-mono"
                                            placeholder="e.g. 12345678"
                                            value={data.companyNumber}
                                            onChange={e => setData({ ...data, companyNumber: e.target.value })}
                                        />
                                    </div>
                                </div>

                                {/* Loss Aversion Block */}
                                <div className="loss-hl sr">
                                    <div className="flex items-start gap-3">
                                        <ShieldAlert size={20} className="text-red-400 shrink-0 mt-0.5" />
                                        <div>
                                            <p className="text-sm text-red-300 font-semibold mb-1">Missing deadlines costs CICs an average of 14 operating days per year</p>
                                            <p className="text-xs text-slate-400">Set up your compliance calendar now to avoid late filing penalties and regulatory action.</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="pt-4 space-y-4">
                                    <Button onClick={() => setStep(2)} disabled={!data.companyName}>
                                        Continue to Timeline <ChevronRight size={20} />
                                    </Button>
                                    <button
                                        onClick={() => window.location.href = 'https://tools.inclusifund.co.uk/dashboard'}
                                        className="w-full text-center text-sm text-slate-500 hover:text-white py-2 transition-colors font-medium"
                                    >
                                        Cancel & Return to Hub
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* STEP 2: DATES */}
                        {step === 2 && (
                            <div className="space-y-8 animate-fade-in relative z-10 sr">
                                <h2 className="text-2xl font-display font-semibold text-white tracking-tight">Timeline Mapping</h2>

                                <div className="space-y-5">
                                    <div className="group">
                                        <label className="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-2 group-focus-within:text-brand-teal transition-colors">Incorporation Date</label>
                                        <input
                                            type="date"
                                            className="w-full px-5 py-4 rounded-xl flex-1 input-dark font-mono text-sm"
                                            value={data.incorporationDate}
                                            onChange={e => {
                                                const d = e.target.value;
                                                if (d) {
                                                    const incDate = new Date(d);
                                                    const fye = new Date(incDate.getFullYear() + 1, incDate.getMonth() + 1, 0);
                                                    setData({ ...data, incorporationDate: d, financialYearEnd: fye.toISOString().split('T')[0] });
                                                } else {
                                                    setData({ ...data, incorporationDate: '' });
                                                }
                                            }}
                                        />
                                    </div>
                                    <div className="group">
                                        <label className="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-2 group-focus-within:text-brand-teal transition-colors">Financial Year End (FYE)</label>
                                        <input
                                            type="date"
                                            className="w-full px-5 py-4 rounded-xl flex-1 input-dark font-mono text-sm"
                                            value={data.financialYearEnd}
                                            onChange={e => setData({ ...data, financialYearEnd: e.target.value })}
                                        />
                                        <div className="mt-3 text-sm flex items-start gap-3 text-teal-200 bg-teal-900/30 p-4 rounded-xl border border-teal-500/20 shadow-inner">
                                            <AlertCircle size={18} className="text-teal-400 shrink-0 mt-0.5" />
                                            <span className="leading-relaxed">Usually the last day of the month one year after incorporation. Update if you've formally changed your Accounting Reference Date.</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Loss Aversion Block */}
                                <div className="loss-hl sr">
                                    <div className="flex items-start gap-3">
                                        <ShieldAlert size={20} className="text-red-400 shrink-0 mt-0.5" />
                                        <div>
                                            <p className="text-sm text-red-300 font-semibold mb-1">Wrong dates = wrong deadlines = potential Companies House penalties</p>
                                            <p className="text-xs text-slate-400">Double-check your incorporation date against your Certificate of Incorporation.</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-4 pt-4">
                                    <Button variant="ghost" onClick={() => setStep(1)} className="flex-1 border border-slate-700">
                                        <ChevronLeft size={20} /> Back
                                    </Button>
                                    <Button
                                        onClick={() => setStep(3)}
                                        disabled={!data.incorporationDate || !data.financialYearEnd}
                                        className="flex-[2.5]"
                                    >
                                        Generate Deadlines <ChevronRight size={20} />
                                    </Button>
                                </div>
                            </div>
                        )}

                        {/* STEP 3: DEADLINES REVIEW */}
                        {step === 3 && (
                            <div className="space-y-8 animate-fade-in relative z-10 sr">
                                <h2 className="text-2xl font-display font-semibold text-white tracking-tight">Verification</h2>
                                <p className="text-slate-400 text-sm">Please verify the orchestration engine has generated the correct statutory bounds before committing to the database.</p>

                                <div className="space-y-3">
                                    {[
                                        { label: 'Confirmation Statement', date: data.statutory?.statutory?.cs01, desc: '(CS01) Annual registry update', icon: <FileText size={20} className="text-brand-teal" />, glow: 'shadow-[0_0_15px_rgba(0,128,128,0.15)]' },
                                        { label: 'Statutory Accounts', date: data.statutory?.statutory?.accounts, desc: '(AA01) Financial disclosure', icon: <Calendar size={20} className="text-brand-teal" />, glow: 'shadow-[0_0_15px_rgba(0,128,128,0.15)]' },
                                        { label: 'Impact Narrative', date: data.statutory?.statutory?.cic34, desc: '(CIC34) Required by serving regulator', icon: <Upload size={20} className="text-brand-teal" />, glow: 'shadow-[0_0_15px_rgba(0,128,128,0.15)]' }
                                    ].map((item, i) => (
                                        <div key={i} className={`bg-slate-900/50 rounded-2xl p-4 border border-slate-700 flex items-center justify-between transition-all hover:bg-slate-800/80 ${item.glow} sr`}>
                                            <div className="flex items-center gap-4">
                                                <div className="bg-slate-800 p-2.5 rounded-xl border border-slate-700 shadow-inner">
                                                    {item.icon}
                                                </div>
                                                <div>
                                                    <div className="font-semibold text-white text-base tracking-tight">{item.label}</div>
                                                    <div className="text-xs text-slate-400 mt-0.5">{item.desc}</div>
                                                </div>
                                            </div>
                                            <div className="bg-brand-teal/10 text-brand-light border border-brand-teal/30 px-4 py-2 rounded-xl text-sm font-medium font-mono">
                                                {item.date ? new Date(item.date).toLocaleDateString('en-GB') : '--/--/----'}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Loss Aversion Block */}
                                <div className="loss-hl sr">
                                    <div className="flex items-start gap-3">
                                        <ShieldAlert size={20} className="text-red-400 shrink-0 mt-0.5" />
                                        <div>
                                            <p className="text-sm text-red-300 font-semibold mb-1">Once finalized, your compliance calendar will auto-generate reminders</p>
                                            <p className="text-xs text-slate-400">CICs that miss filing deadlines risk strike-off proceedings and director disqualification.</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-4 pt-4">
                                    <Button variant="ghost" onClick={() => setStep(2)} className="flex-1 border border-slate-700">
                                        <ChevronLeft size={20} /> Edit Dates
                                    </Button>
                                    <Button onClick={handleFinish} disabled={loading} className="flex-[2.5]">
                                        {loading ? (
                                            <>
                                                <div className="w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                                                Syncing...
                                            </>
                                        ) : (
                                            <>Finalize Protocol <CheckCircle2 size={20} /></>
                                        )}
                                    </Button>
                                </div>
                            </div>
                        )}

                    </div>

                    {/* Footer Tagline */}
                    <div className="text-center mt-8 sr">
                        <p className="text-xs text-slate-600 tracking-widest uppercase">The Infrastructure Engine for UK CICs</p>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ComplianceOnboarding />);
    </script>
</body>

</html>
