server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (mirrors vercel.json)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Strip trailing slashes (mirrors trailingSlash: false)
    rewrite ^/(.*)/$ /$1 permanent;

    # ── Explicit rewrites (mirrors vercel.json rewrites) ──
    rewrite ^/welcome$           /onboarding-dark.html last;
    rewrite ^/upgrade$           /upgrade-landing.html last;
    rewrite ^/upgrade-gift-97$   /early-access-lifetime.html last;
    rewrite ^/log-in/(.*)$       /login.html last;
    rewrite ^/log-in$            /login.html last;
    rewrite ^/dashboard/user-account$ /user-account-dashboard.html last;
    rewrite ^/tools$             /cic-tool-suite-landing.html last;
    rewrite ^/app/cic34-generator$ /cic34-generator.html last;
    rewrite ^/grants$            /opportunities-hub.html last;
    rewrite ^/grants-start$      /grants-onboarding-new.html last;
    rewrite ^/grant-onboarding$  /grants-onboarding-new.html last;
    rewrite ^/grant-custom$      /grants-custom.html last;
    rewrite ^/settings/user-account$ /settings.html last;
    rewrite ^/subscription/user-account$ /subscription.html last;
    rewrite ^/premium$           /premium-tools-dashboard.html last;

    # ── Clean URLs (mirrors cleanUrls: true) ──
    # Try exact file, then .html extension, then directory, then 404
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Cache static assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
