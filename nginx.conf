server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Strip trailing slashes
    rewrite ^/(.*)/$ /$1 permanent;

    # ‚îÄ‚îÄ 13 Essential Tool Routes ‚îÄ‚îÄ
    rewrite ^/login$               /login-2.0.html last;
    rewrite ^/onboarding$          /onboarding-2.0.html last;
    rewrite ^/dashboard$           /dashboard-2.0.html last;
    rewrite ^/premium$             /cic-premium-dashboard-2.0.html last;
    rewrite ^/eligibility$         /eligibility-checker-2.0.html last;
    rewrite ^/benefit-statement$   /benefit-statement-2.0.html last;
    rewrite ^/business-model$      /business-model-2.0.html last;
    rewrite ^/opportunities$       /opportunities-hub.html last;
    rewrite ^/grants-onboarding$   /grants-onboarding-2.0.html last;
    rewrite ^/grants-custom$       /grants-custom.html last;
    rewrite ^/cic34$               /cic34-generator-2.0.html last;
    rewrite ^/compliance-setup$    /compliance-onboarding-2.0.html last;
    rewrite ^/compliance-calendar$ /compliance-calendar-2.0.html last;
    rewrite ^/board-pack$          /board-pack-builder-2.0.html last;
    rewrite ^/upgrade$             /upgrade-landing-2.0.html last;

    # ‚îÄ‚îÄ Account Pages ‚îÄ‚îÄ
    rewrite ^/account$             /user-account-dashboard-2.0.html last;
    rewrite ^/settings$            /settings-2.0.html last;
    rewrite ^/subscription$        /subscription-2.0.html last;
    rewrite ^/support$             /support-2.0.html last;

    # ‚îÄ‚îÄ Legacy/Alias Routes ‚îÄ‚îÄ
    rewrite ^/tools$               /cic-tool-suite-landing-2.0.html last;
    rewrite ^/welcome$             /onboarding-dark-2.0.html last;
    rewrite ^/grants$              /opportunities-hub.html last;
    rewrite ^/grants-start$        /grants-onboarding-2.0.html last;
    rewrite ^/grant-onboarding$    /grants-onboarding-2.0.html last;
    rewrite ^/grant-custom$        /grants-custom.html last;
    rewrite ^/upgrade-gift-97$     /early-access-lifetime-2.0.html last;
    rewrite ^/log-in$              /login-2.0.html last;
    rewrite ^/log-in/(.*)$         /login-2.0.html last;
    rewrite ^/dashboard/user-account$ /user-account-dashboard-2.0.html last;
    rewrite ^/settings/user-account$  /settings-2.0.html last;
    rewrite ^/subscription/user-account$ /subscription-2.0.html last;
    rewrite ^/app/cic34-generator$ /cic34-generator-2.0.html last;

    # ‚îÄ‚îÄ Clean URLs: try exact file, then .html extension, then 404 ‚îÄ‚îÄ
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Cache static assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
