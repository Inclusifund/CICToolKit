<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InclusiFund - Find Your Grants</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Auth & Security -->
    <script src="assets/js/auth.js"></script>
    <script>
        // Enforce authentication
        if (!InclusiFundAuth.requireAuth()) {
            throw new Error("Redirecting to login...");
        }
    </script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet">

    <!-- Fix for Lucide-React UMD -->
    <script>
        window.react = window.React;
    </script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.min.js"></script>
    <script>
        window.lucide = window.LucideReact;
    </script>

    <!-- Convex Client -->
    <script src="https://unpkg.com/convex@1.16.4/dist/browser.bundle.js"></script>
    <script>
        window.Convex = window.convex;
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#1F2232',
                            primary: '#008080',
                            accent: '#6BB6B6',
                            secondary: '#005461',
                            light: '#D5ECEC',
                            white: '#FFFFFF',
                            slate: '#94A3B8',
                            border: '#334155',
                            card: '#2D3344',
                            gold: '#d4a853',
                            text: '#4B5563'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s ease-out forwards',
                        'slide-up': 'slideUp 0.6s ease-out forwards',
                        'scale-in': 'scaleIn 0.4s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1F2232;
            color: #F4F4F4;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1F2232; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Scroll Reveal */
        .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease-out, transform 0.7s ease-out; }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        /* Button Ripple */
        .ripple-btn { position: relative; overflow: hidden; }
        .ripple-btn .ripple-effect {
            position: absolute; border-radius: 50%; background: rgba(255,255,255,0.35);
            transform: scale(0); animation: rippleAnim 0.6s ease-out; pointer-events: none;
        }
        @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

        /* Social Proof Toast */
        .toast-enter { animation: toastSlideIn 0.5s ease-out forwards; }
        .toast-exit { animation: toastSlideOut 0.4s ease-in forwards; }
        @keyframes toastSlideIn { from { transform: translateX(-120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastSlideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-120%); opacity: 0; } }

        /* Loss Aversion */
        .loss-block { border-left: 4px solid #ef4444; background: rgba(239, 68, 68, 0.08); }

        /* Confetti */
        .confetti-piece {
            position: fixed; width: 10px; height: 10px; top: -10px;
            animation: confettiFall 3s ease-out forwards;
            z-index: 9999; pointer-events: none;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Endowed Progress */
        .progress-track { background: #334155; height: 6px; border-radius: 9999px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 9999px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); background: linear-gradient(90deg, #008080, #d4a853); }

        /* 3D Carousel — concave (cards curve toward viewer) */
        .carousel-scene { overflow: visible; perspective: 1200px; height: 340px; mask: linear-gradient(90deg, #0000, red 8% 92%, #0000); }
        .carousel-3d { display: grid; place-self: center; transform-style: preserve-3d; animation: carousel-rotate 36s linear infinite; height: 100%; place-items: center; }
        @keyframes carousel-rotate { to { rotate: y -1turn; } }
        .carousel-card {
            grid-area: 1/1; width: 150px; aspect-ratio: 7/10;
            backface-visibility: hidden; border-radius: 1em;
            transform: rotatey(calc(var(--i) * 1turn / var(--n))) translatez(calc((75px + .5em) / tan(.5turn / var(--n))));
            background: #2D3344; border: 1px solid #334155; padding: 0.875rem;
            display: flex; flex-direction: column; justify-content: space-between;
            transition: border-color 0.2s; font-size: 0.8rem;
        }
        .carousel-card:hover { border-color: #d4a853; }
        .carousel-scene:hover .carousel-3d { animation-play-state: paused; }
        /* Scroll pointer */
        .scroll-pointer { animation: bounce-down 1.5s ease-in-out infinite; }
        @keyframes bounce-down { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;
        const { ArrowRight, Check, Search, Download, RefreshCw, X, ChevronDown, ChevronRight, Star, Heart, AlertTriangle } = lucide;

        // --- CONVEX CLIENT ---
        const CONVEX_URL = "https://terrific-bloodhound-927.convex.cloud";
        const convexClient = new Convex.ConvexHttpClient(CONVEX_URL);

        // --- BEHAVIORAL SCIENCE UTILITIES ---

        const useScrollReveal = () => {
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(
                    (entries) => { entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); }); },
                    { threshold: 0.1 }
                );
                if (ref.current) {
                    ref.current.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                }
                return () => observer.disconnect();
            }, []);
            return ref;
        };

        const addRipple = (e) => {
            const btn = e.currentTarget;
            const rect = btn.getBoundingClientRect();
            const ripple = document.createElement('span');
            ripple.className = 'ripple-effect';
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        };

        const fireConfetti = () => {
            const colors = ['#008080', '#6BB6B6', '#d4a853', '#D5ECEC', '#FFFFFF'];
            for (let i = 0; i < 60; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 1.5 + 's';
                piece.style.animationDuration = (2 + Math.random() * 2) + 's';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.width = (6 + Math.random() * 8) + 'px';
                piece.style.height = (6 + Math.random() * 8) + 'px';
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), 5000);
            }
        };

        const SocialProofToast = () => {
            const [visible, setVisible] = useState(false);
            const [toastData, setToastData] = useState({});
            const toasts = [
                { name: "Nadia Patel", location: "Bradford", action: "just matched with 6 grants" },
                { name: "Daniel Wright", location: "Manchester", action: "exported their shortlist" },
                { name: "Priya Kumar", location: "Leicester", action: "saved 12 grants to their board" },
                { name: "Marcus Thompson", location: "Birmingham", action: "found a 94% match grant" },
            ];

            useEffect(() => {
                const showToast = () => {
                    const t = toasts[Math.floor(Math.random() * toasts.length)];
                    setToastData(t);
                    setVisible(true);
                    setTimeout(() => setVisible(false), 4000);
                };
                const timer = setTimeout(showToast, 6000);
                const interval = setInterval(showToast, 22000);
                return () => { clearTimeout(timer); clearInterval(interval); };
            }, []);

            if (!visible) return null;

            return (
                <div className={`fixed bottom-6 left-6 z-50 bg-brand-card border border-brand-border rounded-xl p-4 shadow-2xl max-w-xs ${visible ? 'toast-enter' : 'toast-exit'}`}>
                    <div className="flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full bg-brand-primary/20 flex items-center justify-center text-brand-accent font-bold text-sm">
                            {toastData.name?.split(' ').map(n => n[0]).join('')}
                        </div>
                        <div>
                            <p className="text-brand-white text-sm font-medium">{toastData.name} from {toastData.location}</p>
                            <p className="text-brand-slate text-xs">{toastData.action}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const LossAversion = ({ message }) => (
            <div className="loss-block rounded-lg p-4 my-4 flex items-start gap-3">
                <AlertTriangle className="text-red-400 flex-shrink-0 mt-0.5" size={18} />
                <p className="text-red-300 text-sm">{message}</p>
            </div>
        );

        // --- COMPONENTS ---

        const Button = ({ children, onClick, variant = 'primary', className = '', ...props }) => {
            const baseStyles = "ripple-btn py-3 px-6 rounded-full font-bold text-sm md:text-base transition-all duration-300 transform hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2 relative overflow-hidden shadow-lg";
            const variants = {
                primary: "bg-gradient-to-r from-brand-primary to-brand-accent text-brand-dark hover:shadow-brand-primary/20",
                secondary: "bg-transparent border-2 border-brand-primary text-brand-primary hover:bg-brand-primary/10",
                ghost: "bg-transparent text-brand-slate hover:text-brand-light",
                amber: "bg-brand-gold text-brand-dark hover:shadow-brand-gold/20"
            };

            return (
                <button
                    onClick={(e) => { addRipple(e); onClick && onClick(e); }}
                    className={`${baseStyles} ${variants[variant]} ${className}`}
                    {...props}
                >
                    {children}
                </button>
            );
        };

        // Endowed Progress Bar (starts at 15%)
        const EndowedProgressBar = ({ current, total }) => {
            const endowedPercent = 15;
            const realPercent = (current / total) * (100 - endowedPercent) + endowedPercent;
            return (
                <div className="mb-8">
                    <div className="flex justify-between text-xs text-brand-slate mb-2">
                        <span>Step {current} of {total}</span>
                        <span>{Math.round(realPercent)}% complete</span>
                    </div>
                    <div className="progress-track">
                        <div className="progress-fill" style={{ width: `${realPercent}%` }}></div>
                    </div>
                </div>
            );
        };

        const OptionCard = ({ icon, title, subtitle, selected, onClick, multi = false, className = '', color = 'tropical-teal' }) => {
            const borderColors = {
                'tropical-teal': 'border-brand-accent',
                'teal': 'border-brand-primary',
                'dark-teal': 'border-brand-secondary',
                'brown': 'border-[#A0522D]',
                'beige': 'border-[#D2B48C]',
                'gold': 'border-brand-gold'
            };

            const activeBorder = borderColors[color] || 'border-brand-primary';

            return (
                <button
                    onClick={onClick}
                    className={`w-full text-left p-5 rounded-2xl border transition-all duration-300 group relative overflow-hidden ${selected
                        ? `bg-brand-primary/10 ${activeBorder} shadow-[0_0_15px_rgba(0,128,128,0.15)]`
                        : 'bg-brand-card border-brand-border hover:border-brand-slate/50 hover:bg-brand-card/80'
                        } ${className}`}
                >
                    <div className="flex items-start gap-4 z-10 relative">
                        <div className={`mt-1 text-2xl transition-transform duration-300 ${selected ? 'scale-110' : 'group-hover:scale-110'}`}>
                            {icon}
                        </div>
                        <div className="flex-1">
                            <h3 className={`font-serif text-lg font-medium mb-1 transition-colors ${selected ? 'text-brand-primary' : 'text-brand-white'}`}>
                                {title}
                            </h3>
                            {subtitle && (
                                <p className="text-brand-slate text-sm leading-relaxed font-sans">
                                    {subtitle}
                                </p>
                            )}
                        </div>
                        {selected && (
                            <div className="w-6 h-6 rounded-full bg-brand-primary text-brand-dark flex items-center justify-center">
                                <Check size={14} strokeWidth={3} />
                            </div>
                        )}
                    </div>
                </button>
            );
        };

        // --- CLOSING SOON CAROUSEL ---
        const ClosingSoonCarousel = () => {
            const [grants, setGrants] = useState([]);

            useEffect(() => {
                async function fetchClosingSoon() {
                    try {
                        const allGrants = await convexClient.query("grants:listGrants", {});
                        const now = new Date();
                        const in30Days = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);
                        const closing = (allGrants || [])
                            .filter(g => g.status === 'Open' && g.deadline)
                            .filter(g => {
                                const d = new Date(g.deadline);
                                return d >= now && d <= in30Days;
                            })
                            .sort((a, b) => new Date(a.deadline) - new Date(b.deadline))
                            .slice(0, 12);
                        setGrants(closing.length > 0 ? closing : (allGrants || []).filter(g => g.status === 'Open').slice(0, 10));
                    } catch (err) {
                        console.error('Failed to fetch grants for carousel:', err);
                    }
                }
                fetchClosingSoon();
            }, []);

            if (grants.length === 0) return null;

            const daysUntil = (deadline) => {
                if (!deadline) return null;
                const diff = Math.ceil((new Date(deadline) - new Date()) / (1000 * 60 * 60 * 24));
                return diff;
            };

            const urgencyColor = (days) => {
                if (days === null) return '#94A3B8';
                if (days <= 7) return '#ef4444';
                if (days <= 14) return '#f59e0b';
                return '#22c55e';
            };

            const formatAmount = (min, max) => {
                const fmt = (n) => n >= 1000000 ? `£${(n/1000000).toFixed(1)}M` : n >= 1000 ? `£${(n/1000).toFixed(0)}K` : `£${n}`;
                if (min && max && min !== max) return `${fmt(min)} - ${fmt(max)}`;
                if (max) return `Up to ${fmt(max)}`;
                if (min) return `From ${fmt(min)}`;
                return '';
            };

            return (
                <div className="max-w-5xl mx-auto mt-12 mb-4">
                    <div className="text-center mb-6">
                        <h2 className="font-serif text-2xl text-brand-white mb-1">Closing Soon</h2>
                        <p className="text-brand-slate text-sm">These grants are closing within 30 days</p>
                    </div>
                    <div className="carousel-scene">
                        <div className="carousel-3d" style={{'--n': grants.length}}>
                            {grants.map((g, i) => {
                                const days = daysUntil(g.deadline);
                                return (
                                    <div key={g._id || i} className="carousel-card" style={{'--i': i}}>
                                        <div>
                                            <div className="flex items-center justify-between mb-3">
                                                <span className="text-xs font-medium px-2 py-0.5 rounded-full" style={{background: urgencyColor(days) + '22', color: urgencyColor(days)}}>
                                                    {days !== null ? (days <= 0 ? 'Closing today' : `${days}d left`) : 'Rolling'}
                                                </span>
                                                <span className="text-xs text-brand-slate">{g.opportunityType || 'Grant'}</span>
                                            </div>
                                            <h4 className="text-brand-white font-semibold text-sm leading-tight mb-2" style={{display: '-webkit-box', WebkitLineClamp: 3, WebkitBoxOrient: 'vertical', overflow: 'hidden'}}>{g.name}</h4>
                                            <p className="text-brand-slate text-xs mb-2">{g.funder}</p>
                                        </div>
                                        <div>
                                            <div className="text-brand-gold font-semibold text-sm mb-2">{formatAmount(g.minAmount, g.maxAmount)}</div>
                                            <div className="flex flex-wrap gap-1">
                                                {(g.sectors || []).slice(0, 2).map((s, j) => (
                                                    <span key={j} className="text-[10px] bg-brand-border/50 text-brand-slate px-1.5 py-0.5 rounded">{s}</span>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // --- SCREENS ---

        const Screen0_Entry = ({ onChoice }) => (
            <div className="max-w-5xl mx-auto px-4 py-8 animate-fade-in">
                {/* Section 1: Closing Soon + 3D Carousel */}
                <ClosingSoonCarousel />

                {/* Scroll pointer to cards below */}
                <div className="text-center my-10">
                    <p className="text-brand-slate text-sm mb-3">Choose how to explore</p>
                    <div className="scroll-pointer inline-block">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#d4a853" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M12 5v14M19 12l-7 7-7-7" />
                        </svg>
                    </div>
                </div>

                {/* Section 2: Two action cards */}
                <div className="grid md:grid-cols-2 gap-6 max-w-3xl mx-auto">
                    {/* Personalised Board Card */}
                    <button
                        onClick={() => window.location.href = 'grants-custom.html'}
                        className="ripple-btn bg-brand-card border border-brand-border rounded-3xl p-8 hover:border-brand-primary transition-all duration-300 transform hover:-translate-y-1 text-left relative overflow-hidden group shadow-sm"
                    >
                        <div className="text-4xl mb-6">&#127919;</div>
                        <h3 className="font-serif text-2xl text-brand-white mb-2 group-hover:text-brand-primary transition-colors">Personalised Board</h3>
                        <p className="text-brand-slate mb-6 h-12">Get a tailored grant board matched to your CIC's sector, size and goals.</p>
                        <div className="flex items-center justify-between mt-auto">
                            <span className="text-sm text-brand-slate flex items-center gap-1">&#9201; 2 minutes</span>
                            <span className="text-brand-primary font-bold flex items-center gap-1 group-hover:translate-x-1 transition-transform">
                                Get Started <ArrowRight size={18} />
                            </span>
                        </div>
                    </button>

                    {/* Full List Card - RECOMMENDED */}
                    <button
                        onClick={() => window.location.href = 'opportunities-hub.html'}
                        className="ripple-btn bg-brand-card border-2 border-brand-gold rounded-3xl p-8 hover:border-brand-gold transition-all duration-300 transform hover:-translate-y-1 text-left group shadow-lg shadow-brand-gold/10 relative overflow-hidden"
                    >
                        <div className="absolute top-0 right-0 bg-brand-gold text-brand-dark text-xs font-bold px-3 py-1 rounded-bl-xl">
                            RECOMMENDED
                        </div>
                        <div className="text-4xl mb-6">&#128203;</div>
                        <h3 className="font-serif text-2xl text-brand-white mb-2 group-hover:text-brand-gold transition-colors">See Full List</h3>
                        <p className="text-brand-slate mb-6 h-12">Browse all 40+ grants with standard filters and search.</p>
                        <div className="flex items-center justify-between mt-auto">
                            <span className="text-sm text-brand-slate">You can filter later</span>
                            <span className="text-brand-gold font-bold flex items-center gap-1 group-hover:translate-x-1 transition-transform">
                                Show All <ArrowRight size={18} />
                            </span>
                        </div>
                    </button>
                </div>
            </div>
        );

        const Screen1_Sectors = ({ data, setData, onNext }) => {
            const options = [
                { id: 'Arts & Culture', icon: '&#127912;', title: 'Arts & Culture' },
                { id: 'Community Development', icon: '&#128170;&#127997;', title: 'Community Development' },
                { id: 'Education & Training', icon: '&#127891;', title: 'Education & Training' },
                { id: 'Employment & Skills', icon: '&#129309;&#127997;', title: 'Employment & Skills' },
                { id: 'Environment & Sustainability', icon: '&#127793;', title: 'Environment & Sustainability' },
                { id: 'Health & Wellbeing', icon: '&#10084;&#65039;', title: 'Health & Wellbeing' },
                { id: 'Housing', icon: '&#127968;', title: 'Housing' },
                { id: 'Sport & Recreation', icon: '&#9917;', title: 'Sport & Recreation' },
                { id: 'Youth Services', icon: '&#128118;', title: 'Youth Services' },
                { id: 'Food & Agriculture', icon: '&#127822;', title: 'Food & Agriculture' },
                { id: 'Digital & Technology', icon: '&#128187;', title: 'Digital & Technology' },
                { id: 'Other', icon: '&#127775;', title: 'Other' },
            ];

            const toggle = (id) => {
                const current = data.sectors || [];
                const updated = current.includes(id) ? current.filter(s => s !== id) : [...current, id];
                setData({ ...data, sectors: updated });
            };

            return (
                <div className="max-w-2xl mx-auto animate-slide-up">
                    <EndowedProgressBar current={1} total={5} />
                    <h2 className="font-serif text-3xl md:text-4xl text-brand-white mb-3 text-center">Which sectors does your CIC work in?</h2>
                    <p className="text-brand-slate text-center mb-8">Select all that apply</p>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        {options.map((opt) => (
                            <OptionCard
                                key={opt.id}
                                {...opt}
                                selected={data.sectors?.includes(opt.id)}
                                onClick={() => toggle(opt.id)}
                            />
                        ))}
                    </div>

                    <div className="flex justify-end">
                        <Button
                            onClick={onNext}
                            disabled={!data.sectors?.length}
                            className={!data.sectors?.length ? 'opacity-50 cursor-not-allowed' : 'bg-brand-gold text-brand-dark'}
                        >
                            Continue <ArrowRight size={20} />
                        </Button>
                    </div>
                </div>
            );
        };

        const Screen2_Region = ({ data, setData, onNext }) => {
            const options = [
                { id: 'UK-wide', icon: '&#127468;&#127463;', title: 'UK-wide (All regions)' },
                { id: 'England', icon: '&#127988;&#917607;&#917602;&#917605;&#917614;&#917607;&#917631;', title: 'England' },
                { id: 'Scotland', icon: '&#127988;&#917607;&#917602;&#917619;&#917603;&#917620;&#917631;', title: 'Scotland' },
                { id: 'Wales', icon: '&#127988;&#917607;&#917602;&#917623;&#917612;&#917619;&#917631;', title: 'Wales' },
                { id: 'Northern Ireland', icon: '&#127470;&#127466;', title: 'Northern Ireland' },
            ];

            const handleSelect = (id) => {
                setData({ ...data, regions: [id] });
            };

            return (
                <div className="max-w-xl mx-auto animate-slide-up">
                    <EndowedProgressBar current={2} total={5} />
                    <h2 className="font-serif text-3xl md:text-4xl text-brand-white mb-3 text-center">Where does your CIC operate?</h2>
                    <p className="text-brand-slate text-center mb-8">We'll prioritize grants near you</p>

                    <div className="space-y-4 mb-8">
                        {options.map((opt) => (
                            <OptionCard key={opt.id} {...opt} selected={data.regions?.includes(opt.id)} onClick={() => handleSelect(opt.id)} />
                        ))}
                    </div>

                    <div className="flex justify-end">
                        <Button onClick={onNext} disabled={!data.regions?.length} className="bg-brand-gold text-brand-dark">
                            Continue <ArrowRight size={20} />
                        </Button>
                    </div>
                </div>
            );
        };

        const Screen3_Amount = ({ data, setData, onNext }) => {
            const options = [
                { id: 'micro', min: 0, max: 1000, icon: '&#128176;', title: 'Micro', subtitle: 'Up to \u00A31,000 (Quick wins)' },
                { id: 'small', min: 1000, max: 5000, icon: '&#128181;', title: 'Small', subtitle: '\u00A31,000 - \u00A35,000 (Projects)' },
                { id: 'medium', min: 5000, max: 25000, icon: '&#128183;', title: 'Medium', subtitle: '\u00A35,000 - \u00A325,000 (Core/Project)' },
                { id: 'large', min: 25000, max: 100000, icon: '&#128184;', title: 'Large', subtitle: '\u00A325,000 - \u00A3100,000 (Salaries/Growth)' },
                { id: 'major', min: 100000, max: 10000000, icon: '&#127942;', title: 'Major', subtitle: '\u00A3100,000+ (Capital/Scale)' },
            ];

            const handleSelect = (opt) => {
                setData({ ...data, amountMin: opt.min, amountMax: opt.max, amountLabel: opt.id });
            };

            return (
                <div className="max-w-xl mx-auto animate-slide-up">
                    <EndowedProgressBar current={3} total={5} />
                    <h2 className="font-serif text-3xl md:text-4xl text-brand-white mb-3 text-center">How much funding helps?</h2>
                    <p className="text-brand-slate text-center mb-8">Select your target range</p>

                    <div className="space-y-4 mb-8">
                        {options.map((opt) => (
                            <OptionCard key={opt.id} {...opt} selected={data.amountLabel === opt.id} onClick={() => handleSelect(opt)} color="teal" />
                        ))}
                    </div>

                    <div className="flex justify-end">
                        <Button onClick={onNext} disabled={!data.amountLabel} className="bg-brand-gold text-brand-dark">
                            Continue <ArrowRight size={20} />
                        </Button>
                    </div>
                </div>
            );
        };

        const Screen4_Stage = ({ data, setData, onNext }) => {
            const options = [
                { id: 'Pre-launch', icon: '&#127793;', title: 'Pre-launch', subtitle: 'Planning & incorporation stage' },
                { id: 'Startup', icon: '&#128640;', title: 'Less than 1 year', subtitle: 'Early stage & testing' },
                { id: 'Operating', icon: '&#128200;', title: '1-2 years operating', subtitle: 'Growth & sustainability' },
                { id: 'Established', icon: '&#128170;&#127997;', title: '3-5 years established', subtitle: 'Scaling & expansion' },
                { id: 'Mature', icon: '&#127942;', title: '5+ years mature', subtitle: 'Innovation & partnership' },
            ];

            const handleSelect = (id) => {
                setData({ ...data, cicStage: id });
            };

            return (
                <div className="max-w-xl mx-auto animate-slide-up">
                    <EndowedProgressBar current={4} total={5} />
                    <h2 className="font-serif text-3xl md:text-4xl text-brand-white mb-3 text-center">What stage is your CIC?</h2>
                    <p className="text-brand-slate text-center mb-8">Some grants prefer specific maturity levels</p>

                    <div className="space-y-4 mb-8">
                        {options.map((opt) => (
                            <OptionCard key={opt.id} {...opt} selected={data.cicStage === opt.id} onClick={() => handleSelect(opt.id)} color="dark-teal" />
                        ))}
                    </div>

                    <div className="flex justify-end">
                        <Button onClick={onNext} disabled={!data.cicStage} className="bg-brand-gold text-brand-dark">
                            Continue <ArrowRight size={20} />
                        </Button>
                    </div>
                </div>
            );
        };

        const Screen5_Priority = ({ data, setData, onNext }) => {
            const options = [
                { id: 'urgent', icon: '&#9889;', title: 'Urgent', subtitle: 'Deadlines closing next 30 days' },
                { id: 'strategic', icon: '&#127919;', title: 'Strategic Match', subtitle: 'Best overall fit for my profile' },
                { id: 'maximum', icon: '&#128176;', title: 'Maximum Amount', subtitle: 'Show largest grants first' },
                { id: 'easy', icon: '&#9989;', title: 'Easy to Apply', subtitle: 'Simpler forms, higher success rates' },
                { id: 'new', icon: '&#127381;', title: 'New Opportunities', subtitle: 'Recently added grants' },
            ];

            const handleSelect = (id) => {
                setData({ ...data, priority: id });
            };

            return (
                <div className="max-w-xl mx-auto animate-slide-up">
                    <EndowedProgressBar current={5} total={5} />
                    <h2 className="font-serif text-3xl md:text-4xl text-brand-white mb-3 text-center">What's most important?</h2>
                    <p className="text-brand-slate text-center mb-8">This helps us rank your results</p>

                    <div className="space-y-4 mb-8">
                        {options.map((opt) => (
                            <OptionCard key={opt.id} {...opt} selected={data.priority === opt.id} onClick={() => handleSelect(opt.id)} color="brown" />
                        ))}
                    </div>

                    <div className="flex justify-end">
                        <Button
                            onClick={onNext}
                            disabled={!data.priority}
                            className="bg-brand-gold text-brand-dark w-full md:w-auto"
                        >
                            Show My Matches <ArrowRight size={20} />
                        </Button>
                    </div>
                </div>
            );
        };

        const Results_Screen = ({ data, onRetry, grants = [] }) => {
            const [matchedGrants, setMatchedGrants] = useState([]);
            const containerRef = useScrollReveal();

            useEffect(() => {
                if (!grants.length) return;

                const SECTOR_MAP = {
                    'Arts & Culture': ['Arts', 'Arts & Culture', 'Creative Sector', 'Culture', 'Performing Arts', 'Visual Arts', 'Heritage'],
                    'Community Development': ['Community', 'Community Development', 'Local support', 'Community Support', 'Social Cohesion', 'Place-based', 'Community Transformation', 'Grassroots Initiatives', 'Infrastructure'],
                    'Environment & Sustainability': ['Climate Action', 'Sustainability', 'Environment', 'Nature conservation', 'Green energy', 'Circular Economy', 'Sustainable Development'],
                    'Health & Wellbeing': ['Health', 'Mental Health', 'Wellbeing', 'Health & Wellbeing', 'Public Health', 'Disability Support'],
                    'Education & Training': ['Education', 'Training', 'Education & Training', 'Schools', 'Literacy', 'Skills'],
                    'Employment & Skills': ['Employability', 'Green Skills', 'Training', 'Vocational', 'Apprenticeships', 'Jobs'],
                    'Youth Services': ['Young People', 'Youth', 'Youth Services', 'Youth Development', 'Children'],
                    'Housing': ['Housing', 'Homelessness', 'Social Housing', 'Accommodation'],
                    'Sport & Recreation': ['Sport', 'Recreation', 'Physical Activity', 'Sporting'],
                    'Food & Agriculture': ['Food', 'Agriculture', 'Food Security', 'Farming']
                };

                let filtered = grants.filter(grant => {
                    const userRegion = data.regions?.[0] || 'UK-wide';
                    const regionMatch = grant.regions.includes('UK-wide') || grant.regions.includes('UK') || (data.regions && grant.regions.some(r => data.regions.includes(r)));
                    const userMin = data.amountMin !== undefined ? data.amountMin : 0;
                    const userMax = data.amountMax !== undefined ? data.amountMax : 10000000;
                    const amountMatch = (grant.minAmount <= userMax) && (grant.maxAmount >= userMin || grant.maxAmount === 0);
                    let sectorMatch = true;
                    if (data.sectors && data.sectors.length > 0) {
                        sectorMatch = grant.sectors.some(s => data.sectors.some(u => (SECTOR_MAP[u] && SECTOR_MAP[u].includes(s)) || s === u));
                    }
                    return regionMatch && amountMatch && sectorMatch;
                });

                filtered = filtered.map(grant => {
                    let score = 70;
                    const commonSectors = grant.sectors.filter(s => data.sectors.some(u => (SECTOR_MAP[u] && SECTOR_MAP[u].includes(s)) || s === u));
                    score += commonSectors.length * 5;
                    if (data.regions && grant.regions.includes(data.regions[0])) score += 10;
                    if (data.priority === 'urgent' && grant.deadline) score += 5;
                    if (data.priority === 'easy' && grant.applicationDifficulty <= 2) score += 15;
                    if (data.priority === 'maximum' && grant.maxAmount > 50000) score += 10;
                    return { ...grant, matchScore: Math.min(score, 99) };
                });

                if (data.priority === 'maximum') {
                    filtered.sort((a, b) => b.maxAmount - a.maxAmount);
                } else if (data.priority === 'easy') {
                    filtered.sort((a, b) => a.applicationDifficulty - b.applicationDifficulty);
                } else {
                    filtered.sort((a, b) => b.matchScore - a.matchScore);
                }

                setMatchedGrants(filtered);

                // Fire confetti on results
                setTimeout(fireConfetti, 500);
            }, [data, grants]);

            const downloadCSV = () => {
                const headers = ["Grant Name", "Funder", "Min Amount", "Max Amount", "Deadline", "Match Score", "Website"];
                const rows = matchedGrants.map(g => [
                    `"${g.name}"`, `"${g.funder}"`, g.minAmount, g.maxAmount, g.deadline || "Rolling", `${g.matchScore}%`, g.website
                ]);
                const csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "inclusifund_matches.csv");
                document.body.appendChild(link);
                link.click();
            };

            return (
                <div className="max-w-6xl mx-auto px-4 py-8 animate-fade-in pb-24" ref={containerRef}>
                    {/* Celebration Header */}
                    <div className="reveal bg-brand-card border border-brand-primary/30 rounded-3xl p-8 mb-8 text-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-brand-primary to-brand-gold"></div>
                        <div className="text-5xl mb-4">&#127881;</div>
                        <h1 className="font-serif text-4xl text-brand-white mb-2">
                            Found {matchedGrants.length} grants for your CIC
                        </h1>
                        <p className="text-brand-slate text-lg mb-8">
                            Filtered from our database based on your profile
                        </p>

                        <div className="flex flex-col md:flex-row gap-4 justify-center">
                            <Button variant="amber" onClick={downloadCSV} className="w-full md:w-auto px-8">
                                <Download size={20} /> Download Matches (CSV)
                            </Button>
                            <Button variant="secondary" onClick={() => { }} className="w-full md:w-auto">
                                &#9993;&#65039; Email me this list
                            </Button>
                        </div>
                    </div>

                    {/* Filter Summary */}
                    <div className="reveal flex flex-wrap gap-2 mb-8 items-center">
                        <span className="text-brand-slate text-sm mr-2">Filters:</span>
                        {data.sectors.slice(0, 3).map(s => (
                            <span key={s} className="bg-brand-dark border border-brand-border px-3 py-1 rounded-full text-xs text-brand-light flex items-center gap-1">
                                {s}
                            </span>
                        ))}
                        {data.regions.map(r => (
                            <span key={r} className="bg-brand-dark border border-brand-border px-3 py-1 rounded-full text-xs text-brand-light flex items-center gap-1">
                                {r}
                            </span>
                        ))}
                        <button onClick={onRetry} className="text-xs text-brand-primary underline ml-2 hover:text-brand-light">
                            Adjust Filters
                        </button>
                    </div>

                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {matchedGrants.map((grant, idx) => (
                            <div key={grant.id} className="reveal bg-brand-card border border-brand-border rounded-xl p-6 flex flex-col hover:border-brand-primary/50 transition-all group relative hover:-translate-y-1" style={{ transitionDelay: `${Math.min(idx * 60, 400)}ms` }}>
                                {grant.matchScore > 90 && (
                                    <div className="absolute top-4 right-4 bg-brand-primary/20 text-brand-primary text-xs font-bold px-2 py-1 rounded">
                                        {grant.matchScore}% Match
                                    </div>
                                )}
                                <div className="text-xs text-brand-slate uppercase tracking-wider mb-2">{grant.funder}</div>
                                <h3 className="font-serif text-xl text-brand-white mb-2 group-hover:text-brand-primary transition-colors">
                                    {grant.name}
                                </h3>
                                <div className="flex flex-wrap gap-2 mb-4">
                                    <span className="text-xs bg-brand-dark px-2 py-1 rounded text-brand-slate">
                                        {'\u00A3'}{grant.minAmount.toLocaleString()} - {'\u00A3'}{grant.maxAmount.toLocaleString()}
                                    </span>
                                    <span className="text-xs bg-brand-dark px-2 py-1 rounded text-brand-slate">
                                        {grant.deadline || "Rolling"}
                                    </span>
                                </div>
                                <p className="text-brand-slate text-sm mb-6 flex-1">
                                    {grant.description}
                                </p>
                                <div className="flex gap-2 mt-auto">
                                    <a href={grant.website} target="_blank" onClick={addRipple} className="ripple-btn flex-1 bg-brand-primary/10 hover:bg-brand-primary/20 text-brand-primary text-center py-2 rounded-lg text-sm font-medium transition-colors">
                                        View Details
                                    </a>
                                </div>
                            </div>
                        ))}
                        <div className="md:col-span-2 lg:col-span-3 text-center py-8 reveal">
                            <p className="text-brand-slate mb-4">Didn't find what you need?</p>
                            <button onClick={() => window.location.reload()} className="text-brand-light hover:text-brand-primary font-medium transition-colors">
                                Show all 40+ grants &rarr;
                            </button>
                        </div>
                    </div>
                </div>
            );
        };


        // --- MAIN APP ---

        const App = () => {
            const [step, setStep] = useState(0);
            const [grants, setGrants] = useState([]);
            const [loading, setLoading] = useState(true);
            const [data, setData] = useState({
                sectors: [],
                regions: [],
                amountMin: 0,
                amountMax: 1000000,
                cicStage: '',
                priority: ''
            });

            useEffect(() => {
                const fetchGrants = async () => {
                    try {
                        const result = await convexClient.query("grants:listGrants");
                        const transformed = result.map(g => ({
                            ...g,
                            name: g.grantName || 'Unnamed Grant',
                            minAmount: g.amountMin || 0,
                            maxAmount: g.amountMax || 0,
                            sectors: g.eligibleSectors || [],
                            regions: [g.geographicFocus || 'UK-wide'],
                            status: g.status === 'Open Now' ? 'Open' : g.status,
                            website: g.website || '#',
                            description: g.description || 'No description available.',
                            funder: g.funder || 'Various'
                        }));
                        setGrants(transformed);
                    } catch (error) {
                        console.error("Error fetching grants:", error);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchGrants();
            }, []);

            const next = () => setStep(s => s + 1);
            const back = () => setStep(s => s - 1);
            const handleChoice = (choice) => {
                if (choice === 'customize') {
                    next();
                } else {
                    setStep(6);
                }
            };
            const reset = () => {
                setStep(0);
                setData({ sectors: [], regions: [], amountMin: 0, amountMax: 1000000, cicStage: '', priority: '' });
            };

            return (
                <div className="min-h-screen bg-brand-dark text-brand-light font-sans selection:bg-brand-primary/30">
                    {/* Social Proof Toast */}
                    <SocialProofToast />

                    {/* Header */}
                    <div className="p-6 flex justify-between items-center max-w-6xl mx-auto">
                        <div className="font-serif text-2xl text-brand-primary font-bold tracking-tighter">InclusiFund</div>
                        {step > 0 && step < 6 && (
                            <button onClick={back} className="text-brand-slate hover:text-brand-white transition-colors">
                                Back
                            </button>
                        )}
                        {step === 6 && (
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-full bg-brand-card flex items-center justify-center border border-brand-border">
                                    &#128100;
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Content Area */}
                    <main className="container mx-auto px-4 py-4 md:py-8">
                        {step === 0 && <Screen0_Entry onChoice={handleChoice} />}
                        {step === 1 && <Screen1_Sectors data={data} setData={setData} onNext={next} />}
                        {step === 2 && <Screen2_Region data={data} setData={setData} onNext={next} />}
                        {step === 3 && <Screen3_Amount data={data} setData={setData} onNext={next} />}
                        {step === 4 && <Screen4_Stage data={data} setData={setData} onNext={next} />}
                        {step === 5 && <Screen5_Priority data={data} setData={setData} onNext={next} />}
                        {step === 6 && (
                            loading ? (
                                <div className="text-center py-20">
                                    <div className="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-brand-primary"></div>
                                    <p className="text-brand-slate mt-4">Loading grants...</p>
                                </div>
                            ) : (
                                <Results_Screen data={data} onRetry={() => setStep(1)} grants={grants} />
                            )
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="assets/js/v2-nav-consistency.js"></script>
</body>

</html>
