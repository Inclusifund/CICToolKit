<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InclusiFund - Browse All Grants</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Auth & Security -->
    <script src="assets/js/auth.js"></script>
    <script>
        // Enforce authentication
        if (!InclusiFundAuth.requireAuth()) {
            throw new Error("Redirecting to login...");
        }
    </script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet">

    <!-- Fix for Lucide-React UMD -->
    <script>
        window.react = window.React;
    </script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.min.js"></script>
    <script>
        window.lucide = window.LucideReact;
    </script>

    <!-- Convex Client -->
    <script src="https://unpkg.com/convex@1.16.4/dist/browser.bundle.js"></script>
    <script>
        window.Convex = window.convex;
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#1F2232',
                            primary: '#008080',
                            accent: '#6BB6B6',
                            secondary: '#005461',
                            light: '#D5ECEC',
                            white: '#FFFFFF',
                            slate: '#94A3B8',
                            border: '#334155',
                            card: '#2D3344',
                            gold: '#d4a853',
                            text: '#4B5563'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1F2232;
            color: #F4F4F4;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1F2232;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Scroll Reveal */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease-out, transform 0.7s ease-out;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Button Ripple */
        .ripple-btn {
            position: relative;
            overflow: hidden;
        }
        .ripple-btn .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* Social Proof Toast */
        .toast-enter {
            animation: toastSlideIn 0.5s ease-out forwards;
        }
        .toast-exit {
            animation: toastSlideOut 0.4s ease-in forwards;
        }
        @keyframes toastSlideIn {
            from { transform: translateX(-120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toastSlideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(-120%); opacity: 0; }
        }

        /* Loss Aversion */
        .loss-block {
            border-left: 4px solid #ef4444;
            background: rgba(239, 68, 68, 0.08);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const { Search, Filter, X, ExternalLink, ChevronDown, ArrowLeft, AlertTriangle } = lucide;

        // Convex Client
        const CONVEX_URL = "https://terrific-bloodhound-927.convex.cloud";
        const convexClient = new Convex.ConvexHttpClient(CONVEX_URL);

        // --- BEHAVIORAL SCIENCE UTILITIES ---

        // Scroll Reveal Hook
        const useScrollReveal = () => {
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                entry.target.classList.add('visible');
                            }
                        });
                    },
                    { threshold: 0.1 }
                );
                if (ref.current) {
                    const elements = ref.current.querySelectorAll('.reveal');
                    elements.forEach(el => observer.observe(el));
                }
                return () => observer.disconnect();
            }, []);
            return ref;
        };

        // Button Ripple
        const addRipple = (e) => {
            const btn = e.currentTarget;
            const rect = btn.getBoundingClientRect();
            const ripple = document.createElement('span');
            ripple.className = 'ripple-effect';
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        };

        // Social Proof Toast
        const SocialProofToast = () => {
            const [visible, setVisible] = useState(false);
            const [toastData, setToastData] = useState({});
            const toasts = [
                { name: "Tanya H.", location: "Nottingham", action: "just downloaded 3 grant matches" },
                { name: "Daniel Wright", location: "Manchester", action: "applied for a community grant" },
                { name: "Priya Kumar", location: "Leicester", action: "saved 12 grants to their board" },
                { name: "Marcus Thompson", location: "Birmingham", action: "exported their grant list" },
                { name: "Amira Osei", location: "London", action: "matched with 8 new grants" },
            ];

            useEffect(() => {
                const showToast = () => {
                    const t = toasts[Math.floor(Math.random() * toasts.length)];
                    setToastData(t);
                    setVisible(true);
                    setTimeout(() => setVisible(false), 4000);
                };
                const timer = setTimeout(showToast, 8000);
                const interval = setInterval(showToast, 25000);
                return () => { clearTimeout(timer); clearInterval(interval); };
            }, []);

            if (!visible) return null;

            return (
                <div className={`fixed bottom-6 left-6 z-50 bg-brand-card border border-brand-border rounded-xl p-4 shadow-2xl max-w-xs ${visible ? 'toast-enter' : 'toast-exit'}`}>
                    <div className="flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full bg-brand-primary/20 flex items-center justify-center text-brand-primary font-bold text-sm">
                            {toastData.name?.split(' ').map(n => n[0]).join('')}
                        </div>
                        <div>
                            <p className="text-brand-white text-sm font-medium">{toastData.name} from {toastData.location}</p>
                            <p className="text-brand-slate text-xs">{toastData.action}</p>
                        </div>
                    </div>
                </div>
            );
        };

        // Loss Aversion Block
        const LossAversion = ({ message }) => (
            <div className="loss-block rounded-lg p-4 my-4 flex items-start gap-3">
                <AlertTriangle className="text-red-400 flex-shrink-0 mt-0.5" size={18} />
                <p className="text-red-300 text-sm">{message}</p>
            </div>
        );

        const App = () => {
            const [grants, setGrants] = useState([]);
            const [filteredGrants, setFilteredGrants] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedSectors, setSelectedSectors] = useState([]);
            const [selectedRegions, setSelectedRegions] = useState([]);
            const [selectedStatus, setSelectedStatus] = useState('Open');
            const [sortBy, setSortBy] = useState('name');
            const [showFilters, setShowFilters] = useState(false);
            const containerRef = useScrollReveal();

            // Fetch grants from Convex
            useEffect(() => {
                const fetchGrants = async () => {
                    try {
                        const result = await convexClient.query("grants:getAllGrants");
                        const transformed = result.map(g => ({
                            ...g,
                            name: g.grantName || 'Unnamed Grant',
                            minAmount: g.amountMin || 0,
                            maxAmount: g.amountMax || 0,
                            sectors: g.eligibleSectors || [],
                            regions: [g.geographicFocus || 'UK-wide'],
                            status: g.status === 'Open Now' ? 'Open' : g.status
                        }));
                        setGrants(transformed);
                        setFilteredGrants(transformed);
                    } catch (error) {
                        console.error("Error fetching grants:", error);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchGrants();
            }, []);

            const allSectors = [...new Set(grants.flatMap(g => g.sectors))].sort();
            const allRegions = [...new Set(grants.flatMap(g => g.regions))].sort();

            // Apply filters
            useEffect(() => {
                let filtered = grants;

                if (selectedStatus) {
                    filtered = filtered.filter(g => g.status === selectedStatus);
                }
                if (searchTerm) {
                    filtered = filtered.filter(g =>
                        g.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        g.funder.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        g.description.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                }
                if (selectedSectors.length > 0) {
                    filtered = filtered.filter(g =>
                        g.sectors.some(s => selectedSectors.includes(s))
                    );
                }
                if (selectedRegions.length > 0) {
                    filtered = filtered.filter(g =>
                        g.regions.includes('UK-wide') ||
                        g.regions.some(r => selectedRegions.includes(r))
                    );
                }

                filtered = [...filtered].sort((a, b) => {
                    if (sortBy === 'name') return a.name.localeCompare(b.name);
                    if (sortBy === 'maxAmount') return b.maxAmount - a.maxAmount;
                    if (sortBy === 'minAmount') return a.minAmount - b.minAmount;
                    if (sortBy === 'difficulty') return a.applicationDifficulty - b.applicationDifficulty;
                    return 0;
                });

                setFilteredGrants(filtered);
            }, [grants, searchTerm, selectedSectors, selectedRegions, selectedStatus, sortBy]);

            const toggleSector = (sector) => {
                setSelectedSectors(prev =>
                    prev.includes(sector) ? prev.filter(s => s !== sector) : [...prev, sector]
                );
            };

            const toggleRegion = (region) => {
                setSelectedRegions(prev =>
                    prev.includes(region) ? prev.filter(r => r !== region) : [...prev, region]
                );
            };

            const clearFilters = () => {
                setSearchTerm('');
                setSelectedSectors([]);
                setSelectedRegions([]);
                setSelectedStatus('Open');
                setSortBy('name');
            };

            if (loading) {
                return (
                    <div className="min-h-screen bg-brand-dark flex items-center justify-center">
                        <div className="text-center">
                            <div className="inline-block animate-spin rounded-full h-16 w-16 border-b-2 border-brand-primary mb-4"></div>
                            <p className="text-brand-slate text-lg">Loading grants...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-brand-dark text-brand-light font-sans" ref={containerRef}>
                    {/* Social Proof Toast */}
                    <SocialProofToast />

                    {/* Header */}
                    <header className="bg-brand-card border-b border-brand-border sticky top-0 z-50">
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <button
                                        onClick={(e) => { addRipple(e); window.location.href = 'https://tools.inclusifund.co.uk/dashboard'; }}
                                        className="ripple-btn text-brand-slate hover:text-brand-primary transition-colors flex items-center gap-2"
                                        title="Return to Tools Suite"
                                    >
                                        <ArrowLeft size={24} />
                                        <span className="hidden md:inline font-medium text-sm">Tools Suite</span>
                                    </button>
                                    <div>
                                        <h1 className="font-serif text-2xl md:text-3xl text-brand-primary font-bold">
                                            InclusiFund Grants
                                        </h1>
                                        <p className="text-brand-slate text-xs hidden md:block">The Infrastructure Engine for UK CICs</p>
                                    </div>
                                </div>
                                <button
                                    onClick={(e) => { addRipple(e); setShowFilters(!showFilters); }}
                                    className="ripple-btn md:hidden bg-brand-primary/10 text-brand-primary px-4 py-2 rounded-lg flex items-center gap-2"
                                >
                                    <Filter size={18} />
                                    Filters
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="container mx-auto px-4 py-8">
                        <div className="flex flex-col md:flex-row gap-8">
                            {/* Sidebar Filters */}
                            <aside className={`md:w-80 ${showFilters ? 'block' : 'hidden md:block'}`}>
                                <div className="bg-brand-card border border-brand-border rounded-xl p-6 sticky top-24 reveal">
                                    <div className="flex items-center justify-between mb-6">
                                        <h2 className="font-serif text-xl text-brand-white">Filters</h2>
                                        <button
                                            onClick={clearFilters}
                                            className="text-brand-slate hover:text-brand-primary text-sm transition-colors"
                                        >
                                            Clear All
                                        </button>
                                    </div>

                                    {/* Search */}
                                    <div className="mb-6">
                                        <label className="block text-brand-slate text-sm mb-2">Search</label>
                                        <div className="relative">
                                            <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 text-brand-slate" size={18} />
                                            <input
                                                type="text"
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                placeholder="Grant name or funder..."
                                                className="w-full bg-brand-dark border border-brand-border rounded-lg pl-10 pr-4 py-2 text-brand-white placeholder-brand-slate focus:outline-none focus:border-brand-primary"
                                            />
                                        </div>
                                    </div>

                                    {/* Status */}
                                    <div className="mb-6">
                                        <label className="block text-brand-slate text-sm mb-2">Status</label>
                                        <select
                                            value={selectedStatus}
                                            onChange={(e) => setSelectedStatus(e.target.value)}
                                            className="w-full bg-brand-dark border border-brand-border rounded-lg px-4 py-2 text-brand-white focus:outline-none focus:border-brand-primary"
                                        >
                                            <option value="">All</option>
                                            <option value="Open">Open</option>
                                            <option value="Closed">Closed</option>
                                            <option value="Paused">Paused</option>
                                        </select>
                                    </div>

                                    {/* Sort By */}
                                    <div className="mb-6">
                                        <label className="block text-brand-slate text-sm mb-2">Sort By</label>
                                        <select
                                            value={sortBy}
                                            onChange={(e) => setSortBy(e.target.value)}
                                            className="w-full bg-brand-dark border border-brand-border rounded-lg px-4 py-2 text-brand-white focus:outline-none focus:border-brand-primary"
                                        >
                                            <option value="name">Name (A-Z)</option>
                                            <option value="maxAmount">Highest Amount</option>
                                            <option value="minAmount">Lowest Amount</option>
                                            <option value="difficulty">Easiest First</option>
                                        </select>
                                    </div>

                                    {/* Loss Aversion Warning */}
                                    <LossAversion message="Many grants close within 30 days. Filtering now ensures you don't miss deadlines that could cost your CIC thousands." />

                                    {/* Sectors */}
                                    <div className="mb-6">
                                        <label className="block text-brand-slate text-sm mb-2">Sectors</label>
                                        <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                                            {allSectors.map(sector => (
                                                <label key={sector} className="flex items-center gap-2 cursor-pointer hover:bg-brand-dark/50 p-2 rounded">
                                                    <input
                                                        type="checkbox"
                                                        checked={selectedSectors.includes(sector)}
                                                        onChange={() => toggleSector(sector)}
                                                        className="w-4 h-4 accent-brand-primary"
                                                    />
                                                    <span className="text-sm text-brand-light">{sector}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Regions */}
                                    <div className="mb-6">
                                        <label className="block text-brand-slate text-sm mb-2">Regions</label>
                                        <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                                            {allRegions.map(region => (
                                                <label key={region} className="flex items-center gap-2 cursor-pointer hover:bg-brand-dark/50 p-2 rounded">
                                                    <input
                                                        type="checkbox"
                                                        checked={selectedRegions.includes(region)}
                                                        onChange={() => toggleRegion(region)}
                                                        className="w-4 h-4 accent-brand-primary"
                                                    />
                                                    <span className="text-sm text-brand-light">{region}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </aside>

                            {/* Main Content */}
                            <main className="flex-1">
                                <div className="mb-6 reveal">
                                    <h2 className="text-2xl font-serif text-brand-white mb-2">
                                        {filteredGrants.length} {filteredGrants.length === 1 ? 'Grant' : 'Grants'} Found
                                    </h2>
                                    {(selectedSectors.length > 0 || selectedRegions.length > 0 || searchTerm) && (
                                        <div className="flex flex-wrap gap-2 mt-4">
                                            {selectedSectors.map(sector => (
                                                <span key={sector} className="bg-brand-primary/20 text-brand-primary px-3 py-1 rounded-full text-sm flex items-center gap-2">
                                                    {sector}
                                                    <button onClick={() => toggleSector(sector)}>
                                                        <X size={14} />
                                                    </button>
                                                </span>
                                            ))}
                                            {selectedRegions.map(region => (
                                                <span key={region} className="bg-brand-secondary/20 text-brand-light px-3 py-1 rounded-full text-sm flex items-center gap-2">
                                                    {region}
                                                    <button onClick={() => toggleRegion(region)}>
                                                        <X size={14} />
                                                    </button>
                                                </span>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {/* Grants Grid */}
                                {filteredGrants.length === 0 ? (
                                    <div className="text-center py-20 reveal">
                                        <p className="text-brand-slate text-lg mb-4">No grants found matching your criteria</p>
                                        <button
                                            onClick={(e) => { addRipple(e); clearFilters(); }}
                                            className="ripple-btn bg-brand-primary text-brand-dark px-6 py-3 rounded-lg font-medium hover:bg-brand-primary/90 transition-colors"
                                        >
                                            Clear Filters
                                        </button>
                                    </div>
                                ) : (
                                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {filteredGrants.map((grant, idx) => (
                                            <div
                                                key={grant._id}
                                                className="reveal bg-brand-card border border-brand-border rounded-xl p-6 flex flex-col hover:border-brand-primary/50 transition-all group hover:-translate-y-1 hover:shadow-lg hover:shadow-brand-primary/5"
                                                style={{ transitionDelay: `${Math.min(idx * 50, 300)}ms` }}
                                            >
                                                <div className="flex items-start justify-between mb-3">
                                                    <span className={`text-xs px-2 py-1 rounded ${grant.status === 'Open'
                                                        ? 'bg-green-500/20 text-green-400'
                                                        : grant.status === 'Closed'
                                                            ? 'bg-red-500/20 text-red-400'
                                                            : 'bg-yellow-500/20 text-yellow-400'
                                                        }`}>
                                                        {grant.status}
                                                    </span>
                                                    <span className="text-xs bg-brand-dark px-2 py-1 rounded text-brand-slate">
                                                        Difficulty: {grant.applicationDifficulty}/5
                                                    </span>
                                                </div>

                                                <div className="text-xs text-brand-slate uppercase tracking-wider mb-2">
                                                    {grant.funder}
                                                </div>

                                                <h3 className="font-serif text-xl text-brand-white mb-3 group-hover:text-brand-primary transition-colors">
                                                    {grant.name}
                                                </h3>

                                                <div className="flex flex-wrap gap-2 mb-4">
                                                    <span className="text-xs bg-brand-dark px-2 py-1 rounded text-brand-primary font-medium">
                                                        {'\u00A3'}{grant.minAmount.toLocaleString()} - {'\u00A3'}{grant.maxAmount.toLocaleString()}
                                                    </span>
                                                    <span className="text-xs bg-brand-dark px-2 py-1 rounded text-brand-slate">
                                                        {grant.deadline || "Rolling"}
                                                    </span>
                                                </div>

                                                <p className="text-brand-slate text-sm mb-4 flex-1 line-clamp-3">
                                                    {grant.description}
                                                </p>

                                                <div className="flex flex-wrap gap-1 mb-4">
                                                    {grant.sectors.slice(0, 2).map(sector => (
                                                        <span key={sector} className="text-xs bg-brand-primary/10 text-brand-primary px-2 py-1 rounded">
                                                            {sector}
                                                        </span>
                                                    ))}
                                                    {grant.sectors.length > 2 && (
                                                        <span className="text-xs bg-brand-dark text-brand-slate px-2 py-1 rounded">
                                                            +{grant.sectors.length - 2} more
                                                        </span>
                                                    )}
                                                </div>

                                                <a
                                                    href={grant.website}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    onClick={addRipple}
                                                    className="ripple-btn flex items-center justify-center gap-2 bg-brand-primary/10 hover:bg-brand-primary/20 text-brand-primary py-2 rounded-lg text-sm font-medium transition-colors mt-auto"
                                                >
                                                    View Details
                                                    <ExternalLink size={16} />
                                                </a>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </main>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
