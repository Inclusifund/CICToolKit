    .btn {

    .btn-primary {

    .btn-primary:hover {

    .btn-secondary {

    .btn-secondary:hover {

    }

    .btn-danger {
        background: var(--danger);
        color: white;
        padding: 0.5rem 1rem;
    }

    .btn-add {
        background: white;
        border: 2px dashed var(--primary);
        color: var(--primary);
    }

    .btn-add:hover {
        background: rgba(99, 102, 241, 0.05);
    }

    .form-actions {
        display: flex;
        gap: 1rem;
        justify-content: space-between;
        margin-top: 2rem;
    }

    /* Dashboard */
    .dashboard {
        padding: 2rem;
    }

    .dashboard-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
    }

    .dashboard-actions {
        display: flex;
        gap: 1rem;
    }

    .next-action-card {
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        color: white;
        padding: 2rem;
        border-radius: 16px;
        margin-bottom: 2rem;
        position: relative;
        overflow: hidden;
    }

    .next-action-card::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -10%;
        width: 300px;
        height: 300px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
    }

    .next-action-card h2 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
        position: relative;
        z-index: 1;
    }

    .next-action-card .duty-type {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 1rem;
        position: relative;
        z-index: 1;
    }

    .countdown {
        display: inline-block;
        background: rgba(255, 255, 255, 0.2);
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-weight: 700;
        font-family: 'Space Mono', monospace;
        margin-bottom: 1rem;
        position: relative;
        z-index: 1;
    }

    .kanban-board {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 1.5rem;
    }

    .kanban-column {
        background: var(--gray-50);
        border-radius: 16px;
        padding: 1.5rem;
    }

    .kanban-column h3 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .column-overdue h3 {
        color: var(--danger);
    }

    .column-due-soon h3 {
        color: var(--warning);
    }

    .column-upcoming h3 {
        color: var(--success);
    }

    .column-completed h3 {
        color: var(--gray-600);
    }

    .duty-cards {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .duty-card {
        background: white;
        border-radius: 12px;
        padding: 1.25rem;
        border-left: 4px solid;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .duty-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .duty-card.overdue {
        border-left-color: var(--danger);
    }

    .duty-card.due-soon {
        border-left-color: var(--warning);
    }

    .duty-card.upcoming {
        border-left-color: var(--success);
    }

    .duty-card.completed {
        border-left-color: var(--gray-400);
    }

    .duty-card-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 0.75rem;
    }

    .duty-icon {
        font-size: 1.5rem;
    }

    .duty-title {
        font-weight: 700;
        color: var(--gray-900);
        margin-bottom: 0.25rem;
    }

    .duty-date {
        color: var(--gray-600);
        font-size: 0.875rem;
    }

    .duty-countdown {
        font-weight: 700;
        font-family: 'Space Mono', monospace;
        font-size: 0.875rem;
    }

    .duty-countdown.overdue {
        color: var(--danger);
    }

    .duty-countdown.due-soon {
        color: var(--warning);
    }

    .duty-countdown.upcoming {
        color: var(--success);
    }

    .duty-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
    }

    .btn-small {
        padding: 0.5rem 0.875rem;
        font-size: 0.875rem;
    }

    /* Sidebar */
    .sidebar {
        position: fixed;
        right: 2rem;
        top: 50%;
        transform: translateY(-50%);
        background: white;
        border-radius: 16px;
        padding: 1.5rem;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        width: 250px;
    }

    .compliance-score {
        text-align: center;
        margin-bottom: 1.5rem;
    }

    .score-circle {
        width: 120px;
        height: 120px;
        margin: 0 auto 1rem;
        position: relative;
    }

    .score-value {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 2rem;
        font-weight: 800;
        font-family: 'Space Mono', monospace;
    }

    .sidebar-actions {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }

    /* Modal */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        animation: fadeIn 0.2s;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
        }

        to {
            opacity: 1;
        }
    }

    .modal {
        background: white;
        border-radius: 20px;
        max-width: 600px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        animation: slideUp 0.3s;
    }

    .modal-header {
        padding: 2rem;
        border-bottom: 1px solid var(--gray-200);
    }

    .modal-header h2 {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--gray-900);
    }

    .modal-body {
        padding: 2rem;
    }

    .detail-row {
        margin-bottom: 1.5rem;
    }

    .detail-label {
        font-weight: 600;
        color: var(--gray-700);
        margin-bottom: 0.25rem;
    }

    .detail-value {
        color: var(--gray-900);
    }

    .reminder-schedule {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .reminder-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem;
        background: var(--gray-50);
        border-radius: 8px;
    }

    .reminder-checkbox {
        width: 20px;
        height: 20px;
    }

    .penalty-warning {
        background: rgba(239, 68, 68, 0.1);
        border-left: 4px solid var(--danger);

    }

    @media (max-width: 768px) {
        .sidebar {
            position: static;
            transform: none;
            width: 100%;
            margin-top: 2rem;
        }

        .kanban-board {
            grid-template-columns: 1fr;
        }

        .app-header h1 {
            font-size: 1.5rem;
        }
    }
</style>

<div id="compliance-calendar-root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    const ComplianceCalendar = () => {
        const [view, setView] = useState('setup'); // 'setup' or 'dashboard'
        const [currentStep, setCurrentStep] = useState(1);
        const [formData, setFormData] = useState({
            companyRegistrationDate: '',
            financialYearEnd: '',
            articlesRequireAGM: false,
            directors: [],
            lastConfirmationStatement: null,
            lastAccountsFiling: null,
            lastAGM: null
        });
        const [calendarData, setCalendarData] = useState(null);
        const [selectedDuty, setSelectedDuty] = useState(null);
        const [showModal, setShowModal] = useState(false);

        // Load saved data on mount
        useEffect(() => {
            const saved = localStorage.getItem('cicComplianceData');
            if (saved) {
                const data = JSON.parse(saved);
                setFormData(data.formData);
                setCalendarData(data.calendarData);
                setView('dashboard');
            }
        }, []);

        const updateFormData = (field, value) => {
            setFormData(prev => ({ ...prev, [field]: value }));
        };

        const addDirector = () => {
            if (formData.directors.length < 10) {
                updateFormData('directors', [...formData.directors, { name: '', appointmentDate: '' }]);
            }
        };

        const removeDirector = (index) => {
            updateFormData('directors', formData.directors.filter((_, i) => i !== index));
        };

        const updateDirector = (index, field, value) => {
            const updated = formData.directors.map((dir, i) =>
                i === index ? { ...dir, [field]: value } : dir
            );
            updateFormData('directors', updated);
        };

        const generateCalendar = async () => {
            // Mock calendar generation (in production, this would call the Python script)
            const mockData = {
                duties: [
                    {
                        id: 'conf_statement_2027',
                        type: 'Confirmation Statement',
                        dueDate: '2027-01-15',
                        status: 'upcoming',
                        daysUntilDue: 347,
                        recommendedStartDate: '2026-10-17',
                        penalty: '£150+ if late',
                        filingInstructions: 'File online via Companies House WebFiling',
                        estimatedTimeToComplete: '30 minutes',
                        reminderSchedule: [
                            { date: '2026-10-17', type: '90_day', sent: false },
                            { date: '2026-11-16', type: '60_day', sent: false },
                            { date: '2026-12-16', type: '30_day', sent: false },
                            { date: '2027-01-01', type: '14_day', sent: false },
                            { date: '2027-01-08', type: '7_day', sent: false },
                            { date: '2027-01-15', type: 'due_date', sent: false }
                        ]
                    },
                    {
                        id: 'accounts_cic34_2024',
                        type: 'Annual Accounts + CIC34',
                        dueDate: '2024-12-31',
                        status: 'overdue',
                        daysUntilDue: -32,
                        recommendedStartDate: '2024-10-02',
                        penalty: '£1000+ if accounts late, CIC Regulator investigation if CIC34 late',
                        filingInstructions: 'Accounts to Companies House, CIC34 to CIC Regulator',
                        estimatedTimeToComplete: '8-12 hours (use our CIC34 generator to save 6+ hours)',
                        reminderSchedule: []
                    },
                    {
                        id: 'board_meeting_2026_04',
                        type: 'Board Meeting (Recommended)',
                        dueDate: '2026-04-15',
                        status: 'due_soon',
                        daysUntilDue: 72,
                        recommendedStartDate: '2026-04-01',
                        penalty: 'Not legally required but best practice',
                        filingInstructions: 'Schedule meeting, prepare agenda, record minutes',
                        estimatedTimeToComplete: '2 hours (meeting + minutes)',
                        reminderSchedule: []
                    }
                ],
                nextAction: {
                    duty: 'Annual Accounts + CIC34',
                    dueDate: '2024-12-31',
                    daysUntilDue: -32,
                    action: 'OVERDUE - File immediately to avoid further penalties'
                },
                overdueItems: [
                    {
                        id: 'accounts_cic34_2024',
                        type: 'Annual Accounts + CIC34',
                        daysOverdue: 32
                    }
                ],
                complianceScore: 0
            };

            setCalendarData(mockData);

            // Save to localStorage
            localStorage.setItem('cicComplianceData', JSON.stringify({
                formData,
                calendarData: mockData
            }));

            setView('dashboard');
        };

        const downloadICS = () => {
            // Mock ICS download
            alert('Calendar file (.ics) would be downloaded here. In production, this calls the generate_ical.py script.');
        };

        const openDutyModal = (duty) => {
            setSelectedDuty(duty);
            setShowModal(true);
        };

        const markComplete = (dutyId) => {
            // Update duty status
            const updated = {
                ...calendarData,
                duties: calendarData.duties.map(d =>
                    d.id === dutyId ? { ...d, status: 'completed' } : d
                )
            };
            setCalendarData(updated);
            setShowModal(false);
        };

        const getStatusIcon = (status) => {
            switch (status) {
                case 'overdue': return '🚨';
                case 'due_soon': return '⚠️';
                case 'upcoming': return '📅';
                case 'completed': return '✅';
                default: return '📋';
            }
        };

        const getDutyIcon = (type) => {
            if (type.includes('Confirmation')) return '📝';
            if (type.includes('Accounts') || type.includes('CIC34')) return '💼';
            if (type.includes('Board Meeting')) return '👥';
            if (type.includes('AGM')) return '🏛️';
            return '📋';
        };

        const formatCountdown = (days) => {
            if (days < 0) return `${Math.abs(days)} days overdue`;
            if (days === 0) return 'Due today';
            if (days === 1) return 'Due tomorrow';
            return `Due in ${days} days`;
        };

        // Setup Form Views
        const renderStep1 = () => (
            <div className="form-section">
                <h2>Company Basics</h2>
                <p>Let's start with your CIC's key dates</p>

                <div className="form-group">
                    <label>Company Registration Date *</label>
                    <input
                        type="date"
                        value={formData.companyRegistrationDate}
                        onChange={(e) => updateFormData('companyRegistrationDate', e.target.value)}
                        required
                    />
                </div>

                <div className="form-group">
                    <label>Financial Year End *</label>
                    <input
                        type="date"
                        value={formData.financialYearEnd}
                        onChange={(e) => updateFormData('financialYearEnd', e.target.value)}
                        placeholder="Default: 31 March"
                    />
                </div>

                <div className="form-group">
                    <label>Do your articles require an AGM?</label>
                    <div className="radio-group">
                        <div
                            className={`radio-option ${formData.articlesRequireAGM === true ? 'selected' : ''}`}
                            onClick={() => updateFormData('articlesRequireAGM', true)}
                        >
                            Yes
                        </div>
                        <div
                            className={`radio-option ${formData.articlesRequireAGM === false ? 'selected' : ''}`}
                            onClick={() => updateFormData('articlesRequireAGM', false)}
                        >
                            No
                        </div>
                    </div>
                </div>

                <div className="form-actions">
                    <div></div>
                    <button className="btn btn-primary" onClick={() => setCurrentStep(2)}>
                        Next: Directors →
                    </button>
                </div>
            </div>
        );

        const renderStep2 = () => (
            <div className="form-section">
                <h2>Director Information</h2>
                <p>Add your CIC directors (up to 10)</p>

                <div className="director-list">
                    {formData.directors.map((director, index) => (
                        <div key={index} className="director-item">
                            <input
                                type="text"
                                placeholder="Director Name"
                                value={director.name}
                                onChange={(e) => updateDirector(index, 'name', e.target.value)}
                            />
                            <input
                                type="date"
                                placeholder="Appointment Date"
                                value={director.appointmentDate}
                                onChange={(e) => updateDirector(index, 'appointmentDate', e.target.value)}
                            />
                            <button className="btn btn-danger btn-small" onClick={() => removeDirector(index)}>
                                Remove
                            </button>
                        </div>
                    ))}
                </div>

                {formData.directors.length < 10 && (
                    <button className="btn btn-add" onClick={addDirector} style={{ width: '100%' }}>
                        + Add Director
                    </button>
                )}

                <div className="form-actions">
                    <button className="btn btn-secondary" onClick={() => setCurrentStep(1)}>
                        ← Back
                    </button>
                    <button className="btn btn-primary" onClick={() => setCurrentStep(3)}>
                        Next: Filing History →
                    </button>
                </div>
            </div>
        );

        const renderStep3 = () => (
            <div className="form-section">
                <h2>Filing History</h2>
                <p>When did you last file these documents?</p>

                <div className="form-group">
                    <label>Last Confirmation Statement</label>
                    <input
                        type="date"
                        value={formData.lastConfirmationStatement || ''}
                        onChange={(e) => updateFormData('lastConfirmationStatement', e.target.value || null)}
                    />
                    <small style={{ color: 'var(--gray-600)', marginTop: '0.25rem', display: 'block' }}>
                        Leave blank if never filed
                    </small>
                </div>

                <div className="form-group">
                    <label>Last Annual Accounts Filing</label>
                    <input
                        type="date"
                        value={formData.lastAccountsFiling || ''}
                        onChange={(e) => updateFormData('lastAccountsFiling', e.target.value || null)}
                    />
                    <small style={{ color: 'var(--gray-600)', marginTop: '0.25rem', display: 'block' }}>
                        Leave blank if never filed
                    </small>
                </div>

                {formData.articlesRequireAGM && (
                    <div className="form-group">
                        <label>Last AGM Held</label>
                        <input
                            type="date"
                            value={formData.lastAGM || ''}
                            onChange={(e) => updateFormData('lastAGM', e.target.value || null)}
                        />
                        <small style={{ color: 'var(--gray-600)', marginTop: '0.25rem', display: 'block' }}>
                            Leave blank if not held yet
                        </small>
                    </div>
                )}

                <div className="form-actions">
                    <button className="btn btn-secondary" onClick={() => setCurrentStep(2)}>
                        ← Back
                    </button>
                    <button className="btn btn-primary" onClick={generateCalendar}>
                        Generate My Compliance Calendar 🚀
                    </button>
                </div>
            </div>
        );

        // Dashboard View
        const renderDashboard = () => {
            if (!calendarData) return null;

            const overdueDuties = calendarData.duties.filter(d => d.status === 'overdue');
            const dueSoonDuties = calendarData.duties.filter(d => d.status === 'due_soon');
            const upcomingDuties = calendarData.duties.filter(d => d.status === 'upcoming');
            const completedDuties = calendarData.duties.filter(d => d.status === 'completed');

            return (
                <div className="dashboard">
                    <div className="dashboard-header">
                        <div>
                            <h2 style={{ fontSize: '1.75rem', fontWeight: 700, color: 'var(--gray-900)' }}>
                                Your Compliance Calendar
                            </h2>
                            <p style={{ color: 'var(--gray-600)' }}>
                                Track all your CIC statutory duties in one place
                            </p>
                        </div>
                        <div className="dashboard-actions">
                            <button className="btn btn-secondary" onClick={downloadICS}>
                                📥 Download .ics
                            </button>
                            <button className="btn btn-secondary" onClick={() => setView('setup')}>
                                ⚙️ Settings
                            </button>
                        </div>
                    </div>

                    {/* Next Action Card */}
                    {calendarData.nextAction && (
                        <div className="next-action-card">
                            <h2>Next Action Required</h2>
                            <div className="duty-type">{calendarData.nextAction.duty}</div>
                            <div className="countdown">
                                {formatCountdown(calendarData.nextAction.daysUntilDue)}
                            </div>
                            <p style={{ marginBottom: '1rem', opacity: 0.9 }}>
                                {calendarData.nextAction.action}
                            </p>
                            <button className="btn" style={{ background: 'white', color: 'var(--primary)', fontWeight: 700 }}>
                                Start Working on This →
                            </button>
                        </div>
                    )}

                    {/* Kanban Board */}
                    <div className="kanban-board">
                        {/* Overdue Column */}
                        <div className="kanban-column column-overdue">
                            <h3>
                                <span>🚨</span>
                                Overdue ({overdueDuties.length})
                            </h3>
                            <div className="duty-cards">
                                {overdueDuties.map(duty => (
                                    <div key={duty.id} className="duty-card overdue" onClick={() => openDutyModal(duty)}>
                                        <div className="duty-card-header">
                                            <div>
                                                <div className="duty-icon">{getDutyIcon(duty.type)}</div>
                                                <div className="duty-title">{duty.type}</div>
                                                <div className="duty-date">{duty.dueDate}</div>
                                            </div>
                                            <div className="duty-countdown overdue">
                                                {Math.abs(duty.daysUntilDue)} days late
                                            </div>
                                        </div>
                                        <div className="duty-actions">
                                            <button className="btn btn-primary btn-small" onClick={(e) => {
                                                e.stopPropagation();
                                                openDutyModal(duty);
                                            }}>
                                                View Details
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Due This Month Column */}
                        <div className="kanban-column column-due-soon">
                            <h3>
                                <span>⚠️</span>
                                Due This Month ({dueSoonDuties.length})
                            </h3>
                            <div className="duty-cards">
                                {dueSoonDuties.map(duty => (
                                    <div key={duty.id} className="duty-card due-soon" onClick={() => openDutyModal(duty)}>
                                        <div className="duty-card-header">
                                            <div>
                                                <div className="duty-icon">{getDutyIcon(duty.type)}</div>
                                                <div className="duty-title">{duty.type}</div>
                                                <div className="duty-date">{duty.dueDate}</div>
                                            </div>
                                            <div className="duty-countdown due-soon">
                                                {duty.daysUntilDue} days
                                            </div>
                                        </div>
                                        <div className="duty-actions">
                                            <button className="btn btn-primary btn-small" onClick={(e) => {
                                                e.stopPropagation();
                                                openDutyModal(duty);
                                            }}>
                                                View Details
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Upcoming Column */}
                        <div className="kanban-column column-upcoming">
                            <h3>
                                <span>📅</span>
                                Upcoming ({upcomingDuties.length})
                            </h3>
                            <div className="duty-cards">
                                {upcomingDuties.map(duty => (
                                    <div key={duty.id} className="duty-card upcoming" onClick={() => openDutyModal(duty)}>
                                        <div className="duty-card-header">
                                            <div>
                                                <div className="duty-icon">{getDutyIcon(duty.type)}</div>
                                                <div className="duty-title">{duty.type}</div>
                                                <div className="duty-date">{duty.dueDate}</div>
                                            </div>
                                            <div className="duty-countdown upcoming">
                                                {duty.daysUntilDue} days
                                            </div>
                                        </div>
                                        <div className="duty-actions">
                                            <button className="btn btn-secondary btn-small" onClick={(e) => {
                                                e.stopPropagation();
                                                openDutyModal(duty);
                                            }}>
                                                View Details
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Completed Column */}
                        <div className="kanban-column column-completed">
                            <h3>
                                <span>✅</span>
                                Completed ({completedDuties.length})
                            </h3>
                            <div className="duty-cards">
                                {completedDuties.map(duty => (
                                    <div key={duty.id} className="duty-card completed">
                                        <div className="duty-card-header">
                                            <div>
                                                <div className="duty-icon">{getDutyIcon(duty.type)}</div>
                                                <div className="duty-title">{duty.type}</div>
                                                <div className="duty-date">{duty.dueDate}</div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Sidebar */}
                    <div className="sidebar">
                        <div className="compliance-score">
                            <h3 style={{ fontSize: '1rem', fontWeight: 600, color: 'var(--gray-700)', marginBottom: '1rem' }}>
                                Compliance Score
                            </h3>
                            <div className="score-circle">
                                <svg width="120" height="120" style={{ transform: 'rotate(-90deg)' }}>
                                    <circle cx="60" cy="60" r="50" fill="none" stroke="var(--gray-200)" strokeWidth="10" />
                                    <circle
                                        cx="60"
                                        cy="60"
                                        r="50"
                                        fill="none"
                                        stroke={calendarData.complianceScore === 100 ? 'var(--success)' : 'var(--danger)'}
                                        strokeWidth="10"
                                        strokeDasharray={`${calendarData.complianceScore * 3.14} 314`}
                                        strokeLinecap="round"
                                    />
                                </svg>
                                <div className="score-value" style={{ color: calendarData.complianceScore === 100 ? 'var(--success)' : 'var(--danger)' }}>
                                    {calendarData.complianceScore}%
                                </div>
                            </div>
                            <p style={{ fontSize: '0.875rem', color: 'var(--gray-600)' }}>
                                {calendarData.complianceScore === 100 ? 'All duties on track!' : 'Action required'}
                            </p>
                        </div>

                        <div className="sidebar-actions">
                            <button className="btn btn-primary" style={{ width: '100%' }} onClick={downloadICS}>
                                📥 Download Calendar
                            </button>
                            <button className="btn btn-secondary" style={{ width: '100%' }} onClick={() => generateCalendar()}>
                                🔄 Refresh Calendar
                            </button>
                            <button className="btn btn-secondary" style={{ width: '100%' }} onClick={() => setView('setup')}>
                                ⚙️ Edit Details
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // Duty Detail Modal
        const renderModal = () => {
            if (!showModal || !selectedDuty) return null;

            return (
                <div className="modal-overlay" onClick={() => setShowModal(false)}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2>{selectedDuty.type}</h2>
                            <p style={{ color: 'var(--gray-600)', marginTop: '0.5rem' }}>
                                Due: {selectedDuty.dueDate} • {formatCountdown(selectedDuty.daysUntilDue)}
                            </p>
                        </div>
                        <div className="modal-body">
                            <div className="detail-row">
                                <div className="detail-label">Filing Instructions</div>
                                <div className="detail-value">{selectedDuty.filingInstructions}</div>
                            </div>

                            <div className="detail-row">
                                <div className="detail-label">Estimated Time to Complete</div>
                                <div className="detail-value">{selectedDuty.estimatedTimeToComplete}</div>
                            </div>

                            <div className="detail-row">
                                <div className="penalty-warning">
                                    ⚠️ Late Filing Penalty: {selectedDuty.penalty}
                                </div>
                            </div>

                            {selectedDuty.reminderSchedule && selectedDuty.reminderSchedule.length > 0 && (
                                <div className="detail-row">
                                    <div className="detail-label">Reminder Schedule</div>
                                    <div className="reminder-schedule">
                                        {selectedDuty.reminderSchedule.map((reminder, index) => (
                                            <div key={index} className="reminder-item">
                                                <input type="checkbox" className="reminder-checkbox" checked={reminder.sent} readOnly />
                                                <span>{reminder.date} - {reminder.type.replace('_', ' ')}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div style={{ display: 'flex', gap: '1rem', marginTop: '2rem' }}>
                                <button className="btn btn-primary" style={{ flex: 1 }} onClick={() => markComplete(selectedDuty.id)}>
                                    ✓ Mark as Complete
                                </button>
                                <button className="btn btn-secondary" style={{ flex: 1 }} onClick={() => setShowModal(false)}>
                                    Close
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        return (
            <div className="app-container">
                <div className="app-header">
                    <h1>📋 CIC Director Duty Compliance Calendar</h1>
                    <p>Never miss a filing deadline again</p>
                </div>

                {view === 'setup' && (
                    <div className="setup-form">
                        <div className="step-indicator">
                            <div className="step">
                                <div className={`step-number ${currentStep === 1 ? 'active' : currentStep > 1 ? 'completed' : 'inactive'}`}>
                                    1
                                </div>
                                <span className="step-label">Basics</span>
                            </div>
                            <div className="step">
                                <div className={`step-number ${currentStep === 2 ? 'active' : currentStep > 2 ? 'completed' : 'inactive'}`}>
                                    2
                                </div>
                                <span className="step-label">Directors</span>
                            </div>
                            <div className="step">
                                <div className={`step-number ${currentStep === 3 ? 'active' : 'inactive'}`}>
                                    3
                                </div>
                                <span className="step-label">History</span>
                            </div>
                        </div>

                        {currentStep === 1 && renderStep1()}
                        {currentStep === 2 && renderStep2()}
                        {currentStep === 3 && renderStep3()}
                    </div>
                )}

                {view === 'dashboard' && renderDashboard()}
                {renderModal()}
            </div>
        );
    };

    ReactDOM.render(<ComplianceCalendar />, document.getElementById('compliance-calendar-root'));
</script>
