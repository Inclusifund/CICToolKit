<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Add jsPDF for PDF generation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- Auth Logic -->
<script src="assets/js/auth.js"></script>
<script>
    window.addEventListener('load', function () {
        if (typeof InclusiFundAuth !== 'undefined') {
            InclusiFundAuth.requireAuth();
        }
    });
</script>

<style>
    /* === BEHAVIORAL SCIENCE PATTERNS === */
    .sr{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
    .sr.visible{opacity:1;transform:translateY(0)}
    .loss-hl{background:linear-gradient(90deg,rgba(239,68,68,.08),transparent);border-left:3px solid #EF4444;padding:1rem 1.25rem;border-radius:0 8px 8px 0;margin-bottom:1rem}
    .prog-bar{height:6px;background:#E5E7EB;border-radius:3px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,#008080,#6BB6B6);border-radius:3px;transition:width 1s ease}
    .urg-badge{display:inline-flex;align-items:center;gap:6px;background:#FEF3C7;color:#92400E;font-size:.78rem;font-weight:700;padding:4px 12px;border-radius:9999px;animation:urgPulse 2s infinite}
    @keyframes urgPulse{0%,100%{opacity:1}50%{opacity:.7}}
    .btn-ripple{position:relative;overflow:hidden}
    .btn-ripple .ripple-effect{position:absolute;border-radius:50%;background:rgba(255,255,255,0.4);transform:scale(0);animation:rippleAnim 0.6s linear;pointer-events:none}
    @keyframes rippleAnim{to{transform:scale(4);opacity:0}}
    @keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
    .confetti-piece{position:fixed;top:-10px;width:10px;height:10px;z-index:9999;pointer-events:none;animation:confettiFall 3s ease-in forwards}
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
</style>

<div id="cic34-root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* === BEHAVIORAL SCIENCE HELPERS === */
    function initScrollReveal() {
        document.querySelectorAll('.sr').forEach(function(el, i) {
            el.style.transitionDelay = (i % 6) * 0.08 + 's';
            new IntersectionObserver(function(e) {
                if (e[0].isIntersecting) { el.classList.add('visible'); this.disconnect(); }
            }, { threshold: .1 }).observe(el);
        });
    }

    function initButtonRipples() {
        document.querySelectorAll('.btn-ripple').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                var ripple = document.createElement('span');
                ripple.className = 'ripple-effect';
                var rect = btn.getBoundingClientRect();
                var size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                btn.appendChild(ripple);
                setTimeout(function() { ripple.remove(); }, 600);
            });
        });
    }

    function fireConfetti() {
        var colors = ['#008080', '#6BB6B6', '#d4a853', '#EF4444', '#FEF3C7'];
        for (var i = 0; i < 40; i++) {
            var piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.style.left = Math.random() * 100 + 'vw';
            piece.style.background = colors[Math.floor(Math.random() * colors.length)];
            piece.style.animationDuration = (2 + Math.random() * 2) + 's';
            piece.style.animationDelay = Math.random() * 0.5 + 's';
            document.body.appendChild(piece);
            setTimeout(function() { piece.remove(); }, 5000);
        }
    }

    function CIC34Generator() {
        const [step, setStep] = useState(1);
        const [loading, setLoading] = useState(false);
        const [report, setReport] = useState(null);
        const [formData, setFormData] = useState({
            // Section 1: Company Info
            companyName: '',
            companyNumber: '',
            registeredOffice: '',
            financialYearEnd: '',
            directors: [{ name: '', role: '' }],

            // Section 2: Activities
            primaryActivities: '',
            targetBeneficiaries: '',
            geographicArea: '',
            numberOfBeneficiaries: '',

            // Section 3: Community Benefit
            benefitDescription: '',
            benefitEvidence: '',

            // Section 4: Impact
            keyOutcomes: ['', '', ''],
            sessionsDelivered: '',
            volunteerHours: '',
            newSkillsLearned: '',

            // Section 5: Financials
            totalIncome: '',
            grants: '',
            tradingIncome: '',
            donations: '',
            totalExpenditure: '',
            staffCosts: '',
            programCosts: '',
            overheadCosts: '',
            surplusDeficit: '',
            reserves: '',

            // Section 6: Stakeholder Engagement
            stakeholderEngagement: '',
            consultationMethods: '',

            // Section 7: Governance
            boardMeetings: '',
            governanceChanges: '',
            conflictsOfInterest: '',

            // Section 8: Future Plans
            futurePlans: ''
        });

        // Re-init behavioral science patterns after renders
        useEffect(() => {
            setTimeout(() => { initScrollReveal(); initButtonRipples(); }, 100);
        }, [step, report, loading]);

        // Auto-save
        useEffect(() => {
            localStorage.setItem('cic34-draft', JSON.stringify(formData));
        }, [formData]);

        // Load saved draft
        useEffect(() => {
            const saved = localStorage.getItem('cic34-draft');
            if (saved) {
                try {
                    setFormData(JSON.parse(saved));
                } catch (e) { }
            }
        }, []);

        const handleChange = (field, value) => {
            setFormData(prev => ({ ...prev, [field]: value }));
        };

        const handleArrayChange = (field, index, value) => {
            const newArray = [...formData[field]];
            newArray[index] = value;
            setFormData(prev => ({ ...prev, [field]: newArray }));
        };

        const handleDirectorChange = (index, field, value) => {
            const newDirectors = [...formData.directors];
            newDirectors[index][field] = value;
            setFormData(prev => ({ ...prev, directors: newDirectors }));
        };

        const addDirector = () => {
            setFormData(prev => ({
                ...prev,
                directors: [...prev.directors, { name: '', role: '' }]
            }));
        };

        const removeDirector = (index) => {
            setFormData(prev => ({
                ...prev,
                directors: prev.directors.filter((_, i) => i !== index)
            }));
        };

        const addOutcome = () => {
            setFormData(prev => ({
                ...prev,
                keyOutcomes: [...prev.keyOutcomes, '']
            }));
        };

        const removeOutcome = (index) => {
            setFormData(prev => ({
                ...prev,
                keyOutcomes: prev.keyOutcomes.filter((_, i) => i !== index)
            }));
        };

        const generateReport = async () => {
            setLoading(true);

            try {
                // Calculate financial metrics for AI analysis
                const totalIncome = parseFloat(formData.totalIncome) || 0;
                const grants = parseFloat(formData.grants) || 0;
                const tradingIncome = parseFloat(formData.tradingIncome) || 0;
                const totalExpenditure = parseFloat(formData.totalExpenditure) || 0;
                const reserves = parseFloat(formData.reserves) || 0;
                const surplusDeficit = parseFloat(formData.surplusDeficit) || 0;

                const grantDependency = totalIncome > 0 ? ((grants / totalIncome) * 100).toFixed(1) : 0;
                const reservesMonths = totalExpenditure > 0 ? ((reserves / totalExpenditure) * 12).toFixed(1) : 0;
                const tradingPercentage = totalIncome > 0 ? ((tradingIncome / totalIncome) * 100).toFixed(1) : 0;

                // Prepare data for OpenAI
                const cicData = {
                    company: {
                        name: formData.companyName,
                        number: formData.companyNumber,
                        yearEnd: formData.financialYearEnd
                    },
                    activities: {
                        primary: formData.primaryActivities,
                        beneficiaries: formData.targetBeneficiaries,
                        area: formData.geographicArea,
                        count: formData.numberOfBeneficiaries
                    },
                    impact: {
                        benefitDescription: formData.benefitDescription,
                        evidence: formData.benefitEvidence,
                        outcomes: formData.keyOutcomes.filter(o => o),
                        sessionsDelivered: formData.sessionsDelivered,
                        volunteerHours: formData.volunteerHours
                    },
                    financials: {
                        totalIncome,
                        grants,
                        tradingIncome,
                        donations: parseFloat(formData.donations) || 0,
                        totalExpenditure,
                        surplusDeficit,
                        reserves,
                        grantDependency: `${grantDependency}%`,
                        reservesMonths: `${reservesMonths} months`,
                        tradingPercentage: `${tradingPercentage}%`
                    },
                    governance: {
                        boardMeetings: formData.boardMeetings,
                        stakeholderEngagement: formData.stakeholderEngagement,
                        consultationMethods: formData.consultationMethods
                    },
                    future: formData.futurePlans
                };

                // Call OpenAI API
                const OPENAI_API_KEY = 'YOUR_OPENAI_API_KEY_HERE';

                const prompt = `You are a CIC compliance expert and strategic advisor. Generate a professional CIC34 Annual Report with personalized strategic advice.

CIC DATA:
${JSON.stringify(cicData, null, 2)}

Generate 8 sections for the CIC34 report. Each section should be detailed, professional, and reference specific data points. Be strategic and insightful.

SECTION 1 - COMPANY INFORMATION (150-200 words):
- Company details and registration
- Directors and their roles
- Registered office
- Financial year covered

SECTION 2 - ACTIVITIES UNDERTAKEN (250-300 words):
- Detailed description of primary activities
- How activities align with community benefit objectives
- Geographic reach and target beneficiaries
- Key programs and services delivered

SECTION 3 - COMMUNITY BENEFIT PROVIDED (300-350 words):
- Compelling narrative of community benefit
- Specific evidence and examples
- How benefit addresses community needs
- Unique value proposition

SECTION 4 - BENEFICIARIES (200-250 words):
- Who benefited and how many
- Demographics and characteristics
- Impact on beneficiaries' lives
- Testimonial-style evidence (create realistic examples based on activities)

SECTION 5 - FINANCIAL SUMMARY (300-350 words):
- Income breakdown with strategic analysis
- Grant dependency: ${grantDependency}% - analyze if this is healthy or risky
- Reserves: ${reservesMonths} months - assess adequacy
- Trading income: ${tradingPercentage}% - suggest diversification strategies
- Expenditure efficiency
- Surplus/deficit explanation
- Financial sustainability assessment

SECTION 6 - STAKEHOLDER ENGAGEMENT (200-250 words):
- How stakeholders were consulted
- Feedback mechanisms
- How feedback shaped activities
- Ongoing engagement plans

SECTION 7 - GOVERNANCE (200-250 words):
- Board meetings and attendance
- Decision-making processes
- Conflicts of interest management
- Governance improvements made

SECTION 8 - FUTURE PLANS (250-300 words):
- Strategic priorities for next year
- Based on financial analysis, suggest 3-5 SPECIFIC, ACTIONABLE priorities
- Reference their actual financial position (grant dependency, reserves, etc.)
- Include growth plans, sustainability improvements, impact expansion
- Make it strategic and tailored to their situation

CRITICAL REQUIREMENTS:
1. Reference actual numbers from the data
2. Be specific and strategic, not generic
3. Use professional, CIC Regulator-friendly language
4. Make financial advice actionable and realistic
5. Create compelling impact narratives
6. Ensure all sections flow together coherently

Return ONLY a JSON object with this structure:
{
  "section1": "full text...",
  "section2": "full text...",
  "section3": "full text...",
  "section4": "full text...",
  "section5": "full text...",
  "section6": "full text...",
  "section7": "full text...",
  "section8": "full text...",
  "executiveSummary": "2-3 sentence overview highlighting key achievements and challenges",
  "strengths": ["strength 1", "strength 2", "strength 3"],
  "improvements": ["improvement 1", "improvement 2"],
  "strategicPriorities": ["priority 1", "priority 2", "priority 3"]
}`;

                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENAI_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',
                        messages: [
                            {
                                role: 'system',
                                content: 'You are a CIC compliance expert who generates professional, strategic CIC34 annual reports. Always return valid JSON.'
                            },
                            {
                                role: 'user',
                                content: prompt
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 4000
                    })
                });

                if (!response.ok) {
                    throw new Error(`OpenAI API error: ${response.status}`);
                }

                const data = await response.json();
                const aiContent = JSON.parse(data.choices[0].message.content);

                // Calculate quality scores based on data completeness and AI analysis
                const calculateSectionScore = (section, hasData) => {
                    if (!hasData) return 60;
                    const wordCount = section.split(' ').length;
                    if (wordCount < 100) return 70;
                    if (wordCount < 200) return 85;
                    return 95;
                };

                const sectionScores = {
                    companyInfo: calculateSectionScore(aiContent.section1, formData.companyName && formData.companyNumber),
                    activities: calculateSectionScore(aiContent.section2, formData.primaryActivities),
                    communityBenefit: calculateSectionScore(aiContent.section3, formData.benefitDescription),
                    beneficiaries: calculateSectionScore(aiContent.section4, formData.numberOfBeneficiaries),
                    financialSummary: calculateSectionScore(aiContent.section5, totalIncome > 0),
                    stakeholderEngagement: calculateSectionScore(aiContent.section6, formData.stakeholderEngagement),
                    governance: calculateSectionScore(aiContent.section7, formData.boardMeetings),
                    futurePlans: calculateSectionScore(aiContent.section8, formData.futurePlans)
                };

                const overallScore = Math.round(
                    Object.values(sectionScores).reduce((a, b) => a + b, 0) / Object.values(sectionScores).length
                );

                // Calculate word count
                const totalWords = Object.values(aiContent)
                    .filter(v => typeof v === 'string')
                    .join(' ')
                    .split(/\s+/)
                    .length;

                const generatedReport = {
                    reportId: 'cic34_' + Date.now(),
                    generatedDate: new Date().toISOString().split('T')[0],
                    sections: {
                        section1: aiContent.section1,
                        section2: aiContent.section2,
                        section3: aiContent.section3,
                        section4: aiContent.section4,
                        section5: aiContent.section5,
                        section6: aiContent.section6,
                        section7: aiContent.section7,
                        section8: aiContent.section8
                    },
                    executiveSummary: aiContent.executiveSummary,
                    qualityScore: {
                        overallScore,
                        sectionScores,
                        strengths: aiContent.strengths || [
                            'Comprehensive data provided',
                            'Clear community benefit focus',
                            'Good financial documentation'
                        ],
                        improvements: aiContent.improvements || [
                            'Add more qualitative evidence',
                            'Include beneficiary testimonials'
                        ],
                        strategicPriorities: aiContent.strategicPriorities || [],
                        regulatorLikelihood: overallScore >= 85 ? 'high' : overallScore >= 70 ? 'medium' : 'low'
                    },
                    wordCount: totalWords,
                    readyToSubmit: overallScore >= 75
                };

                setReport(generatedReport);
                // Fire confetti on successful generation
                fireConfetti();

            } catch (error) {
                console.error('Generation failed:', error);
                alert('Failed to generate report. Please check your internet connection and try again.');
            } finally {
                setLoading(false);
            }
        };

        const downloadDOCX = () => {
            let docContent = `CIC34 COMMUNITY INTEREST COMPANY REPORT
=====================================

Company: ${formData.companyName}
Company Number: ${formData.companyNumber}
Financial Year End: ${formData.financialYearEnd}

SECTION 1: COMPANY INFORMATION
${report.sections.section1}

SECTION 2: ACTIVITIES UNDERTAKEN
${report.sections.section2}

SECTION 3: COMMUNITY BENEFIT PROVIDED
${report.sections.section3}

SECTION 4: BENEFICIARIES
${report.sections.section4}

SECTION 5: FINANCIAL SUMMARY
${report.sections.section5}

SECTION 6: STAKEHOLDER ENGAGEMENT
${report.sections.section6}

SECTION 7: GOVERNANCE
${report.sections.section7}

SECTION 8: FUTURE PLANS
${report.sections.section8}

---
Generated by InclusiFund CIC Tools | The Infrastructure Engine for UK CICs
Date: ${new Date().toLocaleDateString('en-GB')}
Quality Score: ${report.qualityScore.overallScore}/100
`;

            const blob = new Blob([docContent], {
                type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
            });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `CIC34_${formData.companyName.replace(/\s+/g, '_')}_${formData.financialYearEnd}.docx`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        const downloadPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            let yPosition = 20;
            const lineHeight = 7;
            const pageHeight = doc.internal.pageSize.height;
            const margin = 20;

            const addText = (text, fontSize = 10, isBold = false) => {
                doc.setFontSize(fontSize);
                if (isBold) {
                    doc.setFont(undefined, 'bold');
                } else {
                    doc.setFont(undefined, 'normal');
                }

                const lines = doc.splitTextToSize(text, 170);
                lines.forEach(line => {
                    if (yPosition > pageHeight - margin) {
                        doc.addPage();
                        yPosition = margin;
                    }
                    doc.text(line, 20, yPosition);
                    yPosition += lineHeight;
                });
            };

            addText('CIC34 COMMUNITY INTEREST COMPANY REPORT', 16, true);
            yPosition += 5;
            addText('_'.repeat(80), 10);
            yPosition += 5;

            addText(`Company: ${formData.companyName}`, 12, true);
            addText(`Company Number: ${formData.companyNumber}`, 10);
            addText(`Financial Year End: ${formData.financialYearEnd}`, 10);
            yPosition += 5;

            addText(`QUALITY SCORE: ${report.qualityScore.overallScore}/100`, 14, true);
            const scoreLabel = report.qualityScore.overallScore >= 90 ? 'EXCELLENT' :
                report.qualityScore.overallScore >= 75 ? 'GOOD' :
                    report.qualityScore.overallScore >= 60 ? 'ADEQUATE' :
                        'NEEDS WORK';
            addText(scoreLabel, 12, true);
            addText(`Ready to Submit: ${report.readyToSubmit ? 'YES' : 'NO'}`, 10);
            yPosition += 10;

            const sections = [
                { title: 'SECTION 1: COMPANY INFORMATION', content: report.sections.section1 },
                { title: 'SECTION 2: ACTIVITIES UNDERTAKEN', content: report.sections.section2 },
                { title: 'SECTION 3: COMMUNITY BENEFIT PROVIDED', content: report.sections.section3 },
                { title: 'SECTION 4: BENEFICIARIES', content: report.sections.section4 },
                { title: 'SECTION 5: FINANCIAL SUMMARY', content: report.sections.section5 },
                { title: 'SECTION 6: STAKEHOLDER ENGAGEMENT', content: report.sections.section6 },
                { title: 'SECTION 7: GOVERNANCE', content: report.sections.section7 },
                { title: 'SECTION 8: FUTURE PLANS', content: report.sections.section8 }
            ];

            sections.forEach(section => {
                addText(section.title, 12, true);
                yPosition += 2;
                addText(section.content, 10);
                yPosition += 5;
            });

            if (yPosition > pageHeight - 100) {
                doc.addPage();
                yPosition = margin;
            }

            addText('_'.repeat(80), 10);
            yPosition += 3;
            addText('QUALITY ASSESSMENT', 14, true);
            yPosition += 5;

            addText('Strengths:', 12, true);
            report.qualityScore.strengths.forEach((s, i) => {
                addText(`${i + 1}. ${s}`, 10);
            });
            yPosition += 3;

            addText('Suggested Improvements:', 12, true);
            report.qualityScore.improvements.forEach((s, i) => {
                addText(`${i + 1}. ${s}`, 10);
            });
            yPosition += 5;

            addText('Section Scores:', 12, true);
            const sectionNames = {
                companyInfo: 'Company Information',
                activities: 'Activities Undertaken',
                communityBenefit: 'Community Benefit',
                beneficiaries: 'Beneficiaries',
                financialSummary: 'Financial Summary',
                stakeholderEngagement: 'Stakeholder Engagement',
                governance: 'Governance',
                futurePlans: 'Future Plans'
            };

            Object.entries(report.qualityScore.sectionScores).forEach(([section, score]) => {
                addText(`- ${sectionNames[section]}: ${score}%`, 10);
            });

            yPosition += 10;
            addText('_'.repeat(80), 10);
            addText(`Generated by InclusiFund CIC Tools | The Infrastructure Engine for UK CICs`, 9);
            addText(`Date: ${new Date().toLocaleDateString('en-GB')}`, 9);
            addText(`Report ID: ${report.reportId}`, 9);

            doc.save(`CIC34_${formData.companyName.replace(/\s+/g, '_')}_${formData.financialYearEnd}.pdf`);
        };

        const nextStep = () => {
            setStep(prev => Math.min(prev + 1, 9));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const prevStep = () => {
            setStep(prev => Math.max(prev - 1, 1));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        if (loading) {
            return (
                <div className="min-h-screen bg-gradient-to-br from-teal-50 to-cyan-50 flex items-center justify-center p-6">
                    <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-12 text-center sr visible">
                        <div className="animate-spin rounded-full h-16 w-16 border-4 border-teal-600 border-t-transparent mx-auto mb-6"></div>
                        <h2 className="text-2xl font-bold text-gray-800 mb-2">Generating Your CIC34 Report...</h2>
                        <p className="text-gray-600">This usually takes 30-60 seconds</p>
                        <div className="mt-6 space-y-2 text-left">
                            <div className="flex items-center gap-2 text-sm text-gray-600">
                                <span className="text-teal-600">&#10003;</span> Validating data
                            </div>
                            <div className="flex items-center gap-2 text-sm text-gray-600">
                                <span className="text-teal-600">&#10003;</span> Calculating financial metrics
                            </div>
                            <div className="flex items-center gap-2 text-sm text-gray-600">
                                <div className="animate-spin rounded-full h-4 w-4 border-2 border-teal-600 border-t-transparent"></div>
                                Generating report sections
                            </div>
                            <div className="flex items-center gap-2 text-sm text-gray-400">
                                <span>&#9675;</span> Running quality checks
                            </div>
                        </div>
                        {/* Progress bar */}
                        <div className="mt-6 prog-bar">
                            <div className="prog-fill" style={{width: '65%'}}></div>
                        </div>
                    </div>
                </div>
            );
        }

        if (report) {
            const { qualityScore } = report;
            const scoreColor = qualityScore.overallScore >= 90 ? 'green' :
                qualityScore.overallScore >= 75 ? 'teal' :
                    qualityScore.overallScore >= 60 ? 'amber' : 'red';

            return (
                <div className="min-h-screen bg-gradient-to-br from-teal-50 to-cyan-50 py-12 px-4">
                    <div className="max-w-5xl mx-auto">
                        {/* Header */}
                        <div className="text-center mb-8 sr visible">
                            <h1 className="text-4xl font-bold text-gray-800 mb-2">Your CIC34 Report is Ready!</h1>
                            <p className="text-xl text-gray-600">Review, edit, and download below</p>
                            <p className="text-xs text-teal-700 mt-2 font-semibold">The Infrastructure Engine for UK CICs</p>
                        </div>

                        {/* Quality Score Card */}
                        <div className="bg-white rounded-2xl shadow-xl p-8 mb-8 sr">
                            <div className="flex items-center justify-between mb-6">
                                <div>
                                    <h2 className="text-2xl font-bold text-gray-800 mb-2">Quality Score</h2>
                                    <p className="text-gray-600">CIC Regulator compliance assessment</p>
                                </div>
                                <div className="text-center">
                                    <div className={`text-6xl font-bold mb-2 ${scoreColor === 'green' ? 'text-green-600' :
                                        scoreColor === 'teal' ? 'text-teal-600' :
                                            scoreColor === 'amber' ? 'text-amber-600' :
                                                'text-red-600'
                                        }`}>
                                        {qualityScore.overallScore}
                                    </div>
                                    <div className="text-gray-600">
                                        {qualityScore.overallScore >= 90 ? 'Excellent' :
                                            qualityScore.overallScore >= 75 ? 'Good' :
                                                qualityScore.overallScore >= 60 ? 'Adequate' :
                                                    'Needs Work'}
                                    </div>
                                </div>
                            </div>

                            <div className="grid md:grid-cols-2 gap-6">
                                {/* Strengths */}
                                <div>
                                    <h3 className="font-bold text-green-600 mb-3 flex items-center gap-2">

                                            </div>

                                            <div>
                                                <label className="block text-gray-700 font-medium mb-2">Donations (&pound;)</label>
                                                <input
                                                    type="number"
                                                    value={formData.donations}
                                                    onChange={(e) => handleChange('donations', e.target.value)}
                                                    className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-teal-500 outline-none transition"
                                                    placeholder="5000"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-gray-700 font-medium mb-2">Total Income (&pound;)</label>
                                                <input
                                                    type="number"
                                                    value={formData.totalIncome}
                                                    onChange={(e) => handleChange('totalIncome', e.target.value)}
                                                    className="w-full p-3 border-2 border-gray-300 rounded-lg bg-teal-50 focus:border-teal-500 outline-none transition"
                                                    placeholder="85000"
                                                />
                                                <p className="text-xs text-gray-500 mt-1">Should equal: Grants + Trading + Donations</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <h3 className="font-bold text-gray-800 mb-3">Expenditure</h3>
                                        <div className="grid md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-gray-700 font-medium mb-2">Staff Costs (&pound;)</label>
                                                <input
                                                    type="number"
                                                    value={formData.staffCosts}
                                                    onChange={(e) => handleChange('staffCosts', e.target.value)}
                                                    className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-teal-500 outline-none transition"
                                                    placeholder="45000"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-gray-700 font-medium mb-2">Program Costs (&pound;)</label>
                                                <input
                                                    type="number"
                                                    value={formData.programCosts}
                                                    onChange={(e) => handleChange('programCosts', e.target.value)}
                                                    className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-teal-500 outline-none transition"
                                                    placeholder="25000"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-gray-700 font-medium mb-2">Overhead Costs (&pound;)</label>
                                                <input
                                                    type="number"
                                                    value={formData.overheadCosts}
                                                    onChange={(e) => handleChange('overheadCosts', e.target.value)}
                                                    className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-teal-500 outline-none transition"
                                                    placeholder="8000"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-gray-700 font-medium mb-2">Total Expenditure (&pound;)</label>
                                                <input
                                                    type="number"
                                                    value={formData.totalExpenditure}
                                                    onChange={(e) => handleChange('totalExpenditure', e.target.value)}
                                                    className="w-full p-3 border-2 border-gray-300 rounded-lg bg-red-50 focus:border-teal-500 outline-none transition"
                                                    placeholder="78000"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2">Surplus/Deficit (&pound;)</label>
                                            <input
                                                type="number"
                                                value={formData.surplusDeficit}
                                                onChange={(e) => handleChange('surplusDeficit', e.target.value)}
                                                className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-teal-500 outline-none transition"
                                                placeholder="7000"
                                            />
                                            <p className="text-xs text-gray-500 mt-1">Income minus Expenditure</p>
                                        </div>

                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2">Reserves (&pound;)</label>
                                            <input
                                                type="number"
                                                value={formData.reserves}
                                                onChange={(e) => handleChange('reserves', e.target.value)}
                                                className="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-teal-500 outline-none transition"
                                                placeholder="15000"
                                            />
                                            <p className="text-xs text-gray-500 mt-1">Cash held at year end</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-3 mt-6">
                                    <button
                                        onClick={prevStep}
                                        className="flex-1 bg-white border-2 border-gray-300 text-gray-700 py-4 rounded-xl font-semibold btn-ripple"
                                    >
                                        &larr; Back
                                    </button>
                                    <button
                                        onClick={nextStep}
                                        disabled={!formData.totalIncome || !formData.totalExpenditure}
                                        className="flex-1 bg-teal-600 hover:bg-teal-700 disabled:bg-gray-300 text-white py-4 rounded-xl font-semibold btn-ripple"
                                    >
                                        Next: Stakeholder Engagement &rarr;
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Step 6: Stakeholder Engagement */}
                        {step === 6 && (
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800 mb-6">Stakeholder Engagement</h2>

                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-gray-700 font-medium mb-2">
                                            How did you engage stakeholders?
                                        </label>
                                        <textarea
                                            value={formData.stakeholderEngagement}
                                            onChange={(e) => handleChange('stakeholderEngagement', e.target.value)}
                                            className="w-full p-3 border-2 border-gray-300 rounded-lg text-lg focus:border-teal-500 outline-none transition"
                                            placeholder="Monthly community forums, quarterly surveys, annual AGM with 45 attendees, partnership with 8 local schools"
                                            rows={4}
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-gray-700 font-medium mb-2">
                                            Consultation Methods Used
                                        </label>
                                        <textarea
                                            value={formData.consultationMethods}
                                            onChange={(e) => handleChange('consultationMethods', e.target.value)}
                                            className="w-full p-3 border-2 border-gray-300 rounded-lg text-lg focus:border-teal-500 outline-none transition"
                                            placeholder="Surveys, focus groups, community meetings, feedback forms"
                                            rows={3}
                                        />
                                    </div>
                                </div>

                                <div className="flex gap-3 mt-6">
                                    <button
                                        onClick={prevStep}
                                        className="flex-1 bg-white border-2 border-gray-300 text-gray-700 py-4 rounded-xl font-semibold btn-ripple"
                                    >
                                        &larr; Back
                                    </button>
                                    <button
                                        onClick={nextStep}
                                        disabled={!formData.stakeholderEngagement}
                                        className="flex-1 bg-teal-600 hover:bg-teal-700 disabled:bg-gray-300 text-white py-4 rounded-xl font-semibold btn-ripple"
                                    >
                                        Next: Governance &rarr;
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Step 7: Governance */}
                        {step === 7 && (
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800 mb-6">Governance</h2>

                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-gray-700 font-medium mb-2">
                                            Board Meetings Held This Year
                                        </label>
                                        <input
                                            type="number"
                                            value={formData.boardMeetings}
                                            onChange={(e) => handleChange('boardMeetings', e.target.value)}
                                            className="w-full p-3 border-2 border-gray-300 rounded-lg text-lg focus:border-teal-500 outline-none transition"
                                            placeholder="6"
                                        />
                                        <p className="text-sm text-gray-500 mt-1">Minimum 4 recommended</p>
                                        {formData.boardMeetings && parseInt(formData.boardMeetings) < 4 && (
                                            <div className="loss-hl mt-2">
                                                <strong style={{color:'#991B1B'}}>Risk:</strong> Fewer than 4 board meetings may raise governance concerns with the CIC Regulator.
                                            </div>
                                        )}
                                    </div>

                                    <div>
                                        <label className="block text-gray-700 font-medium mb-2">
                                            Governance Changes or Developments
                                        </label>
                                        <textarea
                                            value={formData.governanceChanges}
                                            onChange={(e) => handleChange('governanceChanges', e.target.value)}
                                            className="w-full p-3 border-2 border-gray-300 rounded-lg text-lg focus:border-teal-500 outline-none transition"
                                            placeholder="Appointed new treasurer in June 2023, updated safeguarding policy"
                                            rows={3}
                                        />
                                        <p className="text-sm text-gray-500 mt-1">Leave blank if no changes</p>
                                    </div>

                                    <div>
                                        <label className="block text-gray-700 font-medium mb-2">
                                            Conflicts of Interest Declared
                                        </label>
                                        <textarea
                                            value={formData.conflictsOfInterest}
                                            onChange={(e) => handleChange('conflictsOfInterest', e.target.value)}
                                            className="w-full p-3 border-2 border-gray-300 rounded-lg text-lg focus:border-teal-500 outline-none transition"
                                            placeholder="None declared (or list any conflicts)"
                                            rows={2}
                                        />
                                    </div>
                                </div>

                                <div className="flex gap-3 mt-6">
                                    <button
                                        onClick={prevStep}
                                        className="flex-1 bg-white border-2 border-gray-300 text-gray-700 py-4 rounded-xl font-semibold btn-ripple"
                                    >
                                        &larr; Back
                                    </button>
                                    <button
                                        onClick={nextStep}
                                        disabled={!formData.boardMeetings}
                                        className="flex-1 bg-teal-600 hover:bg-teal-700 disabled:bg-gray-300 text-white py-4 rounded-xl font-semibold btn-ripple"
                                    >
                                        Next: Future Plans &rarr;
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Step 8: Future Plans */}
                        {step === 8 && (
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800 mb-6">Future Plans</h2>
                                <p className="text-gray-600 mb-6">Final step! What are your plans for the next year?</p>

                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-gray-700 font-medium mb-2">
                                            Plans for Next Year
                                        </label>
                                        <textarea
                                            value={formData.futurePlans}
                                            onChange={(e) => handleChange('futurePlans', e.target.value)}
                                            className="w-full p-3 border-2 border-gray-300 rounded-lg text-lg focus:border-teal-500 outline-none transition"
                                            placeholder="Expand to 5 new areas, launch youth program, develop social enterprise selling produce"
                                            rows={6}
                                        />
                                        <p className="text-sm text-gray-500 mt-1">
                                            Be specific: Include targets, timelines, funding needs
                                        </p>
                                    </div>
                                </div>

                                <div className="bg-green-50 border-2 border-green-200 rounded-lg p-6 mt-6">
                                    <h3 className="font-bold text-green-900 mb-3">&#10003; Ready to Generate!</h3>
                                    <p className="text-green-800 mb-4">
                                        You've completed all 8 sections. Click below to generate your CIC34 report.
                                    </p>
                                    <ul className="text-sm text-green-700 space-y-1">
                                        <li>&#10003; Report will be generated in 30-60 seconds</li>
                                        <li>&#10003; You'll get a quality score and improvement suggestions</li>
                                        <li>&#10003; Download as DOCX (editable) or PDF (submit-ready)</li>
                                    </ul>
                                </div>

                                <div className="flex gap-3 mt-6">
                                    <button
                                        onClick={prevStep}
                                        className="flex-1 bg-white border-2 border-gray-300 text-gray-700 py-4 rounded-xl font-semibold btn-ripple"
                                    >
                                        &larr; Back
                                    </button>
                                    <button
                                        onClick={generateReport}
                                        disabled={!formData.futurePlans}
                                        className="flex-1 bg-green-600 hover:bg-green-700 disabled:bg-gray-300 text-white py-4 rounded-xl font-semibold text-xl btn-ripple"
                                    >
                                        Generate My CIC34 Report &#10003;
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Auto-save indicator */}
                    <div className="text-center mt-6 text-sm text-gray-500 sr">
                        Progress auto-saved &bull; You can come back anytime
                    </div>
                </div>
            </div>
        );
    }

    const container = document.getElementById('cic34-root');
    const root = ReactDOM.createRoot(container);
    root.render(<CIC34Generator />);
</script>

<script src="assets/js/v2-nav-consistency.js"></script>
