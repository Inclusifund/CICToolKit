<body class="bg-gray-50">
    <div id="app-root"></div>

    <!-- Auth -->

    <script type="text/babel">
        /* ═══════════════════════════════════════
           CIC Business Model Stress Test 2.0
           React 18 · Tailwind · ECharts · Convex
           Behavioral Science UI Patterns
           ═══════════════════════════════════════ */

        var useState = React.useState;
        var useEffect = React.useEffect;
        var useMemo = React.useMemo;
        var useCallback = React.useCallback;
        var useRef = React.useRef;

        var CONVEX_URL = 'https://terrific-bloodhound-927.convex.cloud';

        // ── Helpers ──────────────────────────────
        function fmt(val) {
            return new Intl.NumberFormat('en-GB', {
                style: 'currency', currency: 'GBP', maximumFractionDigits: 0
            }).format(val);
        }

        function callConvex(fn, args) {
            return fetch(CONVEX_URL + '/api/mutation', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: fn, args: args })
            })
                .then(function (res) { return res.json(); })
                .catch(function (err) { console.error('Convex error:', err); return null; });
        }

        // ── Button Ripple Handler ──
        function addRipple(e) {
            var btn = e.currentTarget;
            var rect = btn.getBoundingClientRect();
            var rpl = document.createElement('span');
            var size = Math.max(rect.width, rect.height);
            rpl.style.width = rpl.style.height = size + 'px';
            rpl.style.left = (e.clientX - rect.left - size/2) + 'px';
            rpl.style.top = (e.clientY - rect.top - size/2) + 'px';
            rpl.className = 'btn-rpl';
            btn.appendChild(rpl);
            setTimeout(function() { rpl.remove(); }, 600);
        }

        // ── Confetti Burst ──
        function confetti(count){for(var i=0;i<(count||50);i++){var c=document.createElement('div');
        c.style.cssText='position:fixed;width:8px;height:8px;border-radius:50%;top:-10px;left:'+
        Math.random()*100+'vw;background:hsl('+Math.random()*360+',80%,60%);z-index:9999;pointer-events:none;animation:fall '+(1+Math.random()*2)+'s ease-out forwards';
        document.body.appendChild(c);setTimeout(function(){c.remove()},3000)}}

        // ── 3-Scenario Engine ────────────────────
        function calcScenarios(streams, fixedCosts, variableCosts) {
            function calcRev(multipliers) {
                var total = 0;
                for (var i = 0; i < streams.length; i++) {
                    var s = streams[i];
                    var base = s.unitPrice * s.volumePerYear;
                    var mult = multipliers[s.confidence] || 1;
                    total += base * mult;
                }
                return total;
            }
            var totalCosts = fixedCosts + variableCosts;

            var bestRev = calcRev({ high: 1.2, medium: 1.0, low: 0.8 });
            var bestCosts = totalCosts * 0.9;

            var expRev = calcRev({ high: 1.0, medium: 1.0, low: 1.0 });
            var expCosts = totalCosts;

            var worstRev = calcRev({ high: 0.8, medium: 0.5, low: 0.2 });
            var worstCosts = totalCosts * 1.15;

            return {
                best: { revenue: bestRev, costs: bestCosts, surplus: bestRev - bestCosts },
                expected: { revenue: expRev, costs: expCosts, surplus: expRev - expCosts },
                worst: { revenue: worstRev, costs: worstCosts, surplus: worstRev - worstCosts }
            };
        }

        // ── Risk Flags Engine ────────────────────
        function calcRiskFlags(streams, fixedCosts, variableCosts, dividendPlan, scenarios) {
            var flags = [];
            var totalRev = 0;
            for (var i = 0; i < streams.length; i++) {
                totalRev += streams[i].unitPrice * streams[i].volumePerYear;
            }
            if (totalRev === 0) return flags;

            // Grant dependency
            var grantRev = 0;
            for (var i = 0; i < streams.length; i++) {
                if (streams[i].type === 'Grant') grantRev += streams[i].unitPrice * streams[i].volumePerYear;
            }
            var grantPct = Math.round((grantRev / totalRev) * 100);
            if (grantPct > 80) {
                flags.push({ flag: 'Grant Dependency', severity: 'red', detail: grantPct + '% of revenue from grants — critically high.' });
            } else if (grantPct > 50) {
                flags.push({ flag: 'Grant Dependency', severity: 'amber', detail: grantPct + '% of revenue from grants — consider diversifying.' });
            } else {
                flags.push({ flag: 'Grant Dependency', severity: 'green', detail: grantPct + '% from grants — healthy balance.' });
            }

            // Single source
            var maxStream = 0;
            for (var i = 0; i < streams.length; i++) {
                var v = streams[i].unitPrice * streams[i].volumePerYear;
                if (v > maxStream) maxStream = v;
            }
            var singlePct = Math.round((maxStream / totalRev) * 100);
            if (singlePct > 60) {
                flags.push({ flag: 'Single Source Risk', severity: 'red', detail: 'Largest stream is ' + singlePct + '% of revenue — too concentrated.' });
            } else if (singlePct > 40) {
                flags.push({ flag: 'Single Source Risk', severity: 'amber', detail: 'Largest stream is ' + singlePct + '% — moderate concentration.' });
            } else {
                flags.push({ flag: 'Single Source Risk', severity: 'green', detail: 'Largest stream is ' + singlePct + '% — well diversified.' });
            }

            // Dividend cap
            if (dividendPlan.planned) {
                if (dividendPlan.percentage > 35) {
                    flags.push({ flag: 'Dividend Cap', severity: 'red', detail: dividendPlan.percentage + '% exceeds CIC 35% cap — non-compliant!' });
                } else if (dividendPlan.percentage > 25) {
                    flags.push({ flag: 'Dividend Cap', severity: 'amber', detail: dividendPlan.percentage + '% approaching 35% limit.' });
                } else {
                    flags.push({ flag: 'Dividend Cap', severity: 'green', detail: dividendPlan.percentage + '% within CIC 35% cap.' });
                }
            }

            // Solvency
            var ws = scenarios.worst.surplus;
            var wm = scenarios.worst.revenue > 0 ? ws / scenarios.worst.revenue : -1;
            if (ws < 0) {
                flags.push({ flag: 'Solvency Risk', severity: 'red', detail: 'Worst-case shows ' + fmt(ws) + ' deficit.' });
            } else if (wm < 0.1) {
                flags.push({ flag: 'Solvency Risk', severity: 'amber', detail: 'Worst-case margin is ' + Math.round(wm * 100) + '% — thin.' });
            } else {
                flags.push({ flag: 'Solvency Risk', severity: 'green', detail: 'Worst-case still shows ' + fmt(ws) + ' surplus.' });
            }

            return flags;
        }

        // ── Viability Score ──────────────────────
        function calcViability(flags, expectedSurplus) {
            var hasRed = false;
            var hasAmber = false;
            for (var i = 0; i < flags.length; i++) {
                if (flags[i].severity === 'red') hasRed = true;
                if (flags[i].severity === 'amber') hasAmber = true;
            }
            if (hasRed || expectedSurplus < 0) return 'RED';
            if (hasAmber || expectedSurplus < 5000) return 'AMBER';
            return 'GREEN';
        }

        // ╔═══════════════════════════════════════╗
        //   COMPONENTS
        // ╚═══════════════════════════════════════╝

        function ViabilityBadge(props) {
            var score = props.score;
            var configs = {
                GREEN: { bg: 'bg-emerald-50', text: 'text-emerald-800', border: 'border-emerald-200', icon: '\uD83D\uDFE2', label: 'Viable' },
                AMBER: { bg: 'bg-amber-50', text: 'text-amber-800', border: 'border-amber-200', icon: '\uD83D\uDFE0', label: 'Caution' },
                RED: { bg: 'bg-red-50', text: 'text-red-800', border: 'border-red-200', icon: '\uD83D\uDD34', label: 'At Risk' }
            };
            var c = configs[score] || configs.RED;
            return (
                <div className={"rounded-2xl p-6 text-center border-2 pulse-badge " + c.bg + " " + c.text + " " + c.border}>
                    <div className="text-4xl mb-2">{c.icon}</div>
                    <div className="text-2xl font-extrabold">{c.label}</div>
                    <div className="text-xs font-bold uppercase tracking-wider mt-1 opacity-70">{score} Viability</div>
                </div>
            );
        }

        function RiskFlagCard(props) {
            var f = props.flag;
            var icons = { red: '\uD83D\uDD34', amber: '\uD83D\uDFE0', green: '\uD83D\uDFE2' };
            var bgs = { red: 'bg-red-50 border-red-100', amber: 'bg-amber-50 border-amber-100', green: 'bg-emerald-50 border-emerald-100' };
            return (
                <div className={"border rounded-xl p-3 flex gap-3 items-start " + (bgs[f.severity] || '')}>
                    <span className="text-lg mt-0.5">{icons[f.severity] || ''}</span>
                    <div>
                        <div className="font-semibold text-sm text-gray-800">{f.flag}</div>
                        <div className="text-xs text-gray-600 mt-0.5">{f.detail}</div>
                    </div>
                </div>
            );
        }

        // ╔═══════════════════════════════════════╗
        //   MAIN APPLICATION
        // ╚═══════════════════════════════════════╝

        function BusinessModelStressTest() {
            // Auth state
            var authState = useState(false);
            var isPremium = authState[0];
            var setIsPremium = authState[1];

            var emailState = useState('');
            var premiumEmail = emailState[0];
            var setPremiumEmail = emailState[1];

            var modalState = useState(false);
            var showEmailModal = modalState[0];
            var setShowEmailModal = modalState[1];

            var freeEmailState = useState('');
            var freeEmail = freeEmailState[0];
            var setFreeEmail = freeEmailState[1];

            var savedState = useState(false);
            var saved = savedState[0];
            var setSaved = savedState[1];

            var copiedState = useState(false);
            var copied = copiedState[0];
            var setCopied = copiedState[1];

            // Business data
            var streamsState = useState([
                { id: 1, name: 'Local Authority Contract', type: 'Trading', unitPrice: 50000, volumePerYear: 1, confidence: 'high' },
                { id: 2, name: 'Community Grant', type: 'Grant', unitPrice: 15000, volumePerYear: 1, confidence: 'medium' },
                { id: 3, name: 'Workshop Fees', type: 'Trading', unitPrice: 30, volumePerYear: 200, confidence: 'medium' }
            ]);
            var revenueStreams = streamsState[0];
            var setRevenueStreams = streamsState[1];

            var fixedState = useState(30000);
            var fixedCosts = fixedState[0];
            var setFixedCosts = fixedState[1];

            var varState = useState(5000);
            var variableCosts = varState[0];
            var setVariableCosts = varState[1];

            var divState = useState({ planned: false, percentage: 0 });
            var dividendPlan = divState[0];
            var setDividendPlan = divState[1];

            var chartRef = useRef(null);
            var chartInstance = useRef(null);

            // ── Auth check ──
            useEffect(function () {
                if (typeof InclusiFundAuth !== 'undefined') {
                    var user = InclusiFundAuth.checkSession();
                    if (user && user.email) {
                        setIsPremium(true);
                        setPremiumEmail(user.email);
                        setFreeEmail(user.email);
                    }
                }
            }, []);

            // ── Scroll Reveal ──
            useEffect(function () {
                setTimeout(function() {
                    document.querySelectorAll('.sr').forEach(function(el,i){
                        el.style.transitionDelay=(i%6)*0.08+'s';
                        new IntersectionObserver(function(e){
                            if(e[0].isIntersecting){el.classList.add('visible');this.disconnect()}
                        },{threshold:.1}).observe(el)});
                }, 100);
            }, []);

            // ── Calculations ──
            var scenarios = useMemo(function () {
                return calcScenarios(revenueStreams, fixedCosts, variableCosts);
            }, [revenueStreams, fixedCosts, variableCosts]);

            var riskFlags = useMemo(function () {
                return calcRiskFlags(revenueStreams, fixedCosts, variableCosts, dividendPlan, scenarios);
            }, [revenueStreams, fixedCosts, variableCosts, dividendPlan, scenarios]);

            var viability = useMemo(function () {
                return calcViability(riskFlags, scenarios.expected.surplus);
            }, [riskFlags, scenarios]);

            var totalRevenue = useMemo(function () {
                var t = 0;
                for (var i = 0; i < revenueStreams.length; i++) {
                    t += revenueStreams[i].unitPrice * revenueStreams[i].volumePerYear;
                }
                return t;
            }, [revenueStreams]);

            // ── ECharts ──
            useEffect(function () {
                if (!chartRef.current) return;
                if (!chartInstance.current) {
                    chartInstance.current = echarts.init(chartRef.current);
                }

                chartInstance.current.setOption({
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: { type: 'shadow' },
                        formatter: function (params) {
                            var s = '';
                            for (var i = 0; i < params.length; i++) {
                                s += params[i].seriesName + ': ' + fmt(params[i].value) + '<br/>';
                            }
                            return s;
                        }
                    },
                    legend: { bottom: 0, textStyle: { fontSize: 11 } },
                    grid: { top: 20, bottom: 50, left: 65, right: 20 },
                    xAxis: {
                        type: 'category',
                        data: ['Best Case', 'Expected', 'Worst Case'],
                        axisLabel: { fontWeight: 600 }
                    },
                    yAxis: {
                        type: 'value',
                        axisLabel: {
                            formatter: function (v) {
                                return v >= 1000 ? '\u00A3' + (v / 1000).toFixed(0) + 'k' : '\u00A3' + v;
                            }
                        }
                    },
                    series: [
                        {
                            name: 'Revenue',
                            type: 'bar',
                            data: [scenarios.best.revenue, scenarios.expected.revenue, scenarios.worst.revenue],
                            itemStyle: { color: '#008080', borderRadius: [6, 6, 0, 0] }
                        },
                        {
                            name: 'Costs',
                            type: 'bar',
                            data: [scenarios.best.costs, scenarios.expected.costs, scenarios.worst.costs],
                            itemStyle: { color: '#ef4444', borderRadius: [6, 6, 0, 0] }
                        },
                        {
                            name: 'Surplus',
                            type: 'bar',
                            data: [scenarios.best.surplus, scenarios.expected.surplus, scenarios.worst.surplus],
                            itemStyle: {
                                color: function (p) { return p.value >= 0 ? '#10b981' : '#f59e0b'; },
                                borderRadius: [6, 6, 0, 0]
                            }
                        }
                    ]
                });

                var handleResize = function () {
                    if (chartInstance.current) chartInstance.current.resize();
                };
                window.addEventListener('resize', handleResize);
                return function () { window.removeEventListener('resize', handleResize); };
            }, [scenarios]);

            // ── Stream CRUD ──
            function updateStream(id, field, value) {
                setRevenueStreams(function (prev) {
                    return prev.map(function (s) {
                        if (s.id === id) {
                            var updated = {};
                            for (var k in s) updated[k] = s[k];
                            updated[field] = value;
                            return updated;
                        }
                        return s;
                    });
                });
            }

            function addStream() {
                setRevenueStreams(function (prev) {
                    return prev.concat([{
                        id: Date.now(),
                        name: 'New Stream',
                        type: 'Trading',
                        unitPrice: 0,
                        volumePerYear: 1,
                        confidence: 'medium'
                    }]);
                });
            }

            function removeStream(id) {
                setRevenueStreams(function (prev) {
                    return prev.filter(function (s) { return s.id !== id; });
                });
            }

            // ── Save ──
            function handleSave(saveEmail) {
                var finalEmail = saveEmail || (isPremium ? premiumEmail : freeEmail);
                if (!finalEmail) return;
                setSaved(true);
                // Fire confetti on save
                confetti(40);
                callConvex('stressTests:storeStressTest', {
                    email: finalEmail,
                    revenueStreams: revenueStreams.map(function (s) {
                        return { name: s.name, type: s.type, unitPrice: s.unitPrice, volumePerYear: s.volumePerYear, confidence: s.confidence };
                    }),
                    fixedCosts: fixedCosts,
                    variableCosts: variableCosts,
                    dividendPlan: dividendPlan,
                    scenarios: scenarios,
                    riskFlags: riskFlags,
                    viabilityScore: viability,
                    overallSurplus: scenarios.expected.surplus
                });
                callConvex('activity:logActivity', {
                    userId: finalEmail,
                    toolName: 'Business Model Stress Test',
                    toolSlug: 'business-model',
                    action: 'completed',
                    metadata: { viability: viability, surplus: scenarios.expected.surplus }
                });
                setShowEmailModal(false);
            }

            // ── Download ──
            function downloadReport() {
                var txt = 'CIC Business Model Stress Test Report\n';
                txt += '=============================================\n\n';
                txt += 'VIABILITY: ' + viability + '\n\n';
                txt += 'Revenue Streams:\n';
                for (var i = 0; i < revenueStreams.length; i++) {
                    var s = revenueStreams[i];
                    txt += '  - ' + s.name + ' (' + s.type + ') = ' + fmt(s.unitPrice) + ' x ' + s.volumePerYear + '/yr = ' + fmt(s.unitPrice * s.volumePerYear) + ' [' + s.confidence + ']\n';
                }
                txt += '\nCosts:\n  Fixed: ' + fmt(fixedCosts) + '\n  Variable: ' + fmt(variableCosts) + '\n  Total: ' + fmt(fixedCosts + variableCosts) + '\n';
                if (dividendPlan.planned) txt += '\nDividend Plan: ' + dividendPlan.percentage + '% of surplus\n';
                txt += '\n---------------------------------------------\nScenarios:\n';
                txt += '  BEST:     Revenue ' + fmt(scenarios.best.revenue) + ' | Costs ' + fmt(scenarios.best.costs) + ' | Surplus ' + fmt(scenarios.best.surplus) + '\n';
                txt += '  EXPECTED: Revenue ' + fmt(scenarios.expected.revenue) + ' | Costs ' + fmt(scenarios.expected.costs) + ' | Surplus ' + fmt(scenarios.expected.surplus) + '\n';
                txt += '  WORST:    Revenue ' + fmt(scenarios.worst.revenue) + ' | Costs ' + fmt(scenarios.worst.costs) + ' | Surplus ' + fmt(scenarios.worst.surplus) + '\n';
                txt += '\nRisk Flags:\n';
                for (var j = 0; j < riskFlags.length; j++) {
                    var f = riskFlags[j];
                    txt += '  ' + (f.severity === 'red' ? '[RED]' : f.severity === 'amber' ? '[AMBER]' : '[GREEN]') + ' ' + f.flag + ': ' + f.detail + '\n';
                }
                txt += '\n---------------------------------------------\nGenerated: ' + new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) + '\n';

                var blob = new Blob([txt], { type: 'text/plain' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'CIC-Stress-Test-Report.txt';
                a.click();
                URL.revokeObjectURL(url);
            }

            // ── Copy ──
            function copySummary() {
                var txt = 'Viability: ' + viability + '\n';
                txt += 'Expected Surplus: ' + fmt(scenarios.expected.surplus) + '\n';
                txt += 'Risk Flags: ';
                var flagParts = [];
                for (var i = 0; i < riskFlags.length; i++) {
                    flagParts.push(riskFlags[i].flag + ' (' + riskFlags[i].severity + ')');
                }
                txt += flagParts.join(', ');
                navigator.clipboard.writeText(txt);
                setCopied(true);
                setTimeout(function () { setCopied(false); }, 2000);
            }

            // ╔═══════════════╗
            //   RENDER
            // ╚═══════════════╝

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-50 via-white to-teal-50/30 py-8 px-4">
                    <div className="max-w-[1600px] mx-auto">

                        {/* ── Header ── */}
                        <header className="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 animate-fade-in sr">
                            <div>
                                <div className="flex items-center gap-3 mb-1">
                                    <h1 className="text-3xl md:text-4xl font-extrabold text-gray-900">Business Model Stress Test</h1>
                                    <span className="bg-brand-surface text-brand-dark text-xs font-bold px-2.5 py-1 rounded-full uppercase tracking-wide">Free</span>
                                </div>
                                <p className="text-gray-500 text-sm md:text-base">The Infrastructure Engine for UK CICs — test financial resilience under best, expected, and worst-case scenarios</p>
                            </div>
                            {isPremium && (
                                <a
                                    href="https://tools.inclusifund.co.uk/dashboard"
                                    className="btn-rp bg-white hover:bg-gray-50 text-gray-700 border border-gray-200 py-2 px-4 rounded-lg font-medium text-sm shadow-sm hover:shadow transition-all"
                                    onClick={addRipple}
                                >
                                    Return to Tools Suite
                                </a>
                            )}
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">

                            {/* ═════════════════════════════════════
                                LEFT: Revenue + Costs + Dividends
                               ═════════════════════════════════════ */}
                            <div className="lg:col-span-4 space-y-5">

                                {/* Revenue Streams Card */}
                                <div className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden animate-fade-in sr">
                                    <div className="p-5 border-b border-gray-100 flex justify-between items-center">
                                        <h2 className="font-bold text-lg text-gray-800 flex items-center gap-2">
                                            <span className="text-xl">{'\uD83D\uDCB0'}</span> Revenue Streams
                                        </h2>
                                        <button
                                            onClick={function(e) { addRipple(e); addStream(); }}
                                            className="btn-rp text-xs font-bold uppercase tracking-wide bg-brand-surface text-brand-dark px-3 py-1.5 rounded-full hover:bg-brand-light/30 transition-colors"
                                        >
                                            + Add
                                        </button>
                                    </div>
                                    <div className="p-4 space-y-3 max-h-[420px] overflow-y-auto">
                                        {revenueStreams.map(function (s) {
                                            return (
                                                <div key={s.id} className="p-4 bg-gray-50 rounded-xl border border-gray-100 group relative hover:shadow-md transition-all hover:bg-white hover:border-brand-primary/20">
                                                    <button
                                                        onClick={function () { removeStream(s.id); }}
                                                        className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition-opacity w-6 h-6 flex items-center justify-center rounded-full hover:bg-red-50 text-lg"
                                                    >
                                                        {'\u00D7'}
                                                    </button>

                                                    {/* Name + Type */}
                                                    <div className="grid grid-cols-5 gap-2 mb-3">
                                                        <div className="col-span-3">
                                                            <input
                                                                className="font-semibold text-gray-800 bg-transparent border-b border-transparent focus:border-brand-primary focus:outline-none w-full text-sm"
                                                                value={s.name}
                                                                onChange={function (e) { updateStream(s.id, 'name', e.target.value); }}
                                                                placeholder="Stream Name"
                                                            />
                                                        </div>
                                                        <div className="col-span-2">
                                                            <select
                                                                className="text-xs bg-white border border-gray-200 rounded-lg px-2 py-1.5 w-full focus:outline-none focus:border-brand-primary text-gray-600"
                                                                value={s.type}
                                                                onChange={function (e) { updateStream(s.id, 'type', e.target.value); }}
                                                            >
                                                                <option value="Trading">Trading</option>
                                                                <option value="Grant">Grant</option>
                                                                <option value="Donation">Donation</option>
                                                            </select>
                                                        </div>
                                                    </div>

                                                    {/* Price x Volume x Confidence */}
                                                    <div className="grid grid-cols-5 gap-2 mb-2">
                                                        <div className="col-span-2">
                                                            <label className="text-[10px] uppercase tracking-wider text-gray-400 font-semibold block">Unit Price</label>
                                                            <div className="flex items-center gap-1">
                                                                <span className="text-gray-400 font-mono text-xs">{'\u00A3'}</span>
                                                                <input
                                                                    type="number"
                                                                    className="font-mono font-bold text-gray-900 bg-transparent w-full focus:outline-none text-sm"
                                                                    value={s.unitPrice}
                                                                    onChange={function (e) { updateStream(s.id, 'unitPrice', parseInt(e.target.value) || 0); }}
                                                                />
                                                            </div>
                                                        </div>
                                                        <div className="col-span-1">
                                                            <label className="text-[10px] uppercase tracking-wider text-gray-400 font-semibold block">Vol/Yr</label>
                                                            <input
                                                                type="number"
                                                                className="font-mono font-bold text-gray-900 bg-transparent w-full focus:outline-none text-sm"
                                                                value={s.volumePerYear}
                                                                onChange={function (e) { updateStream(s.id, 'volumePerYear', parseInt(e.target.value) || 0); }}
                                                            />
                                                        </div>
                                                        <div className="col-span-2">
                                                            <label className="text-[10px] uppercase tracking-wider text-gray-400 font-semibold block">Confidence</label>
                                                            <select
                                                                className="text-xs bg-white border border-gray-200 rounded-lg px-2 py-1 w-full focus:outline-none focus:border-brand-primary text-gray-600"
                                                                value={s.confidence}
                                                                onChange={function (e) { updateStream(s.id, 'confidence', e.target.value); }}
                                                            >
                                                                <option value="high">{'\uD83D\uDFE2'} High</option>
                                                                <option value="medium">{'\uD83D\uDFE0'} Medium</option>
                                                                <option value="low">{'\uD83D\uDD34'} Low</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                    <div className="text-right text-xs font-mono text-gray-500">= {fmt(s.unitPrice * s.volumePerYear)}/yr</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <div className="px-5 py-3 bg-gray-50 border-t border-gray-100 flex justify-between items-center">
                                        <span className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Total Revenue</span>
                                        <span className="font-mono font-bold text-brand-dark text-lg">{fmt(totalRevenue)}</span>
                                    </div>
                                </div>

                                {/* Costs Card */}
                                <div className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden animate-fade-in sr" style={{ animationDelay: '0.1s' }}>
                                    <div className="p-5 border-b border-gray-100">
                                        <h2 className="font-bold text-lg text-gray-800 flex items-center gap-2">
                                            <span className="text-xl">{'\uD83D\uDCC9'}</span> Annual Costs
                                        </h2>
                                    </div>
                                    <div className="p-4 space-y-4">
                                        <div>
                                            <label className="text-sm font-semibold text-gray-700 mb-1 block">
                                                Fixed Costs <span className="text-xs text-gray-400 font-normal">(rent, salaries, insurance)</span>
                                            </label>
                                            <div className="flex items-center gap-2 border-2 border-gray-200 rounded-xl px-3 py-2 focus-within:border-brand-primary transition-colors">
                                                <span className="text-gray-400 font-mono">{'\u00A3'}</span>
                                                <input
                                                    type="number"
                                                    className="font-mono font-bold text-gray-900 bg-transparent w-full focus:outline-none"
                                                    value={fixedCosts}
                                                    onChange={function (e) { setFixedCosts(parseInt(e.target.value) || 0); }}
                                                />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-sm font-semibold text-gray-700 mb-1 block">
                                                Variable Costs <span className="text-xs text-gray-400 font-normal">(COGS, materials)</span>
                                            </label>
                                            <div className="flex items-center gap-2 border-2 border-gray-200 rounded-xl px-3 py-2 focus-within:border-brand-primary transition-colors">
                                                <span className="text-gray-400 font-mono">{'\u00A3'}</span>
                                                <input
                                                    type="number"
                                                    className="font-mono font-bold text-gray-900 bg-transparent w-full focus:outline-none"
                                                    value={variableCosts}
                                                    onChange={function (e) { setVariableCosts(parseInt(e.target.value) || 0); }}
                                                />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="px-5 py-3 bg-gray-50 border-t border-gray-100 flex justify-between items-center">
                                        <span className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Total Costs</span>
                                        <span className="font-mono font-bold text-red-600 text-lg">{fmt(fixedCosts + variableCosts)}</span>
                                    </div>
                                </div>

                                {/* Dividend Plan Card */}
                                <div className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden animate-fade-in sr" style={{ animationDelay: '0.15s' }}>
                                    <div className="p-5 border-b border-gray-100">
                                        <h2 className="font-bold text-lg text-gray-800 flex items-center gap-2">
                                            <span className="text-xl">{'\uD83D\uDC8E'}</span> Dividend Plan
                                        </h2>
                                    </div>
                                    <div className="p-5">
                                        <div className="flex items-center justify-between mb-4">
                                            <span className="text-sm font-semibold text-gray-700">Plan to pay dividends?</span>
                                            <button
                                                onClick={function () {
                                                    setDividendPlan(function (prev) {
                                                        return { planned: !prev.planned, percentage: prev.planned ? 0 : prev.percentage };
                                                    });
                                                }}
                                                className={"w-12 h-7 rounded-full transition-all relative " + (dividendPlan.planned ? 'bg-brand-primary' : 'bg-gray-300')}
                                            >
                                                <div className={"w-5 h-5 bg-white rounded-full shadow absolute top-1 transition-all " + (dividendPlan.planned ? 'left-6' : 'left-1')} />
                                            </button>
                                        </div>
                                        {dividendPlan.planned && (
                                            <div className="animate-fade-in">
                                                <div className="flex justify-between text-sm mb-2">
                                                    <span className="text-gray-500">Dividend %</span>
                                                    <span className={"font-mono font-bold " + (dividendPlan.percentage > 35 ? 'text-red-600' : 'text-brand-dark')}>
                                                        {dividendPlan.percentage}%
                                                    </span>
                                                </div>
                                                <input
                                                    type="range" min="0" max="50"
                                                    value={dividendPlan.percentage}
                                                    onChange={function (e) {
                                                        setDividendPlan(function (prev) {
                                                            return { planned: true, percentage: parseInt(e.target.value) };
                                                        });
                                                    }}
                                                />
                                                <div className="flex justify-between text-xs text-gray-400 mt-1">
                                                    <span>0%</span>
                                                    <span className="text-red-400 font-semibold">35% CIC Cap</span>
                                                    <span>50%</span>
                                                </div>
                                                {dividendPlan.percentage > 35 && (
                                                    <div className="mt-3 loss-hl">
                                                        <p className="text-xs font-medium" style={{color:'#EF4444'}}>
                                                            CIC regulations cap dividends at 35% of distributable profits. Exceeding this makes your company non-compliant and may trigger enforcement action.
                                                        </p>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* ═════════════════════════════════════
                                CENTRE: Chart + Table + Actions
                               ═════════════════════════════════════ */}
                            <div className="lg:col-span-5 space-y-5">

                                {/* Scenario Chart */}
                                <div className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden animate-fade-in sr" style={{ animationDelay: '0.2s' }}>
                                    <div className="p-5 border-b border-gray-100">
                                        <h2 className="font-bold text-lg text-gray-800 text-center flex items-center justify-center gap-2">
                                            <span className="text-xl">{'\uD83D\uDCCA'}</span> Scenario Comparison
                                        </h2>
                                    </div>
                                    <div ref={chartRef} style={{ width: '100%', height: '300px', padding: '0 8px' }}></div>
                                </div>

                                {/* Scenario Table */}
                                <div className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden animate-fade-in sr" style={{ animationDelay: '0.25s' }}>
                                    <div className="p-5 border-b border-gray-100">
                                        <h2 className="font-bold text-lg text-gray-800 flex items-center gap-2">
                                            <span className="text-xl">{'\uD83D\uDCCB'}</span> Scenario Breakdown
                                        </h2>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm">
                                            <thead>
                                                <tr className="bg-gray-50">
                                                    <th className="text-left px-5 py-3 text-xs font-bold uppercase tracking-wider text-gray-500">Metric</th>
                                                    <th className="text-right px-5 py-3 text-xs font-bold uppercase tracking-wider text-emerald-600">Best</th>
                                                    <th className="text-right px-5 py-3 text-xs font-bold uppercase tracking-wider text-brand-dark">Expected</th>
                                                    <th className="text-right px-5 py-3 text-xs font-bold uppercase tracking-wider text-red-600">Worst</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr className="border-t border-gray-100">
                                                    <td className="px-5 py-3 font-medium text-gray-700">Revenue</td>
                                                    <td className="px-5 py-3 text-right font-mono font-bold text-emerald-700">{fmt(scenarios.best.revenue)}</td>
                                                    <td className="px-5 py-3 text-right font-mono font-bold text-gray-800">{fmt(scenarios.expected.revenue)}</td>
                                                    <td className="px-5 py-3 text-right font-mono font-bold text-red-700">{fmt(scenarios.worst.revenue)}</td>
                                                </tr>
                                                <tr className="border-t border-gray-100 bg-gray-50/50">
                                                    <td className="px-5 py-3 font-medium text-gray-700">Costs</td>
                                                    <td className="px-5 py-3 text-right font-mono text-gray-600">{fmt(scenarios.best.costs)}</td>
                                                    <td className="px-5 py-3 text-right font-mono text-gray-600">{fmt(scenarios.expected.costs)}</td>
                                                    <td className="px-5 py-3 text-right font-mono text-gray-600">{fmt(scenarios.worst.costs)}</td>
                                                </tr>
                                                <tr className="border-t-2 border-gray-200">
                                                    <td className="px-5 py-3 font-bold text-gray-900">Surplus / Deficit</td>
                                                    <td className={"px-5 py-3 text-right font-mono font-bold " + (scenarios.best.surplus >= 0 ? 'text-emerald-700' : 'text-red-700')}>{fmt(scenarios.best.surplus)}</td>
                                                    <td className={"px-5 py-3 text-right font-mono font-bold " + (scenarios.expected.surplus >= 0 ? 'text-emerald-700' : 'text-red-700')}>{fmt(scenarios.expected.surplus)}</td>
                                                    <td className={"px-5 py-3 text-right font-mono font-bold " + (scenarios.worst.surplus >= 0 ? 'text-emerald-700' : 'text-red-700')}>{fmt(scenarios.worst.surplus)}</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* Loss Aversion: Worst-case deficit warning */}
                                {scenarios.worst.surplus < 0 && (
                                    <div className="loss-hl sr">
                                        <p className="text-sm font-semibold" style={{color:'#EF4444'}}>Your worst-case scenario shows a {fmt(Math.abs(scenarios.worst.surplus))} deficit. Without reserves, this could force the CIC into insolvency within 12 months.</p>
                                    </div>
                                )}

                                {/* Actions */}
                                <div className="grid grid-cols-3 gap-3 animate-fade-in sr" style={{ animationDelay: '0.3s' }}>
                                    <button
                                        onClick={function(e) { addRipple(e); copySummary(); }}
                                        className={"btn-rp py-3 px-4 rounded-xl font-semibold text-sm transition-all " + (copied ? 'bg-emerald-500 text-white' : 'bg-brand-primary hover:bg-brand-dark text-white shadow-md hover:shadow-lg hover:-translate-y-0.5')}
                                    >
                                        {copied ? '\u2713 Copied!' : '\uD83D\uDCCB Copy'}
                                    </button>
                                    <button
                                        onClick={function(e) { addRipple(e); downloadReport(); }}
                                        className="btn-rp bg-white hover:bg-gray-50 text-gray-700 border border-gray-200 py-3 px-4 rounded-xl font-semibold text-sm shadow-sm hover:shadow transition-all"
                                    >
                                        {'\uD83D\uDCC4'} Download .txt
                                    </button>
                                    <button
                                        onClick={function (e) { addRipple(e); if (isPremium) { handleSave(); } else { setShowEmailModal(true); } }}
                                        disabled={saved}
                                        className={"btn-rp py-3 px-4 rounded-xl font-semibold text-sm transition-all " + (saved ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-brand-surface hover:bg-brand-light/30 text-brand-dark border border-brand-light shadow-sm hover:shadow')}
                                    >
                                        {saved ? '\u2713 Saved' : '\uD83D\uDCBE Save'}
                                    </button>
                                </div>
                            </div>

                            {/* ═════════════════════════════════════
                                RIGHT: Viability + Risk Flags
                               ═════════════════════════════════════ */}
                            <div className="lg:col-span-3 space-y-5">
                                <div className="sticky top-6 space-y-5">

                                    {/* Viability Badge */}
                                    <div className="sr">
                                        <ViabilityBadge score={viability} />
                                    </div>

                                    {/* Expected Surplus */}
                                    <div className={"p-5 rounded-2xl text-center border-2 sr " + (scenarios.expected.surplus >= 0 ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200')}>
                                        <div className="text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Expected Surplus</div>
                                        <div className={"text-3xl font-extrabold font-mono " + (scenarios.expected.surplus >= 0 ? 'text-emerald-700' : 'text-red-700')}>
                                            {fmt(scenarios.expected.surplus)}
                                        </div>
                                    </div>

                                    {/* Risk Flags */}
                                    <div className="bg-white rounded-2xl shadow-lg border border-gray-100 p-5 sr">
                                        <h3 className="font-bold text-sm text-gray-800 mb-3 flex items-center gap-2">
                                            <span className="text-lg">{'\uD83D\uDEA9'}</span> Risk Assessment
                                        </h3>
                                        <div className="space-y-2">
                                            {riskFlags.map(function (f, i) {
                                                return <RiskFlagCard key={i} flag={f} />;
                                            })}
                                        </div>
                                    </div>

                                    {/* Tips */}
                                    <div className="bg-white rounded-2xl shadow-lg border border-gray-100 p-5 sr">
                                        <h3 className="font-bold text-sm text-gray-800 mb-3 flex items-center gap-2">
                                            {'\uD83D\uDCA1'} CIC Financial Tips
                                        </h3>
                                        <ul className="space-y-2.5 text-xs text-gray-600">
                                            <li className="flex gap-2">
                                                <span className="text-brand-primary font-bold">{'\u2022'}</span>
                                                <span>Keep grant dependency <strong>below 50%</strong> for resilience</span>
                                            </li>
                                            <li className="flex gap-2">
                                                <span className="text-brand-primary font-bold">{'\u2022'}</span>
                                                <span>CIC dividend cap is <strong>35%</strong> of distributable profits</span>
                                            </li>
                                            <li className="flex gap-2">
                                                <span className="text-brand-primary font-bold">{'\u2022'}</span>
                                                <span>Aim for <strong>3+ revenue streams</strong> to reduce risk</span>
                                            </li>
                                            <li className="flex gap-2">
                                                <span className="text-brand-primary font-bold">{'\u2022'}</span>
                                                <span>Build <strong>3-6 months</strong> operating reserves</span>
                                            </li>
                                        </ul>
                                    </div>

                                    {/* Social Proof */}
                                    <div className="bg-brand-surface/30 rounded-2xl border border-brand-light/30 p-5 sr">
                                        <p className="text-xs font-bold text-brand-dark uppercase tracking-wider mb-2">Trusted by CIC Directors</p>
                                        <p className="text-xs text-gray-600 italic">"The stress test showed us our grant dependency was at 72%. We diversified into trading income and now sit at 38%."</p>
                                        <p className="text-xs font-semibold text-brand-dark mt-2">— Priya Kumar, Director, Digital Skills North CIC</p>
                                    </div>

                                </div>
                            </div>

                        </div>
                    </div>

                    {/* ── Email Modal (free users) ── */}
                    {showEmailModal && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
                                <h3 className="text-xl font-bold text-gray-900 mb-2">{'\uD83D\uDCE7'} Save Your Results</h3>
                                <p className="text-sm text-gray-500 mb-5">Enter your email to save this stress test to your account.</p>
                                <input
                                    type="email"
                                    className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/10 outline-none transition-all text-gray-700 mb-4"
                                    placeholder="your@email.com"
                                    value={freeEmail}
                                    onChange={function (e) { setFreeEmail(e.target.value); }}
                                />
                                <div className="flex gap-3">
                                    <button
                                        onClick={function () { setShowEmailModal(false); }}
                                        className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-3 rounded-xl font-semibold text-sm transition-all"
                                    >
                                        Cancel
                                    </button>
                                    <button
                                        onClick={function (e) { addRipple(e); handleSave(freeEmail); }}
                                        disabled={!/\S+@\S+\.\S+/.test(freeEmail)}
                                        className="btn-rp flex-1 bg-brand-primary hover:bg-brand-dark text-white py-3 rounded-xl font-semibold text-sm shadow-md transition-all disabled:bg-gray-200 disabled:text-gray-400"
                                    >
                                        Save Results
                                    </button>
                                </div>
                                <p className="text-xs text-gray-400 mt-3 text-center">{'\uD83D\uDD12'} No spam. We save your results securely.</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ── Mount ──
        var container = document.getElementById('app-root');
        var root = ReactDOM.createRoot(container);
        root.render(React.createElement(BusinessModelStressTest));
    </script>
</body>

</html>
